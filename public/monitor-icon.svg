<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0d2b0a"/>
      <stop offset="100%" stop-color="#000a02"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="6" y="6" width="500" height="500" rx="91" fill="none" stroke="#00e060" stroke-width="2" opacity="0.2"/>

  <!-- Decorative top arc lines -->
  <line x1="80" y1="60" x2="432" y2="60" stroke="#00e060" stroke-width="1" opacity="0.12"/>
  <line x1="60" y1="78" x2="452" y2="78" stroke="#00e060" stroke-width="1" opacity="0.07"/>

  <!-- Big glowing R -->
  <text x="256" y="312"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="292"
        font-weight="bold"
        fill="#00e060"
        text-anchor="middle"
        filter="url(#glow)">R</text>

  <!-- MONITOR label -->
  <text x="256" y="398"
        font-family="Arial, Helvetica, sans-serif"
        font-size="44"
        font-weight="700"
        fill="#1a5a1a"
        text-anchor="middle"
        letter-spacing="12">MONITOR</text>

  <!-- Live pulse dot — top right -->
  <circle cx="406" cy="106" r="24" fill="#00e060" filter="url(#softglow)"/>
  <circle cx="406" cy="106" r="36" fill="none" stroke="#00e060" stroke-width="3" opacity="0.35"/>
  <circle cx="406" cy="106" r="50" fill="none" stroke="#00e060" stroke-width="2" opacity="0.12"/>

  <!-- Bottom bar accent -->
  <rect x="160" y="440" width="192" height="3" rx="2" fill="#00e060" opacity="0.2"/>
</svg>
