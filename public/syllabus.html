<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISHI — My Study Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#fdf6ec; --warm-white:#fffdf8; --gold:#c8922a; --gold-light:#e8b84b;
  --gold-pale:#f5e6c8; --amber:#d4870a; --sage:#7a8c6e; --sage-light:#a8b89a;
  --rust:#b85c2a; --charcoal:#2a2218; --mid:#5a4a30; --soft:#8a7a5a;
  --green:#4a8a4a; --green-pale:#eef5ee; --green-border:#a8c8a8;
  --red:#c0392b; --red-pale:#fdf0ee; --red-border:#e8a8a0;
  --amber-pale:#fff8ee; --amber-border:#e8c87a;
  --border-dark:#6b4c2a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'Nunito',sans-serif;min-height:100vh;color:var(--charcoal);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--gold-pale) 1px,transparent 1px),linear-gradient(90deg,var(--gold-pale) 1px,transparent 1px);background-size:40px 40px;opacity:.3;z-index:0;pointer-events:none;}
body::after{content:'RISHI';position:fixed;bottom:-40px;right:-30px;font-family:'Orbitron',sans-serif;font-size:220px;font-weight:900;color:var(--gold-pale);opacity:.15;z-index:0;pointer-events:none;}
.orb{position:fixed;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle at 40% 40%,var(--gold-light),var(--amber),#8a4a10);border-radius:50%;opacity:.18;z-index:0;animation:pulse 4s ease-in-out infinite;pointer-events:none;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.18;}50%{transform:scale(1.06);opacity:.24;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes fillBar{from{width:0;}to{width:var(--w);}}

/* ── HEADER ── */
.hdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1.5px solid var(--gold-pale);background:rgba(253,246,236,.9);backdrop-filter:blur(4px);}
.hdr-logo{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--amber),var(--gold-light),var(--rust));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.hdr-name{font-size:13px;font-weight:800;color:var(--mid);}
.btn-logout{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:7px 14px;border-radius:8px;border:1.5px solid var(--gold-pale);background:transparent;color:var(--soft);cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:var(--amber);color:var(--amber);}

/* ── MAIN ── */
.main{position:relative;z-index:10;max-width:860px;margin:0 auto;padding:24px 16px 60px;}

/* ── WELCOME BAND ── */
.welcome{background:linear-gradient(135deg,var(--warm-white),var(--gold-pale));border:2px solid var(--border-dark);border-radius:20px;padding:24px 28px;margin-bottom:20px;animation:fadeUp .4s ease;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.welcome-left{}
.w-greeting{font-size:12px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:3px;}
.w-name{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--amber);margin-bottom:4px;}
.w-sub{font-size:13px;font-weight:700;color:var(--mid);}
.rishika-badge{display:flex;align-items:center;gap:10px;background:white;border:1.5px solid var(--gold-pale);border-radius:14px;padding:10px 16px;}
.rishika-ico{font-size:28px;}
.rishika-txt{font-size:11px;font-weight:800;color:var(--mid);line-height:1.5;}

/* ── STATUS BANNER ── */
.status-banner{border-radius:16px;padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:16px;animation:fadeUp .45s ease;border:2px solid;}
.sb-on{background:var(--green-pale);border-color:var(--green-border);}
.sb-behind{background:var(--red-pale);border-color:var(--red-border);}
.sb-ahead{background:var(--amber-pale);border-color:var(--amber-border);}
.sb-none{background:var(--warm-white);border-color:var(--gold-pale);}
.sb-ico{font-size:32px;flex-shrink:0;}
.sb-txt{}
.sb-title{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:900;margin-bottom:3px;}
.sb-on .sb-title{color:var(--green);}
.sb-behind .sb-title{color:var(--red);}
.sb-ahead .sb-title{color:var(--amber);}
.sb-none .sb-title{color:var(--mid);}
.sb-sub{font-size:13px;font-weight:700;color:var(--soft);line-height:1.6;}
.sb-right{margin-left:auto;text-align:right;flex-shrink:0;}
.sb-pct{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;}
.sb-on .sb-pct{color:var(--green);}
.sb-behind .sb-pct{color:var(--red);}
.sb-ahead .sb-pct{color:var(--amber);}
.sb-pct-lbl{font-size:10px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.8px;}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--warm-white);border:1.5px solid var(--gold-pale);border-radius:14px;padding:16px 14px;text-align:center;animation:fadeUp .5s ease;}
.kpi-n{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;color:var(--amber);line-height:1;}
.kpi-l{font-size:10px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.8px;margin-top:4px;}
.kpi-sub{font-size:10px;font-weight:700;color:var(--sage);margin-top:2px;}

/* ── SECTION TITLE ── */
.sec-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.sec-title::after{content:'';flex:1;height:1.5px;background:linear-gradient(90deg,var(--gold-pale),transparent);}

/* ── CHAPTER CARDS ── */
.ch-card{background:var(--warm-white);border:1.5px solid var(--gold-pale);border-radius:16px;margin-bottom:10px;overflow:hidden;animation:fadeUp .5s ease;transition:box-shadow .2s;}
.ch-card:hover{box-shadow:0 4px 20px rgba(200,146,42,.12);}
.ch-card.on-track{border-left:4px solid var(--green);}
.ch-card.behind{border-left:4px solid var(--red);}
.ch-card.ahead{border-left:4px solid var(--amber);}
.ch-card.not-started{border-left:4px solid #ccc;}
.ch-card.done{border-left:4px solid var(--sage);}

.ch-main{display:flex;align-items:center;gap:14px;padding:16px 18px;cursor:pointer;}
.ch-num-badge{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:14px;font-weight:800;color:var(--charcoal);margin-bottom:2px;}
.ch-topic{font-size:10px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.8px;}
.ch-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ch-status-badge{font-size:10px;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.badge-on{background:var(--green-pale);color:var(--green);border:1px solid var(--green-border);}
.badge-behind{background:var(--red-pale);color:var(--red);border:1px solid var(--red-border);}
.badge-ahead{background:var(--amber-pale);color:var(--amber);border:1px solid var(--amber-border);}
.badge-ns{background:#f0f0f0;color:#888;border:1px solid #ddd;}
.badge-done{background:var(--green-pale);color:var(--sage);border:1px solid var(--green-border);}
.ch-days-left{text-align:right;}
.ch-dl-n{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;line-height:1;}
.ch-dl-l{font-size:9px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;}
.ch-toggle{font-size:16px;color:var(--soft);margin-left:4px;transition:transform .2s;}
.ch-toggle.open{transform:rotate(180deg);}

/* Progress bar inside card */
.ch-prog-row{padding:0 18px 4px;display:flex;align-items:center;gap:10px;}
.ch-prog-track{flex:1;height:5px;background:var(--gold-pale);border-radius:3px;overflow:hidden;}
.ch-prog-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.ch-prog-pct{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--soft);width:30px;text-align:right;flex-shrink:0;}
.ch-prog-lbl{font-size:10px;font-weight:700;color:var(--soft);width:80px;flex-shrink:0;}

/* Expand panel */
.ch-expand{display:none;border-top:1.5px solid var(--gold-pale);padding:16px 18px;background:rgba(245,230,200,.15);}
.ch-expand.open{display:block;}
.exp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:500px){.exp-grid{grid-template-columns:repeat(2,1fr);}}
.exp-stat{background:white;border:1px solid var(--gold-pale);border-radius:10px;padding:10px;text-align:center;}
.exp-n{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--amber);}
.exp-l{font-size:9px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
.exp-dates{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.exp-date{background:white;border:1px solid var(--gold-pale);border-radius:9px;padding:8px 14px;font-size:11px;font-weight:700;color:var(--mid);}
.exp-date span{font-size:9px;color:var(--soft);display:block;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px;}
.exp-cta{display:flex;gap:8px;flex-wrap:wrap;}
.btn-explain{font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;text-align:center;}
.btn-explain-active{background:linear-gradient(135deg,var(--amber),var(--gold-light));color:white;box-shadow:0 3px 12px rgba(212,135,10,.3);}
.btn-explain-active:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(212,135,10,.4);}
.btn-explain-locked{background:var(--gold-pale);color:var(--soft);cursor:not-allowed;}
.btn-practice{background:linear-gradient(135deg,var(--sage),var(--sage-light));color:white;box-shadow:0 3px 12px rgba(122,140,110,.25);}
.btn-practice:hover{transform:translateY(-1px);}
.btn-practice-locked{background:#eee;color:#aaa;cursor:not-allowed;}

/* ── NO PLAN STATE ── */
.no-plan{text-align:center;padding:48px 24px;background:var(--warm-white);border:2px dashed var(--gold-pale);border-radius:20px;}
.no-plan-ico{font-size:52px;margin-bottom:12px;}
.no-plan-txt{font-size:15px;font-weight:700;color:var(--mid);line-height:1.7;}

/* ── UNSCHEDULED CHAPTERS ── */
.unsched-section{margin-top:28px;}
.unsched-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.unsched-tile{background:var(--warm-white);border:1.5px solid var(--gold-pale);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.unsched-n{width:28px;height:28px;border-radius:7px;background:var(--gold-pale);display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:var(--amber);flex-shrink:0;}
.unsched-info{}
.unsched-name{font-size:11px;font-weight:700;color:var(--mid);line-height:1.3;}
.unsched-tag{font-size:9px;color:var(--soft);margin-top:1px;}

@media(max-width:600px){.welcome{flex-direction:column;}.ch-right{gap:6px;}.exp-grid{grid-template-columns:1fr 1fr;}.ch-main{flex-wrap:wrap;}}
</style>
</head>
<body>
<div class="orb"></div>

<header class="hdr">
  <div class="hdr-logo">RISHI</div>
  <div class="hdr-right">
    <div class="hdr-name" id="hdr-name"></div>
    <button class="btn-logout" onclick="logout()">← Logout</button>
  </div>
</header>

<div class="main">

  <!-- WELCOME -->
  <div class="welcome">
    <div class="welcome-left">
      <div class="w-greeting">Welcome back</div>
      <div class="w-name" id="w-name">Student</div>
      <div class="w-sub" id="w-sub">Class 8 · CBSE Mathematics</div>
    </div>
    <div class="rishika-badge">
      <div class="rishika-ico">🦊</div>
      <div class="rishika-txt">Rishika is by<br>your side today!</div>
    </div>
  </div>

  <!-- STATUS BANNER -->
  <div class="status-banner sb-none" id="status-banner">
    <div class="sb-ico" id="sb-ico">📋</div>
    <div class="sb-txt">
      <div class="sb-title" id="sb-title">Loading your plan…</div>
      <div class="sb-sub" id="sb-sub">Checking your study schedule</div>
    </div>
    <div class="sb-right">
      <div class="sb-pct" id="sb-pct">—</div>
      <div class="sb-pct-lbl">Overall Done</div>
    </div>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpi-row">
    <div class="kpi"><div class="kpi-n" id="kpi-total">—</div><div class="kpi-l">Chapters</div><div class="kpi-sub">Scheduled</div></div>
    <div class="kpi"><div class="kpi-n" id="kpi-days">—</div><div class="kpi-l">Days Left</div><div class="kpi-sub" id="kpi-days-sub">to final target</div></div>
    <div class="kpi"><div class="kpi-n" id="kpi-done">—</div><div class="kpi-l">Chapters</div><div class="kpi-sub">Completed</div></div>
    <div class="kpi"><div class="kpi-n" id="kpi-sessions">—</div><div class="kpi-l">Sessions</div><div class="kpi-sub">Total practice</div></div>
  </div>

  <!-- SCHEDULED CHAPTERS -->
  <div id="sched-section">
    <div class="sec-title">📅 My Study Schedule</div>
    <div id="ch-list"></div>
  </div>

  <!-- UNSCHEDULED -->
  <div class="unsched-section" id="unsched-section" style="display:none;">
    <div class="sec-title">📚 All Chapters</div>
    <div class="unsched-grid" id="unsched-grid"></div>
  </div>

</div><!-- /main -->

<script>
var CHAPTERS = [
  {id:1,  name:"Rational Numbers",                    topic:"Arithmetic",    explainPath:"",                                                               built:false},
  {id:2,  name:"Linear Equations",                    topic:"Algebra",       explainPath:"/explain/algebra/linear-equations.html",                         built:true},
  {id:3,  name:"Understanding Quadrilaterals",         topic:"Geometry",      explainPath:"/explain/geometry/understanding-quadrilaterals.html",             built:true},
  {id:4,  name:"Practical Geometry",                  topic:"Geometry",      explainPath:"/explain/geometry/practical-geometry.html",                       built:true},
  {id:5,  name:"Data Handling",                       topic:"Statistics",    explainPath:"",                                                               built:false},
  {id:6,  name:"Squares and Square Roots",            topic:"Number System", explainPath:"",                                                               built:false},
  {id:7,  name:"Cubes and Cube Roots",                topic:"Number System", explainPath:"",                                                               built:false},
  {id:8,  name:"Comparing Quantities",                topic:"Arithmetic",    explainPath:"",                                                               built:false},
  {id:9,  name:"Algebraic Expressions & Identities",  topic:"Algebra",       explainPath:"/explain/algebra/algebraic-expressions-identities.html",          built:true},
  {id:10, name:"Visualising Solid Shapes",            topic:"Geometry",      explainPath:"",                                                               built:false},
  {id:11, name:"Mensuration",                         topic:"Geometry",      explainPath:"/explain/mensuration/area-plane-figures.html",                    built:true},
  {id:12, name:"Exponents and Powers",                topic:"Number System", explainPath:"",                                                               built:false},
  {id:13, name:"Direct & Inverse Proportions",        topic:"Arithmetic",    explainPath:"",                                                               built:false},
  {id:14, name:"Factorisation",                       topic:"Algebra",       explainPath:"",                                                               built:false},
  {id:15, name:"Introduction to Graphs",              topic:"Algebra",       explainPath:"/explain/algebra/introduction-to-graphs.html",                    built:true},
  {id:16, name:"Playing with Numbers",                topic:"Arithmetic",    explainPath:"",                                                               built:false}
];

var CH_COLORS = [
  "#6C63FF","#2563EB","#059669","#0D9488","#D97706",
  "#DC2626","#EA580C","#7C3AED","#0891B2","#16A34A",
  "#B45309","#4338CA","#DB2777","#65A30D","#0284C7","#7E22CE"
];

function toDateStr(d){var y=d.getFullYear(),m=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);return y+'-'+m+'-'+dd;}
function daysBetween(a,b){if(!a||!b)return 0;return Math.round((new Date(b)-new Date(a))/86400000);}
function formatDate(s){if(!s)return '—';var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];var p=s.split('-');return parseInt(p[2])+' '+MONTHS[parseInt(p[1])-1];}
function getCh(id){for(var i=0;i<CHAPTERS.length;i++)if(CHAPTERS[i].id===id)return CHAPTERS[i];return null;}

function loadData(){
  var active={}, progress={}, student={};
  try{active=JSON.parse(localStorage.getItem('rishi_active_chapters')||'{}');}catch(e){}
  try{progress=JSON.parse(localStorage.getItem('rishi_chapter_progress')||'{}');}catch(e){}
  try{student=JSON.parse(localStorage.getItem('rishi_current_student')||'{}');}catch(e){}
  return {active:active, progress:progress, student:student};
}

function logout(){
  localStorage.removeItem('rishi_current_student');
  window.location.href='/login.html';
}

function getStatus(pr, active, today){
  var cid=pr.cid, ac=active[cid];
  var prog=pr.prog;
  var completed=prog.completed||0, total=prog.total||15;
  var compRatio=total>0?completed/total:0;
  if(!ac) return {type:'ns', label:'Not Scheduled'};
  if(compRatio>=1) return {type:'done', label:'✓ Done'};

  var dLeft=daysBetween(today, ac.targetDate);
  if(dLeft<0) return {type:'behind', label:'Past Due'};

  // Expected completion by now
  var totalDays=daysBetween(ac.startDate, ac.targetDate)||1;
  var donedays=daysBetween(ac.startDate, today);
  var expectedRatio=Math.min(1, Math.max(0, donedays/totalDays));
  var diff=compRatio-expectedRatio;

  if(compRatio===0 && donedays<0) return {type:'ns', label:'Not Started Yet'};
  if(diff >= 0.1) return {type:'ahead', label:'Ahead of schedule!'};
  if(diff < -0.2) return {type:'behind', label:'Behind schedule'};
  return {type:'on', label:'On schedule ✓'};
}

function render(){
  var d=loadData();
  var today=toDateStr(new Date());

  // Student info
  var name=(d.student.studentName||'Student').split(' ')[0];
  document.getElementById('hdr-name').textContent=name;
  document.getElementById('w-name').textContent=name;
  document.getElementById('w-sub').textContent='Class '+(d.student.class||8)+' · '+(d.student.board||'CBSE')+' Mathematics';

  // Get scheduled chapter ids
  var schedIds=Object.keys(d.active).map(Number).sort(function(a,b){return a-b;});

  // Overall stats
  var totalSess=0, totalCompleted=0, totalChDone=0;
  for(var i=0;i<CHAPTERS.length;i++){
    var pr=d.progress[CHAPTERS[i].id]||{};
    totalSess+=(pr.sessions||0);
    totalCompleted+=(pr.completed||0);
    if((pr.completed||0)>=(pr.total||15)&&pr.total>0) totalChDone++;
  }

  // Days to final target
  var maxTarget=null;
  for(var cid in d.active){
    var t=d.active[cid].targetDate;
    if(!maxTarget||t>maxTarget) maxTarget=t;
  }
  var daysToFinal=maxTarget?daysBetween(today,maxTarget):null;

  // Overall completion across scheduled chapters
  var totalQ=0, doneQ=0;
  for(var i=0;i<schedIds.length;i++){
    var cid=schedIds[i];
    var pr=d.progress[cid]||{};
    totalQ+=(pr.total||15);
    doneQ+=(pr.completed||0);
  }
  var overallPct=totalQ>0?Math.round(doneQ/totalQ*100):0;

  // Status assessment
  var behindCount=0, aheadCount=0, onCount=0;
  for(var i=0;i<schedIds.length;i++){
    var cid=schedIds[i];
    var st=getStatus({cid:cid,prog:d.progress[cid]||{}}, d.active, today);
    if(st.type==='behind') behindCount++;
    else if(st.type==='ahead') aheadCount++;
    else if(st.type==='on') onCount++;
  }

  // Banner
  var banner=document.getElementById('status-banner');
  var ico='📋', title='No study plan set yet', sub='Ask your parent to create a study plan in the Parent Portal.', cls='sb-none';
  if(schedIds.length>0){
    if(behindCount>0){
      ico='⚠️'; cls='sb-behind';
      title='You are behind schedule on '+behindCount+' chapter'+(behindCount>1?'s':'');
      sub='You need to put in extra effort this week. You can catch up — Rishika believes in you!';
    } else if(aheadCount>0){
      ico='🚀'; cls='sb-ahead';
      title='Great work — you are ahead of schedule!';
      sub='Keep this momentum going. You are '+aheadCount+' chapter'+(aheadCount>1?'s':'')+' ahead of plan.';
    } else if(onCount>0){
      ico='✅'; cls='sb-on';
      title='You are right on schedule!';
      sub='Consistent effort every day is the key. Keep it up!';
    } else {
      ico='📅'; cls='sb-none';
      title='Study plan is active';
      sub='Start working through your chapters below.';
    }
  }
  banner.className='status-banner '+cls;
  document.getElementById('sb-ico').textContent=ico;
  document.getElementById('sb-title').textContent=title;
  document.getElementById('sb-sub').textContent=sub;
  document.getElementById('sb-pct').textContent=overallPct+'%';

  // KPIs
  document.getElementById('kpi-total').textContent=schedIds.length||'—';
  document.getElementById('kpi-days').textContent=daysToFinal!==null?(daysToFinal>=0?daysToFinal+'d':'Past'):'—';
  document.getElementById('kpi-done').textContent=totalChDone;
  document.getElementById('kpi-sessions').textContent=totalSess;
  if(maxTarget) document.getElementById('kpi-days-sub').textContent='target: '+formatDate(maxTarget);

  // Chapter list
  renderChapterList(schedIds, d, today);

  // Unscheduled
  renderUnscheduled(schedIds);
}

function renderChapterList(schedIds, d, today){
  var con=document.getElementById('ch-list');
  if(schedIds.length===0){
    con.innerHTML='<div class="no-plan"><div class="no-plan-ico">📚</div><div class="no-plan-txt">No chapters scheduled yet.<br>Your parent will set up your study plan.<br><br>All 16 chapters are shown below.</div></div>';
    document.getElementById('unsched-section').style.display='block';
    renderUnscheduled([]);
    return;
  }

  var html='';
  for(var i=0;i<schedIds.length;i++){
    var cid=schedIds[i];
    var ch=getCh(cid);
    if(!ch) continue;
    var color=CH_COLORS[cid-1];
    var pr=d.progress[cid]||{};
    var ac=d.active[cid];
    var st=getStatus({cid:cid,prog:pr}, d.active, today);
    var completed=pr.completed||0, total=pr.total||15;
    var compPct=total>0?Math.round(completed/total*100):0;
    var dLeft=ac&&ac.targetDate?daysBetween(today,ac.targetDate):null;
    var sessions=pr.sessions||0;
    var accuracy=pr.accuracy||0;

    var cardCls='ch-card ';
    var badgeCls='ch-status-badge ';
    if(st.type==='on'){cardCls+='on-track';badgeCls+='badge-on';}
    else if(st.type==='behind'||st.type==='ahead'&&dLeft<0){cardCls+='behind';badgeCls+='badge-behind';}
    else if(st.type==='ahead'){cardCls+='ahead';badgeCls+='badge-ahead';}
    else if(st.type==='done'){cardCls+='done';badgeCls+='badge-done';}
    else{cardCls+='not-started';badgeCls+='badge-ns';}

    var progColor=compPct>=75?'#4a8a4a':compPct>=50?'#d4870a':'#c0392b';

    var dlDisplay='—';
    var dlCol=color;
    if(st.type==='done'){dlDisplay='✓';dlCol='var(--sage)';}
    else if(dLeft!==null&&dLeft>=0){dlDisplay=dLeft;dlCol=dLeft<=3?'var(--red)':dLeft<=7?'var(--amber)':'var(--green)';}
    else if(dLeft!==null&&dLeft<0){dlDisplay='!';dlCol='var(--red)';}

    html+='<div class="'+cardCls+'" id="chcard-'+cid+'">';
    // Main row (clickable)
    html+='<div class="ch-main" onclick="toggleExpand('+cid+')">';
    html+='<div class="ch-num-badge" style="background:'+color+'">'+cid+'</div>';
    html+='<div class="ch-info"><div class="ch-name">'+ch.name+'</div><div class="ch-topic">'+ch.topic+'</div></div>';
    html+='<div class="ch-right">';
    html+='<span class="'+badgeCls+'">'+st.label+'</span>';
    if(st.type!=='done'&&st.type!=='ns'){
      html+='<div class="ch-days-left"><div class="ch-dl-n" style="color:'+dlCol+'">'+dlDisplay+'</div><div class="ch-dl-l">'+(typeof dlDisplay==='number'?'days left':'')+'</div></div>';
    }
    html+='<div class="ch-toggle" id="toggle-'+cid+'">▾</div>';
    html+='</div></div>';
    // Progress bar
    html+='<div class="ch-prog-row"><div class="ch-prog-lbl" style="font-size:10px;font-weight:700;color:var(--soft);width:80px;flex-shrink:0">Practice</div><div class="ch-prog-track"><div class="ch-prog-fill" style="width:'+compPct+'%;background:'+progColor+'"></div></div><div class="ch-prog-pct">'+compPct+'%</div></div>';
    // Expand panel
    html+='<div class="ch-expand" id="exp-'+cid+'">';
    html+='<div class="exp-grid">';
    html+='<div class="exp-stat"><div class="exp-n">'+sessions+'</div><div class="exp-l">Sessions</div></div>';
    html+='<div class="exp-stat"><div class="exp-n">'+completed+'/'+total+'</div><div class="exp-l">Questions</div></div>';
    html+='<div class="exp-stat"><div class="exp-n">'+accuracy+'%</div><div class="exp-l">Accuracy</div></div>';
    html+='</div>';
    if(ac){
      html+='<div class="exp-dates">';
      html+='<div class="exp-date"><span>Start</span>'+formatDate(ac.startDate)+'</div>';
      html+='<div class="exp-date"><span>Target</span>'+formatDate(ac.targetDate)+'</div>';
      if(dLeft!==null&&dLeft>=0&&st.type!=='done'){
        var urgency=dLeft<=3?'color:var(--red);font-weight:900':dLeft<=7?'color:var(--amber)':'color:var(--green)';
        html+='<div class="exp-date" style="'+urgency+'"><span>Days left</span>'+dLeft+' days</div>';
      }
      html+='</div>';
    }
    html+='<div class="exp-cta">';
    if(ch.built){
      html+='<a href="'+ch.explainPath+'" class="btn-explain btn-explain-active">📖 Watch Explain</a>';
    } else {
      html+='<span class="btn-explain btn-explain-locked">📖 Explain — Coming Soon</span>';
    }
    html+='<span class="btn-explain btn-practice-locked">✏️ Practice — Coming Soon</span>';
    html+='</div>';
    html+='</div>';
    html+='</div>';
  }
  con.innerHTML=html;

  // Unscheduled after list
  var unschedIds=[];
  for(var i=0;i<CHAPTERS.length;i++){
    if(schedIds.indexOf(CHAPTERS[i].id)===-1) unschedIds.push(CHAPTERS[i].id);
  }
  if(unschedIds.length>0){
    document.getElementById('unsched-section').style.display='block';
    renderUnscheduled(schedIds);
  }
}

function toggleExpand(cid){
  var panel=document.getElementById('exp-'+cid);
  var tog=document.getElementById('toggle-'+cid);
  var isOpen=panel.classList.contains('open');
  // Close all
  var all=document.querySelectorAll('.ch-expand');
  for(var i=0;i<all.length;i++) all[i].classList.remove('open');
  var allTog=document.querySelectorAll('.ch-toggle');
  for(var i=0;i<allTog.length;i++) allTog[i].classList.remove('open');
  // Toggle this
  if(!isOpen){ panel.classList.add('open'); tog.classList.add('open'); }
}

function renderUnscheduled(schedIds){
  var unschedIds=[];
  for(var i=0;i<CHAPTERS.length;i++){
    if(schedIds.indexOf(CHAPTERS[i].id)===-1) unschedIds.push(CHAPTERS[i].id);
  }
  if(!unschedIds.length){ document.getElementById('unsched-section').style.display='none'; return; }
  var html='';
  for(var i=0;i<unschedIds.length;i++){
    var cid=unschedIds[i];
    var ch=getCh(cid);
    var color=CH_COLORS[cid-1];
    html+='<div class="unsched-tile">';
    html+='<div class="unsched-n" style="background:'+color+'22;color:'+color+'">'+cid+'</div>';
    html+='<div class="unsched-info"><div class="unsched-name">'+ch.name+'</div><div class="unsched-tag">'+ch.topic+' · Not scheduled</div></div>';
    html+='</div>';
  }
  document.getElementById('unsched-grid').innerHTML=html;
}

window.onload=function(){
  // Get name from URL param too
  var params=new URLSearchParams(window.location.search);
  var urlBoard=params.get('board');
  var urlClass=params.get('class');
  var student={};
  try{student=JSON.parse(localStorage.getItem('rishi_current_student')||'{}');}catch(e){}
  if(urlBoard) student.board=urlBoard;
  if(urlClass) student.class=urlClass;
  localStorage.setItem('rishi_current_student',JSON.stringify(student));
  render();
};
</script>
</body>
</html>
