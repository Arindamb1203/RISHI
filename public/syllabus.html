<title>RISHI — My Study Plan</title>

<style>
:root{
  --cream:#fdf6ec;--warm-white:#fffdf8;--gold:#c8922a;--gold-light:#e8b84b;
  --gold-pale:#f5e6c8;--amber:#d4870a;--sage:#7a8c6e;--sage-light:#a8b89a;
  --rust:#b85c2a;--charcoal:#2a2218;--mid:#5a4a30;--soft:#8a7a5a;
  --green:#4a8a4a;--green-pale:#eef5ee;--green-border:#a8c8a8;
  --red:#c0392b;--red-pale:#fdf0ee;--red-border:#e8a8a0;
  --amber-pale:#fff8ee;--amber-border:#e8c87a;
  --border-dark:#6b4c2a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'Nunito',sans-serif;min-height:100vh;color:var(--charcoal);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--gold-pale) 1px,transparent 1px),linear-gradient(90deg,var(--gold-pale) 1px,transparent 1px);background-size:40px 40px;opacity:.25;z-index:0;pointer-events:none;}
body::after{content:'RISHI';position:fixed;bottom:-40px;right:-30px;font-family:'Orbitron',sans-serif;font-size:220px;font-weight:900;color:var(--gold-pale);opacity:.1;z-index:0;pointer-events:none;}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:2px solid var(--border-dark);background:rgba(253,246,236,.97);backdrop-filter:blur(6px);}
.hdr-logo{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--amber),var(--gold-light),var(--rust));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-name{font-size:14px;font-weight:800;color:var(--mid);}
.btn-logout{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:6px 14px;border-radius:8px;border:1.5px solid var(--gold-pale);background:transparent;color:var(--soft);cursor:pointer;}
.btn-logout:hover{border-color:var(--amber);color:var(--amber);}

/* ── WELCOME ── */
.welcome{position:relative;z-index:10;background:linear-gradient(135deg,var(--warm-white),var(--gold-pale));border-bottom:2px solid var(--border-dark);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.w-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--amber);}
.w-sub{font-size:13px;font-weight:700;color:var(--mid);margin-top:3px;}
.w-badge{display:flex;align-items:center;gap:8px;background:white;border:1.5px solid var(--gold-pale);border-radius:10px;padding:8px 14px;}
.w-badge-ico{font-size:22px;}
.w-badge-txt{font-size:12px;font-weight:800;color:var(--mid);line-height:1.5;}

/* ── TWO-PANEL ── */
.two-panel{position:relative;z-index:10;display:flex;height:calc(100vh - 115px);}

/* ── LEFT TOPIC RAIL ── */
.topic-rail{width:154px;min-width:154px;flex-shrink:0;border-right:2px solid var(--border-dark);background:rgba(253,246,236,.95);padding:10px 8px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;}
.topic-rail::-webkit-scrollbar{width:3px;}
.topic-rail::-webkit-scrollbar-thumb{background:var(--gold-pale);border-radius:3px;}

.topic-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 8px;border-radius:12px;border:2px solid transparent;background:transparent;cursor:pointer;transition:all .18s;font-family:'Nunito',sans-serif;text-align:center;width:100%;}
.topic-btn:hover{background:var(--gold-pale);border-color:var(--gold-pale);}
.topic-btn.active{background:linear-gradient(135deg,var(--charcoal),#3d2e1a);border-color:var(--border-dark);box-shadow:0 4px 16px rgba(42,34,24,.3);}
.t-icon{font-size:26px;line-height:1;}
.t-name{font-size:11px;font-weight:900;color:var(--charcoal);letter-spacing:.2px;line-height:1.3;}
.t-count{font-size:10px;font-weight:700;color:var(--soft);}
.topic-btn.active .t-name{color:var(--gold-light);}
.topic-btn.active .t-count{color:var(--gold-pale);}

@media(max-width:560px){
  .topic-rail{width:64px;min-width:64px;padding:8px 4px;}
  .t-name,.t-count{display:none;}
  .topic-btn{padding:10px 4px;}
  .t-icon{font-size:22px;}
}

/* ── RIGHT CHAPTER PANEL ── */
.chapter-panel{flex:1;overflow-y:auto;padding:14px;}
.chapter-panel::-webkit-scrollbar{width:4px;}
.chapter-panel::-webkit-scrollbar-thumb{background:var(--gold-pale);border-radius:4px;}

.cp-header{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1.5px solid var(--gold-pale);display:flex;align-items:center;gap:9px;}
.cp-icon{font-size:18px;}

/* ── CHAPTER CARD ── */
.ch-card{background:var(--warm-white);border:2px solid var(--gold-pale);border-radius:13px;margin-bottom:9px;overflow:hidden;transition:border-color .18s,box-shadow .18s;}
.ch-card.expanded{border-color:var(--amber);box-shadow:0 4px 18px rgba(212,135,10,.15);}
.ch-card.not-built{opacity:.5;}

.ch-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;transition:background .15s;}
.ch-head:hover{background:rgba(245,230,200,.3);}
.ch-card.not-built .ch-head{cursor:default;}
.ch-card.not-built .ch-head:hover{background:transparent;}

.ch-num{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.ch-title{flex:1;font-size:14px;font-weight:800;color:var(--charcoal);line-height:1.3;}
.ch-pill{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.pill-done{background:var(--green-pale);color:var(--green);}
.pill-active{background:var(--amber-pale);color:var(--amber);}
.pill-soon{background:#f0f0f0;color:#bbb;}
.pill-ongoing{background:#e8f4ff;color:#1a6fc4;}
.pill-pending{background:#f0eeff;color:#6c4bc4;}
.pill-notassigned{background:#f5f5f5;color:#aaa;}
.ch-arrow{font-size:14px;color:var(--soft);transition:transform .22s;flex-shrink:0;margin-left:2px;}
.ch-arrow.open{transform:rotate(180deg);}

/* ── CHAPTER BODY (Explain / Practice / Exam) ── */
.ch-body{display:none;border-top:1.5px solid var(--gold-pale);padding:13px 14px 15px;}
.ch-body.open{display:block;}
.three-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}

.abtn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:13px 5px;border-radius:11px;border:none;cursor:pointer;text-decoration:none;font-family:'Nunito',sans-serif;transition:all .18s;}
.abtn-ico{font-size:20px;}
.abtn-name{font-size:12px;font-weight:900;color:inherit;}
.abtn-sub{font-size:10px;font-weight:700;opacity:.8;text-align:center;line-height:1.3;}
.abtn.go{background:linear-gradient(135deg,var(--amber),var(--gold-light));color:white;box-shadow:0 4px 12px rgba(212,135,10,.3);}
.abtn.go:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(212,135,10,.4);}
.abtn.done-btn{background:var(--green-pale);color:var(--green);border:1.5px solid var(--green-border);}
.abtn.locked-btn{background:var(--gold-pale);color:var(--soft);cursor:not-allowed;}
.abtn.soon-btn{background:#f5f5f5;color:#bbb;cursor:not-allowed;border:1.5px solid #eee;}

/* ── DATE BADGE ── */
.ch-date-badge{display:flex;align-items:center;gap:6px;padding:7px 14px;font-size:12px;font-weight:700;line-height:1.3;border-top:1.5px solid var(--gold-pale);}
.ch-date-badge.scheduled{background:var(--amber-pale);color:var(--amber);border:1.5px solid var(--amber-border);}
.ch-date-badge.overdue{background:var(--red-pale);color:var(--red);border:1.5px solid var(--red-border);}
.ch-date-badge.complete{background:var(--green-pale);color:var(--green);border:1.5px solid var(--green-border);}
/* ── NOT IN PLAN ── */
.ch-card.not-in-plan{opacity:.45;}
.ch-card.not-in-plan .ch-head{cursor:default;}
.ch-card.not-in-plan .ch-head:hover{background:transparent;}
.no-plan-banner{background:var(--amber-pale);border:1.5px solid var(--amber-border);border-radius:11px;padding:12px 15px;margin-bottom:14px;font-size:13px;font-weight:700;color:var(--amber);text-align:center;line-height:1.6;}
/* ── TOPIC DATE ── */
.t-date{font-size:9px;font-weight:700;color:var(--soft);line-height:1.2;text-align:center;}
.topic-btn.active .t-date{color:var(--gold-pale);}
.t-date.t-overdue{color:var(--rust);}
.topic-btn.active .t-date.t-overdue{color:#ff9977;}
.t-date.t-complete{color:var(--green);}
.topic-btn.active .t-date.t-complete{color:#88dd88;}
.t-date.t-notinplan{color:#bbb;}
@media(max-width:560px){.t-date{display:none;}}

/* ── SAMPURNA ── */
.sampurna-wrap{position:relative;z-index:10;padding:14px 18px;border-top:2px solid var(--border-dark);background:var(--warm-white);}
.sampurna-box{border-radius:13px;padding:18px;text-align:center;}
.sampurna-box.locked{background:var(--warm-white);border:2px dashed var(--gold-pale);}
.sampurna-box.unlocked{background:linear-gradient(135deg,var(--gold-pale),#fff9ee);border:2px solid var(--gold);}
.sampurna-ico{font-size:34px;margin-bottom:5px;}
.sampurna-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;color:var(--amber);letter-spacing:2px;margin-bottom:4px;}
.sampurna-sub{font-size:13px;font-weight:700;color:var(--soft);line-height:1.7;margin-bottom:8px;}
.sampurna-prog{height:6px;background:var(--gold-pale);border-radius:3px;overflow:hidden;max-width:240px;margin:0 auto;}
.sampurna-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--gold));border-radius:3px;transition:width .8s ease;}

function getPlanActive(){

  if(sessionStorage.getItem('rishi_admin_bypass') === '1') return '__all__';
  var st = {};
  try { st = JSON.parse(localStorage.getItem('rishi_current_student')||'{}'); } catch(e){}

  if(sid) raw = localStorage.getItem('rishi_active_chapters_' + sid);
  if(!raw) raw = localStorage.getItem('rishi_active_chapters'); // fallback
  try { return raw ? JSON.parse(raw) : {}; } catch(e){ return {}; }
}
function fmtDateRange(s,e){
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var sa=s.split('-'),ea=e.split('-');
  var sd=parseInt(sa[2]),ed=parseInt(ea[2]),sm=parseInt(sa[1])-1,em=parseInt(ea[1])-1;
  if(sm===em) return sd+'-'+ed+' '+M[sm];
  return sd+' '+M[sm]+' - '+ed+' '+M[em];
}
function daysFromToday(dateStr){
  var t=new Date();t.setHours(0,0,0,0);
  var d=new Date(dateStr);d.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function chDateStatus(cid,active,chapDone){
  var ac=active[cid]||active[String(cid)];
  if(!ac) return null;
  var td=ac.targetDate||ac.target;var sd=ac.startDate||ac.start;
  if(!td) return null;
  if(chapDone) return {type:'complete',label:'Complete'};
  var diff=daysFromToday(td);
  if(diff<0) return {type:'overdue',label:Math.abs(diff)+' day'+(Math.abs(diff)!==1?'s':'')+' overdue'};
  return {type:'scheduled',label:fmtDateRange(sd,td)};
}
function topicDateStatus(chapterIds,active,hasPlan){
  var inPlan=chapterIds.filter(function(cid){
    var ac=active[cid]||active[String(cid)];
    return ac&&(ac.targetDate||ac.target);
  });
  if(!inPlan.length) return hasPlan?{type:'notinplan',label:'Not in plan'}:null;
  var allDone=true,maxOver=0,minStart=null,maxTarget=null;
  for(var i=0;i<inPlan.length;i++){
    var cid=inPlan[i];var ac=active[cid]||active[String(cid)];
    var td=ac.targetDate||ac.target;var sd=ac.startDate||ac.start;
    if(!isChapExamDone(cid)) allDone=false;
    var diff=daysFromToday(td);
    if(diff<0) maxOver=Math.max(maxOver,Math.abs(diff));
    if(!minStart||sd<minStart) minStart=sd;
    if(!maxTarget||td>maxTarget) maxTarget=td;
  }
  if(allDone) return {type:'complete',label:'Done'};
  if(maxOver>0) return {type:'overdue',label:maxOver+'d overdue'};
  return {type:'scheduled',label:fmtDateRange(minStart,maxTarget)};
}

function buildTopicRail(){

    html+='<button class="topic-btn'+(isAct?' active':'')+'" id="tbtn-'+t.id+'" onclick="selectTopic(\''+t.id+'\')">';
    html+='<span class="t-icon">'+t.icon+'</span>';

    html+='<span class="t-count">'+done+'/'+t.chapters.length+'</span>';

function toggleChapter(cid){
  var body=G('cbody-'+cid),arrow=G('carr-'+cid),card=G('chcard-'+cid);
  if(!body) return;
  var open=body.classList.contains('open');
  // Close all other chapters first
  if(!open){
    var allBodies=document.querySelectorAll('.ch-body.open');
    allBodies.forEach(function(b){
      b.classList.remove('open');
      var id=b.id.replace('cbody-','');
      var a=G('carr-'+id); if(a) a.classList.remove('open');
      var c=G('chcard-'+id); if(c) c.classList.remove('expanded');
    });
  }
  body.classList.toggle('open',!open);
  if(arrow) arrow.classList.toggle('open',!open);
  if(card)  card.classList.toggle('expanded',!open);
}

    html+='<div style="font-family:Orbitron,sans-serif;font-size:18px;font-weight:900;color:'+it.col+'">'+it.val+'<span style="font-size:11px;color:var(--soft)">/'+it.tot+'</span></div>';
    html+='<div style="font-size:10px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;">'+it.lbl+'</div>';
    html+='<div style="height:4px;background:var(--gold-pale);border-radius:2px;margin-top:5px;overflow:hidden;"><div style="height:100%;width:'+pct+'%;background:'+it.col+';border-radius:2px;transition:width .8s ease;"></div></div>';
    html+='</div>';
  }
  G('statsBar').innerHTML=html;
}


/* ── Init ── */
window.onload=function(){
  var params=new URLSearchParams(window.location.search);
  var st={};
  try{st=JSON.parse(localStorage.getItem('rishi_current_student')||'{}');}catch(e){}
  if(params.get('board')) st.board=params.get('board');
  if(params.get('class')) st.class=params.get('class');
  localStorage.setItem('rishi_current_student',JSON.stringify(st));
  var name=(st.studentName||'Student').split(' ')[0];
  G('hdrName').textContent=name;
  G('wName').textContent=name;
  G('wSub').textContent='Class '+(st.class||8)+' · '+(st.board||'CBSE')+' Mathematics';
  loadClassData(parseInt(st.class||8));
  activeTopic = sessionStorage.getItem('rishi_syllabus_topic') || TOPICS[0].id;
  buildTopicRail();
  buildChapterList();
  renderSampurna();
  renderStats();
};
</script>
<!-- LEADERBOARD MODAL -->
<div id="lb-modal" style="display:none;position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:20px;padding:28px;width:90%;max-width:460px;max-height:85vh;overflow-y:auto;font-family:'Nunito',sans-serif;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div style="font-size:20px;font-weight:900;color:#1c1c1c;">🏆 Leaderboard</div>
      <button onclick="document.getElementById('lb-modal').style.display='none'" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;">✕</button>
    </div>
    <div id="lb-list"></div>
  </div>
</div>
<script>
function showLeaderboard() {
  var regs = [];
  try { regs = JSON.parse(localStorage.getItem('rishi_registrations') || '[]'); } catch(e) {}
  var cur = {};
  try { cur = JSON.parse(localStorage.getItem('rishi_current_student') || '{}'); } catch(e) {}
  var myCoins = parseInt(localStorage.getItem('rishi_coins') || '0');
  var entries = regs.map(function(r) {
    return { name: r.studentName || 'Student', id: r.studentUsername || '—', coins: myCoins };
  });
  if (!entries.find(function(e){ return e.id === (cur.studentUsername||cur.studentId); })) {
    entries.push({ name: cur.studentName || 'You', id: cur.studentUsername||cur.studentId||'—', coins: myCoins });
  }
  entries.sort(function(a,b){ return b.coins - a.coins; });
  var medals = ['🥇','🥈','🥉'];
  var myId = (cur.studentUsername || cur.studentId || '').toLowerCase();
  var html = '';
  entries.forEach(function(e, i) {
    var isMe = (e.id||'').toLowerCase() === myId;
    var medal = medals[i] || ((i+1) + '.');
    html += '<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;margin-bottom:8px;background:' + (isMe ? '#f0fdf4' : (i<3?'#fffbf0':'#f9fafb')) + ';border:1px solid ' + (isMe ? '#86efac' : (i<3?'#fcd34d':'#e5e7eb')) + ';">';
    html += '<div style="font-size:22px;width:32px;text-align:center;">' + medal + '</div>';
    html += '<div style="flex:1;"><div style="font-weight:800;font-size:15px;color:#1c1c1c;">' + e.name + (isMe?' <span style="font-size:11px;background:#86efac;padding:2px 6px;border-radius:6px;color:#166534;">You</span>':'') + '</div><div style="font-size:12px;color:#999;">' + e.id + '</div></div>';
    html += '<div style="font-size:16px;font-weight:900;color:#d97706;">🪙 ' + e.coins + '</div>';
    html += '</div>';
  });
  if(!html) html = '<div style="text-align:center;padding:24px;color:#999;">No data yet. Start earning coins!</div>';
  document.getElementById('lb-list').innerHTML = html;
  document.getElementById('lb-modal').style.display = 'flex';
}
</script>
