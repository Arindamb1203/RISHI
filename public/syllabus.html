<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RISHI — My Study Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#fdf6ec; --warm-white:#fffdf8; --gold:#c8922a; --gold-light:#e8b84b;
  --gold-pale:#f5e6c8; --amber:#d4870a; --sage:#7a8c6e; --sage-light:#a8b89a;
  --rust:#b85c2a; --charcoal:#2a2218; --mid:#5a4a30; --soft:#8a7a5a;
  --green:#4a8a4a; --green-pale:#eef5ee; --green-border:#a8c8a8;
  --red:#c0392b; --red-pale:#fdf0ee; --red-border:#e8a8a0;
  --amber-pale:#fff8ee; --amber-border:#e8c87a;
  --border-dark:#6b4c2a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);font-family:'Nunito',sans-serif;min-height:100vh;color:var(--charcoal);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--gold-pale) 1px,transparent 1px),linear-gradient(90deg,var(--gold-pale) 1px,transparent 1px);background-size:40px 40px;opacity:.3;z-index:0;pointer-events:none;}
body::after{content:'RISHI';position:fixed;bottom:-40px;right:-30px;font-family:'Orbitron',sans-serif;font-size:220px;font-weight:900;color:var(--gold-pale);opacity:.15;z-index:0;pointer-events:none;}
.orb{position:fixed;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle at 40% 40%,var(--gold-light),var(--amber),#8a4a10);border-radius:50%;opacity:.18;z-index:0;animation:pulse 4s ease-in-out infinite;pointer-events:none;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.18;}50%{transform:scale(1.06);opacity:.24;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* HEADER */
.hdr{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1.5px solid var(--gold-pale);background:rgba(253,246,236,.95);backdrop-filter:blur(4px);}
.hdr-logo{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--amber),var(--gold-light),var(--rust));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.hdr-name{font-size:13px;font-weight:800;color:var(--mid);}
.btn-sm-hdr{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;padding:6px 13px;border-radius:8px;border:1.5px solid var(--gold-pale);background:transparent;color:var(--soft);cursor:pointer;transition:all .2s;}
.btn-sm-hdr:hover{border-color:var(--amber);color:var(--amber);}

/* MAIN */
.main{position:relative;z-index:10;max-width:900px;margin:0 auto;padding:22px 16px 60px;}

/* WELCOME */
.welcome{background:linear-gradient(135deg,var(--warm-white),var(--gold-pale));border:2px solid var(--border-dark);border-radius:18px;padding:20px 24px;margin-bottom:16px;animation:fadeUp .4s ease;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.w-name{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:var(--amber);}
.w-sub{font-size:12px;font-weight:700;color:var(--mid);margin-top:2px;}
.rishika-badge{display:flex;align-items:center;gap:8px;background:white;border:1.5px solid var(--gold-pale);border-radius:12px;padding:8px 14px;flex-shrink:0;}
.rishika-ico{font-size:24px;}
.rishika-txt{font-size:11px;font-weight:800;color:var(--mid);line-height:1.5;}

/* STATUS BANNER — only shown when plan exists */
.status-banner{border-radius:14px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;border:2px solid;animation:fadeUp .4s ease;}
.sb-on{background:var(--green-pale);border-color:var(--green-border);}
.sb-behind{background:var(--red-pale);border-color:var(--red-border);}
.sb-ahead{background:var(--amber-pale);border-color:var(--amber-border);}
.sb-ico{font-size:28px;flex-shrink:0;}
.sb-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;margin-bottom:2px;}
.sb-on .sb-title{color:var(--green);}
.sb-behind .sb-title{color:var(--red);}
.sb-ahead .sb-title{color:var(--amber);}
.sb-sub{font-size:12px;font-weight:700;color:var(--soft);}
.sb-right{margin-left:auto;text-align:right;flex-shrink:0;}
.sb-pct{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;}
.sb-on .sb-pct{color:var(--green);}
.sb-behind .sb-pct{color:var(--red);}
.sb-ahead .sb-pct{color:var(--amber);}
.sb-pct-lbl{font-size:9px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.8px;}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
@media(max-width:580px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--warm-white);border:1.5px solid var(--gold-pale);border-radius:12px;padding:14px;text-align:center;animation:fadeUp .5s ease;}
.kpi-n{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--amber);line-height:1;}
.kpi-l{font-size:9px;font-weight:800;color:var(--soft);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;}
.kpi-sub{font-size:9px;font-weight:700;color:var(--sage);margin-top:1px;}

/* SECTION TITLE */
.sec-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin:22px 0 12px;display:flex;align-items:center;gap:10px;}
.sec-title::after{content:'';flex:1;height:1.5px;background:linear-gradient(90deg,var(--gold-pale),transparent);}

/* CHAPTER GRID — always shown */
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.ch-card{background:var(--warm-white);border:1.5px solid var(--gold-pale);border-radius:14px;overflow:hidden;animation:fadeUp .5s ease;transition:box-shadow .2s,border-color .2s;}
.ch-card:hover{box-shadow:0 4px 20px rgba(200,146,42,.12);border-color:var(--gold);}

/* schedule stripe */
.ch-card.on-track{border-top:3px solid var(--green);}
.ch-card.behind{border-top:3px solid var(--red);}
.ch-card.ahead{border-top:3px solid var(--amber);}
.ch-card.done{border-top:3px solid var(--sage);}

.ch-top{display:flex;align-items:flex-start;gap:10px;padding:14px 14px 10px;}
.ch-num{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;color:white;flex-shrink:0;margin-top:1px;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:13px;font-weight:800;color:var(--charcoal);line-height:1.3;margin-bottom:2px;}
.ch-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.ch-topic-tag{font-size:9px;font-weight:700;color:var(--soft);text-transform:uppercase;letter-spacing:.5px;}
.ch-sched-badge{font-size:8px;font-weight:800;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.badge-on{background:var(--green-pale);color:var(--green);}
.badge-behind{background:var(--red-pale);color:var(--red);}
.badge-ahead{background:var(--amber-pale);color:var(--amber);}
.badge-done{background:var(--green-pale);color:var(--sage);}

/* Progress bar */
.ch-prog{padding:0 14px 8px;display:flex;align-items:center;gap:8px;}
.ch-prog-track{flex:1;height:4px;background:var(--gold-pale);border-radius:2px;overflow:hidden;}
.ch-prog-fill{height:100%;border-radius:2px;}
.ch-prog-pct{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--soft);width:26px;text-align:right;flex-shrink:0;}

/* Schedule info strip */
.ch-sched-strip{background:rgba(245,230,200,.3);border-top:1px solid var(--gold-pale);padding:7px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sched-item{font-size:9px;font-weight:700;color:var(--soft);}
.sched-item span{color:var(--charcoal);}
.days-chip{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:900;margin-left:auto;}

/* Action buttons */
.ch-actions{padding:10px 14px;display:flex;gap:7px;}
.btn-explain{font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;text-align:center;flex:1;}
.btn-active{background:linear-gradient(135deg,var(--amber),var(--gold-light));color:white;box-shadow:0 2px 10px rgba(212,135,10,.25);}
.btn-active:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(212,135,10,.35);}
.btn-done{background:var(--green-pale);color:var(--green);border:1px solid var(--green-border);}
.btn-done:hover{opacity:.85;}
.btn-locked{background:var(--gold-pale);color:var(--soft);cursor:not-allowed;}
.btn-plan-locked{background:#f0f0f0;color:#bbb;cursor:not-allowed;border:1px solid #e0e0e0;}

/* No plan notice */
.no-plan-notice{background:var(--warm-white);border:1.5px dashed var(--gold-pale);border-radius:14px;padding:18px 20px;margin-bottom:18px;text-align:center;animation:fadeUp .4s ease;}
.no-plan-notice .ico{font-size:32px;margin-bottom:6px;}
.no-plan-notice .txt{font-size:13px;font-weight:700;color:var(--soft);line-height:1.7;}

/* Exam placeholder */
.exam-placeholder{background:var(--warm-white);border:2px dashed var(--gold-pale);border-radius:14px;padding:24px;text-align:center;margin-top:8px;}
.exam-placeholder .ico{font-size:32px;margin-bottom:8px;}
.exam-placeholder .ttl{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--amber);font-weight:700;letter-spacing:2px;margin-bottom:6px;}
.exam-placeholder .sub{font-size:12px;font-weight:700;color:var(--soft);line-height:1.7;}

@media(max-width:600px){.welcome{flex-direction:column;}.ch-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="orb"></div>

<header class="hdr">
  <div class="hdr-logo">RISHI</div>
  <div class="hdr-right">
    <div class="hdr-name" id="hdr-name"></div>
    <button class="btn-sm-hdr" onclick="logout()">← Logout</button>
  </div>
</header>

<div class="main">

  <!-- WELCOME -->
  <div class="welcome">
    <div>
      <div class="w-name" id="w-name">Student</div>
      <div class="w-sub" id="w-sub">Class 8 · CBSE Mathematics</div>
    </div>
    <div class="rishika-badge">
      <div class="rishika-ico">🦊</div>
      <div class="rishika-txt">Rishika is by<br>your side today!</div>
    </div>
  </div>

  <!-- STATUS BANNER — only if plan exists -->
  <div id="status-section"></div>

  <!-- KPI ROW — only if plan exists -->
  <div id="kpi-section"></div>

  <!-- SCHEDULE SECTION — only if plan exists -->
  <div id="sched-section"></div>

  <!-- ALL CHAPTERS — always shown -->
  <div class="sec-title" id="all-ch-title">📚 All Chapters</div>
  <div class="ch-grid" id="ch-grid"></div>

  <!-- SAMPURNA PARIKSHA -->
  <div class="sec-title" style="margin-top:28px;">🏆 Sampurna Pariksha</div>
  <div id="sampurna-section"></div>

</div>

<script>
var CHAPTERS = [
  {id:1,  name:"Rational Numbers",                    topic:"Arithmetic",    explainPath:"",                                                              built:false},
  {id:2,  name:"Linear Equations",                    topic:"Algebra",       explainPath:"/explain/algebra/linear-equations.html",                        built:true},
  {id:3,  name:"Understanding Quadrilaterals",         topic:"Geometry",      explainPath:"/explain/geometry/understanding-quadrilaterals.html",            built:true},
  {id:4,  name:"Practical Geometry",                  topic:"Geometry",      explainPath:"/explain/geometry/practical-geometry.html",                      built:true},
  {id:5,  name:"Data Handling",                       topic:"Statistics",    explainPath:"",                                                              built:false},
  {id:6,  name:"Squares and Square Roots",            topic:"Number System", explainPath:"",                                                              built:false},
  {id:7,  name:"Cubes and Cube Roots",                topic:"Number System", explainPath:"",                                                              built:false},
  {id:8,  name:"Comparing Quantities",                topic:"Arithmetic",    explainPath:"",                                                              built:false},
  {id:9,  name:"Algebraic Expressions & Identities",  topic:"Algebra",       explainPath:"/explain/algebra/algebraic-expressions-identities.html",         built:true},
  {id:10, name:"Visualising Solid Shapes",            topic:"Geometry",      explainPath:"",                                                              built:false},
  {id:11, name:"Mensuration",                         topic:"Geometry",      explainPath:"/explain/mensuration/area-plane-figures.html",                   built:true},
  {id:12, name:"Exponents and Powers",                topic:"Number System", explainPath:"",                                                              built:false},
  {id:13, name:"Direct & Inverse Proportions",        topic:"Arithmetic",    explainPath:"",                                                              built:false},
  {id:14, name:"Factorisation",                       topic:"Algebra",       explainPath:"",                                                              built:false},
  {id:15, name:"Introduction to Graphs",              topic:"Algebra",       explainPath:"/explain/algebra/introduction-to-graphs.html",                   built:true},
  {id:16, name:"Playing with Numbers",                topic:"Arithmetic",    explainPath:"",                                                              built:false}
];

var CH_COLORS=["#6C63FF","#2563EB","#059669","#0D9488","#D97706","#DC2626","#EA580C","#7C3AED","#0891B2","#16A34A","#B45309","#4338CA","#DB2777","#65A30D","#0284C7","#7E22CE"];

function toDateStr(d){var y=d.getFullYear(),m=('0'+(d.getMonth()+1)).slice(-2),dd=('0'+d.getDate()).slice(-2);return y+'-'+m+'-'+dd;}
function daysBetween(a,b){if(!a||!b)return 0;return Math.round((new Date(b)-new Date(a))/86400000);}
function fmtDate(s){if(!s)return '—';var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],p=s.split('-');return parseInt(p[2])+' '+M[parseInt(p[1])-1];}
function getCh(id){for(var i=0;i<CHAPTERS.length;i++)if(CHAPTERS[i].id===id)return CHAPTERS[i];return null;}

function logout(){localStorage.removeItem('rishi_current_student');window.location.href='/login.html';}

function loadData(){
  var active={},progress={},student={};
  try{active=JSON.parse(localStorage.getItem('rishi_active_chapters')||'{}');}catch(e){}
  try{progress=JSON.parse(localStorage.getItem('rishi_chapter_progress')||'{}');}catch(e){}
  try{student=JSON.parse(localStorage.getItem('rishi_current_student')||'{}');}catch(e){}
  return {active:active,progress:progress,student:student};
}

function getSchedStatus(cid, ac, pr, today){
  var completed=pr.completed||0, total=pr.total||15;
  var compRatio=total>0?completed/total:0;
  if(compRatio>=1) return {type:'done',label:'✓ Done'};
  var dLeft=daysBetween(today,ac.targetDate);
  if(dLeft<0) return {type:'behind',label:'Past Due'};
  var span=daysBetween(ac.startDate,ac.targetDate)||1;
  var elapsed=daysBetween(ac.startDate,today);
  var expected=Math.min(1,Math.max(0,elapsed/span));
  var diff=compRatio-expected;
  if(diff>= 0.1) return {type:'ahead',label:'Ahead ↑'};
  if(diff<-0.2) return {type:'behind',label:'Behind ↓'};
  return {type:'on',label:'On track ✓'};
}

function render(){
  var d=loadData();
  var today=toDateStr(new Date());

  // Student header
  var name=(d.student.studentName||'Student').split(' ')[0];
  document.getElementById('hdr-name').textContent=name;
  document.getElementById('w-name').textContent=name;
  document.getElementById('w-sub').textContent='Class '+(d.student.class||8)+' · '+(d.student.board||'CBSE')+' Mathematics';

  var schedIds=Object.keys(d.active).map(Number).sort(function(a,b){return a-b;});
  var hasPlan=schedIds.length>0;

  if(hasPlan){
    renderStatusAndKPIs(schedIds, d, today);
    renderScheduleSection(schedIds, d, today);
    document.getElementById('all-ch-title').textContent='📚 All 16 Chapters';
  } else {
    document.getElementById('status-section').innerHTML='<div class="no-plan-notice"><div class="ico">📋</div><div class="txt">Your parent hasn\'t set a study plan yet.<br>Meanwhile, explore the explain sessions below — they\'re ready for you!</div></div>';
  }

  renderAllChapters(schedIds, d, today);
}

function renderStatusAndKPIs(schedIds, d, today){
  var totalQ=0,doneQ=0,totalSess=0,chDone=0;
  var behindCount=0,aheadCount=0,onCount=0;
  var maxTarget=null;

  for(var i=0;i<schedIds.length;i++){
    var cid=schedIds[i];
    var pr=d.progress[cid]||{};
    var ac=d.active[cid];
    totalQ+=(pr.total||15);
    doneQ+=(pr.completed||0);
    totalSess+=(pr.sessions||0);
    if((pr.completed||0)>=(pr.total||15)&&pr.total>0) chDone++;
    if(ac&&ac.targetDate&&(!maxTarget||ac.targetDate>maxTarget)) maxTarget=ac.targetDate;
    var st=getSchedStatus(cid,ac,pr,today);
    if(st.type==='behind') behindCount++;
    else if(st.type==='ahead') aheadCount++;
    else if(st.type==='on') onCount++;
  }

  var overallPct=totalQ>0?Math.round(doneQ/totalQ*100):0;
  var daysLeft=maxTarget?daysBetween(today,maxTarget):null;

  // Status banner
  var cls,ico,title,sub;
  if(behindCount>0){
    cls='sb-behind';ico='⚠️';
    title='Behind on '+behindCount+' chapter'+(behindCount>1?'s':'');
    sub='Extra effort needed this week — you can catch up!';
  } else if(aheadCount>0){
    cls='sb-ahead';ico='🚀';
    title='Ahead of schedule!';
    sub=aheadCount+' chapter'+(aheadCount>1?'s':'')+' ahead of plan. Keep going!';
  } else {
    cls='sb-on';ico='✅';
    title='Right on schedule!';
    sub='Consistent effort every day. Well done!';
  }

  document.getElementById('status-section').innerHTML=
    '<div class="status-banner '+cls+'">'+
    '<div class="sb-ico">'+ico+'</div>'+
    '<div><div class="sb-title">'+title+'</div><div class="sb-sub">'+sub+'</div></div>'+
    '<div class="sb-right"><div class="sb-pct">'+overallPct+'%</div><div class="sb-pct-lbl">Overall Done</div></div>'+
    '</div>';

  document.getElementById('kpi-section').innerHTML=
    '<div class="kpi-row">'+
    '<div class="kpi"><div class="kpi-n">'+schedIds.length+'</div><div class="kpi-l">Chapters</div><div class="kpi-sub">In plan</div></div>'+
    '<div class="kpi"><div class="kpi-n">'+(daysLeft!==null&&daysLeft>=0?daysLeft+'d':daysLeft!==null?'Past':'—')+'</div><div class="kpi-l">Days Left</div><div class="kpi-sub">'+(maxTarget?'target '+fmtDate(maxTarget):'to final target')+'</div></div>'+
    '<div class="kpi"><div class="kpi-n">'+chDone+'</div><div class="kpi-l">Completed</div><div class="kpi-sub">Of '+schedIds.length+' chapters</div></div>'+
    '<div class="kpi"><div class="kpi-n">'+totalSess+'</div><div class="kpi-l">Sessions</div><div class="kpi-sub">Total practice</div></div>'+
    '</div>';
}

function renderScheduleSection(schedIds, d, today){
  // Only show schedule section if plan exists — it's a compact list view
  var html='<div class="sec-title">📅 My Study Schedule</div>';
  html+='<div style="background:var(--warm-white);border:1.5px solid var(--gold-pale);border-radius:14px;overflow:hidden;margin-bottom:4px;">';
  for(var i=0;i<schedIds.length;i++){
    var cid=schedIds[i];
    var ch=getCh(cid);
    if(!ch) continue;
    var pr=d.progress[cid]||{};
    var ac=d.active[cid];
    var st=getSchedStatus(cid,ac,pr,today);
    var dLeft=ac&&ac.targetDate?daysBetween(today,ac.targetDate):null;
    var compPct=Math.round((pr.completed||0)/(pr.total||15)*100);
    var progCol=compPct>=75?'var(--green)':compPct>=50?'var(--amber)':'var(--red)';
    var dlCol=dLeft===null?'var(--soft)':dLeft<=3?'var(--red)':dLeft<=7?'var(--amber)':'var(--green)';
    var dlTxt=st.type==='done'?'Done':dLeft!==null&&dLeft>=0?dLeft+'d left':dLeft!==null?'Past due':'—';
    var badgeCls=st.type==='on'?'badge-on':st.type==='behind'?'badge-behind':st.type==='ahead'?'badge-ahead':st.type==='done'?'badge-done':'';
    html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--gold-pale);">';
    html+='<div style="width:28px;height:28px;border-radius:7px;background:'+CH_COLORS[cid-1]+';display:flex;align-items:center;justify-content:center;font-family:\'Share Tech Mono\',monospace;font-size:11px;font-weight:700;color:white;flex-shrink:0;">'+cid+'</div>';
    html+='<div style="flex:1;min-width:0;">';
    html+='<div style="font-size:12px;font-weight:800;color:var(--charcoal);">'+ch.name+'</div>';
    html+='<div style="display:flex;align-items:center;gap:6px;margin-top:3px;">';
    html+='<div style="flex:1;height:3px;background:var(--gold-pale);border-radius:2px;overflow:hidden;"><div style="height:100%;width:'+compPct+'%;background:'+progCol+';border-radius:2px;"></div></div>';
    html+='<span style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--soft);">'+compPct+'%</span>';
    html+='</div></div>';
    html+='<span class="ch-sched-badge '+badgeCls+'">'+st.label+'</span>';
    html+='<div style="text-align:right;flex-shrink:0;"><div style="font-family:\'Orbitron\',sans-serif;font-size:13px;font-weight:900;color:'+dlCol+';">'+dlTxt+'</div></div>';
    html+='</div>';
  }
  html+='</div>';
  document.getElementById('sched-section').innerHTML=html;
}

function isExplainDone(cid){
  if(localStorage.getItem("rishi_explain_done_"+cid)==="1") return true;
  var LEGACY={2:"explain_linear_done",3:"explain_quadrilaterals_done",4:"explain_practical_done",9:"explain_algebraic_done",11:"explain_area_done",15:"explain_graphs_done"};
  if(LEGACY[cid]){var p={};try{p=JSON.parse(localStorage.getItem("rishi_progress")||"{}");}catch(e){}if(p[LEGACY[cid]])return true;}
  return false;
}
function isPracticeDone(cid){return localStorage.getItem("rishi_practice_done_"+cid)==="1";}
function isChapExamDone(cid){return localStorage.getItem("rishi_chapexam_done_"+cid)==="1";}

function renderAllChapters(schedIds, d, today){
  var hasPlan=schedIds.length>0;
  var html='';
  for(var i=0;i<CHAPTERS.length;i++){
    var ch=CHAPTERS[i]; var cid=ch.id;
    var color=CH_COLORS[cid-1];
    var pr=d.progress[cid]||{};
    var ac=d.active[cid];
    var compPct=Math.round((pr.completed||0)/(pr.total||15)*100);
    var progCol=compPct>=75?'var(--green)':compPct>=50?'var(--amber)':'#ccc';
    var isInPlan=schedIds.indexOf(cid)>-1;
    var explainDone=isExplainDone(cid);
    var practiceDone=isPracticeDone(cid);
    var chapExamDone=isChapExamDone(cid);

    var cardCls='ch-card', schedBadge='', schedStrip='';
    if(isInPlan && ac){
      var st=getSchedStatus(cid,ac,pr,today);
      var dLeft=daysBetween(today,ac.targetDate);
      var dlCol=dLeft<=3?'var(--red)':dLeft<=7?'var(--amber)':'var(--green)';
      cardCls+=' '+st.type;
      var bCls=st.type==='on'?'badge-on':st.type==='behind'?'badge-behind':st.type==='ahead'?'badge-ahead':st.type==='done'?'badge-done':'';
      schedBadge='<span class="ch-sched-badge '+bCls+'" style="margin-left:4px;">'+st.label+'</span>';
      var dlTxt=st.type==='done'?'Done':(dLeft>=0?dLeft+'d left':'Overdue');
      schedStrip='<div class="ch-sched-strip">'+
        '<span class="sched-item">Start: <span>'+fmtDate(ac.startDate)+'</span></span>'+
        '<span class="sched-item">Target: <span>'+fmtDate(ac.targetDate)+'</span></span>'+
        '<span class="days-chip" style="color:'+dlCol+';">'+dlTxt+'</span>'+
        '</div>';
    }

    html+='<div class="'+cardCls+'">';
    html+='<div class="ch-top">';
    html+='<div class="ch-num" style="background:'+color+'">'+cid+'</div>';
    html+='<div class="ch-info">';
    html+='<div class="ch-name">'+ch.name+'</div>';
    html+='<div class="ch-meta"><span class="ch-topic-tag">'+ch.topic+'</span>'+schedBadge+'</div>';
    html+='</div></div>';

    if(compPct>0){
      html+='<div class="ch-prog"><span style="font-size:9px;font-weight:700;color:var(--soft);width:52px;flex-shrink:0;">Practice</span><div class="ch-prog-track"><div class="ch-prog-fill" style="width:'+compPct+'%;background:'+progCol+'"></div></div><span class="ch-prog-pct">'+compPct+'%</span></div>';
    }
    if(schedStrip) html+=schedStrip;

    html+='<div class="ch-actions">';

    if(hasPlan && !isInPlan){
      html+='<span class="btn-explain btn-plan-locked" style="flex:1;text-align:center;">🔒 Not in your plan</span>';
      html+='</div></div>';
      continue;
    }

    /* EXPLAIN */
    if(!ch.built){
      html+='<span class="btn-explain btn-locked">📖 Explain — Coming Soon</span>';
    } else if(explainDone){
      html+='<a href="'+ch.explainPath+'" class="btn-explain btn-done">✓ Re-watch</a>';
    } else {
      html+='<a href="'+ch.explainPath+'" class="btn-explain btn-active">📖 Watch Explain</a>';
    }

    /* PRACTICE */
    if(!explainDone){
      html+='<span class="btn-explain btn-locked">✏️ Explain first</span>';
    } else if(practiceDone){
      html+='<span class="btn-explain btn-done">✓ Practice Done</span>';
    } else {
      html+='<span class="btn-explain btn-locked">✏️ Practice — Coming Soon</span>';
    }

    /* CHAPTER EXAM */
    if(!practiceDone){
      html+='<span class="btn-explain btn-locked">📝 Practice first</span>';
    } else if(chapExamDone){
      html+='<span class="btn-explain btn-done">✓ Exam Done</span>';
    } else {
      html+='<span class="btn-explain btn-locked">📝 Exam — Coming Soon</span>';
    }

    html+='</div></div>';
  }
  document.getElementById('ch-grid').innerHTML=html;
  renderSampurnaPariksha();
}

function renderSampurnaPariksha(){
  var examsDone=0;
  for(var i=0;i<CHAPTERS.length;i++){if(isChapExamDone(CHAPTERS[i].id))examsDone++;}
  var allDone=(examsDone===16);
  var pct=Math.round(examsDone/16*100);
  var html='';
  if(allDone){
    html='<div style="background:linear-gradient(135deg,var(--gold-pale),#fff9ee);border:2px solid var(--gold);border-radius:16px;padding:24px;text-align:center;">'+
      '<div style="font-size:42px;margin-bottom:8px;">🏆</div>'+
      '<div style="font-family:Orbitron,sans-serif;font-size:14px;color:var(--amber);font-weight:900;letter-spacing:2px;margin-bottom:6px;">SAMPURNA PARIKSHA</div>'+
      '<div style="font-size:12px;font-weight:700;color:var(--mid);margin-bottom:16px;">All 16 chapters mastered! You are ready for the grand exam.</div>'+
      '<span class="btn-explain btn-locked" style="max-width:240px;margin:0 auto;display:block;">📝 Full Exam — Coming Soon</span></div>';
  } else {
    html='<div style="background:var(--warm-white);border:2px dashed var(--gold-pale);border-radius:16px;padding:22px;text-align:center;">'+
      '<div style="font-size:32px;margin-bottom:6px;">🏆</div>'+
      '<div style="font-family:Orbitron,sans-serif;font-size:11px;color:var(--amber);font-weight:700;letter-spacing:2px;margin-bottom:4px;">SAMPURNA PARIKSHA</div>'+
      '<div style="font-size:12px;font-weight:700;color:var(--soft);line-height:1.7;margin-bottom:10px;">Complete all 16 chapter exams to unlock the full syllabus exam.<br>'+examsDone+' of 16 chapters done.</div>'+
      '<div style="height:5px;background:var(--gold-pale);border-radius:3px;overflow:hidden;max-width:260px;margin:0 auto;">'+
      '<div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,var(--sage),var(--gold));border-radius:3px;"></div></div></div>';
  }
  document.getElementById('sampurna-section').innerHTML=html;
}


window.onload=function(){
  var params=new URLSearchParams(window.location.search);
  var student={};
  try{student=JSON.parse(localStorage.getItem('rishi_current_student')||'{}');}catch(e){}
  if(params.get('board')) student.board=params.get('board');
  if(params.get('class')) student.class=params.get('class');
  localStorage.setItem('rishi_current_student',JSON.stringify(student));
  render();
};
</script>
