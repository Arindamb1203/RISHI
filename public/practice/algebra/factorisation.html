    <script src="../../rishi-core.js"></script>
    <script>
        // TEST MODE: Add ?test=true to URL to bypass plan check
        const urlParams = new URLSearchParams(window.location.search);
        const isTestMode = urlParams.get('test') === 'true';
        
        // State management
        let currentQuestionIndex = 0;
        let correctStreak = 0;
        let session = 1;
        let coins = parseInt(localStorage.getItem('rishi_coins') || '0');
        let answeredQuestions = [];
        let isSecondSession = false;
        let currentQuestions = [];
        let breakStartTime = null;
        let breakTimerInterval = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Check if chapter is in plan (skip if test mode)
            if (!isTestMode && typeof rishiCheckPlan === 'function') {
                rishiCheckPlan('factorisation');
            } else if (isTestMode) {
                console.log('TEST MODE: Bypassing plan check');
            }
            
            // Load coins
            updateCoinDisplay();
            
            // Initialize questions based on session
            initializeQuestions();
            
            // Create progress dots
            createProgressDots();
            
            // Load first question
            loadQuestion();
            
            // Setup voice recognition
            setupVoiceRecognition();
            
            // Enter key support
            document.getElementById('answerInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') checkAnswer();
            });
        });
        
        // ... rest of your functions remain the same ...
        
        function initializeQuestions() {
            // Check if coming from failed first session
            const savedProgress = localStorage.getItem('rishi_factorisation_progress');
            if (savedProgress) {
                const progress = JSON.parse(savedProgress);
                if (progress.session === 2 && !progress.completed) {
                    isSecondSession = true;
                    session = 2;
                    document.getElementById('sessionNum').textContent = '2 (Retry)';
                }
            }
            
            // Shuffle questions for variety between sessions
            currentQuestions = [...questionBank];
            if (isSecondSession) {
                // Reverse order for second session to give different feel
                currentQuestions.reverse();
            }
        }
        
        function createProgressDots() {
            const container = document.getElementById('progressBar');
            container.innerHTML = '';
            for (let i = 0; i < 15; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dot.textContent = i + 1;
                dot.id = `dot-${i}`;
                container.appendChild(dot);
            }
        }
        
        function updateProgressDots() {
            for (let i = 0; i < 15; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.classList.remove('current', 'correct', 'wrong');
                if (i < currentQuestionIndex) {
                    dot.classList.add(answeredQuestions[i] ? 'correct' : 'wrong');
                } else if (i === currentQuestionIndex) {
                    dot.classList.add('current');
                }
            }
        }
        
        function loadQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            document.getElementById('qNumber').textContent = `Question ${currentQuestionIndex + 1} of 15`;
            document.getElementById('qText').innerHTML = q.question;
            document.getElementById('currentQ').textContent = currentQuestionIndex + 1;
            document.getElementById('answerInput').value = '';
            document.getElementById('feedbackArea').className = 'feedback-area';
            updateProgressDots();
            
            // Rishika encouragement
            const encouragements = [
                "You've got this! Do the rough work first, then give me the answer.",
                "Take your time. Quality over speed!",
                "This one is tricky. Watch for the pattern!",
                "I believe in you! Show me what you've got.",
                "Remember the tricks we've learned. Apply them here!"
            ];
            if (currentQuestionIndex > 0) {
                document.getElementById('rishikaDialogue').textContent = encouragements[Math.floor(Math.random() * encouragements.length)];
            }
        }
        
        function checkAnswer() {
            const input = document.getElementById('answerInput').value.trim();
            if (!input) {
                alert('Please enter an answer!');
                return;
            }
            
            const q = currentQuestions[currentQuestionIndex];
            const normalizedInput = normalizeAnswer(input);
            const isCorrect = q.answer.some(ans => normalizeAnswer(ans) === normalizedInput);
            
            answeredQuestions.push(isCorrect);
            
            if (isCorrect) {
                handleCorrect(q);
            } else {
                handleWrong(q, input);
            }
        }
        
        function normalizeAnswer(ans) {
            return ans.toLowerCase()
                .replace(/\s+/g, '')
                .replace(/x²/g, 'x2')
                .replace(/²/g, '2')
                .replace(/³/g, '3')
                .replace(/equals/g, '=')
                .replace(/times/g, '*')
                .replace(/into/g, '*');
        }
        
        function handleCorrect(q) {
            correctStreak++;
            coins += 5;
            localStorage.setItem('rishi_coins', coins);
            updateCoinDisplay();
            document.getElementById('streakCount').textContent = correctStreak;
            
            const feedback = document.getElementById('feedbackArea');
            feedback.className = 'feedback-area correct';
            
            const foreignPhrases = [
                { phrase: "Sehr gut!", lang: "German", meaning: "Very good!" },
                { phrase: "Bravissimo!", lang: "Italian", meaning: "Excellent!" },
                { phrase: "Génial!", lang: "French", meaning: "Great!" },
                { phrase: "¡Excelente!", lang: "Spanish", meaning: "Excellent!" },
                { phrase: "Sugoi!", lang: "Japanese", meaning: "Amazing!" }
            ];
            const praise = foreignPhrases[Math.floor(Math.random() * foreignPhrases.length)];
            
            document.getElementById('feedbackTitle').textContent = `🎉 Correct! ${praise.phrase}`;
            document.getElementById('feedbackContent').innerHTML = `
                <p><strong>${praise.lang}:</strong> "${praise.meaning}"</p>
                <p>Keep it up! ${correctStreak >= 5 ? "🔥 Streak complete! You can now take the exam!" : `Only ${5 - correctStreak} more correct answers in a row to unlock the exam!`}</p>
            `;
            
            // Mark progress
            if (typeof rishiMarkPracticeDone === 'function') {
                rishiMarkPracticeDone('factorisation', (currentQuestionIndex + 1) / 15);
            }
            
            // Auto advance after delay
            setTimeout(() => {
                nextQuestion();
            }, 2500);
        }
        
        function handleWrong(q, userAnswer) {
            correctStreak = 0;
            document.getElementById('streakCount').textContent = correctStreak;
            
            const feedback = document.getElementById('feedbackArea');
            feedback.className = 'feedback-area wrong';
            
            let stepsHtml = q.steps.map((step, i) => `<div class="step">${step}</div>`).join('');
            
            document.getElementById('feedbackTitle').textContent = "❌ Not quite right. Let me show you:";
            document.getElementById('feedbackContent').innerHTML = `
                <p><strong>Your answer:</strong> <span class="error-highlight">${userAnswer}</span></p>
                <p><strong>Correct answer:</strong> ${q.answer[0]}</p>
                <div class="steps-box">
                    <strong>Step-by-step solution:</strong>
                    ${stepsHtml}
                </div>
                <p style="margin-top:15px;color:#ffd700"><strong>💡 Math Trick:</strong> ${q.trick}</p>
                <div class="understand-check">
                    <span>Did you understand?</span>
                    <button class="btn-yes" onclick="showSimilarQuestion()">Yes, I got it!</button>
                    <button class="btn-no" onclick="explainDifferently()">No, explain again</button>
                </div>
            `;
        }
        
        function showSimilarQuestion() {
            const q = currentQuestions[currentQuestionIndex];
            const feedback = document.getElementById('feedbackContent');
            feedback.innerHTML += `
                <div class="similar-question">
                    <strong>🎯 Try this similar question:</strong>
                    <p style="margin:10px 0">${q.similar.question}</p>
                    <button class="submit-btn" onclick="replaceWithSimilar()" style="padding:8px 20px;font-size:14px">Replace Current Question</button>
                </div>
            `;
        }
        
        function replaceWithSimilar() {
            const q = currentQuestions[currentQuestionIndex];
            q.question = q.similar.question;
            q.answer = q.similar.answer;
            loadQuestion();
            document.getElementById('feedbackArea').className = 'feedback-area';
        }
        
        function explainDifferently() {
            const q = currentQuestions[currentQuestionIndex];
            const feedback = document.getElementById('feedbackContent');
            
            // Add visual/real-life explanation
            const visualExplanations = {
                1: "Think of factorisation like finding the biggest box that can pack all items. 6xy is the biggest 'box' that fits into all three terms!",
                2: "Imagine splitting 15 apples into two groups that add to 8. You can have 3 and 5. That's how we split the middle term!",
                3: "The AC method is like finding the right key for a lock. We need factors that multiply to -36 and add to -5.",
                4: "Difference of squares is like (a+b) is forward and (a-b) is backward. Their product removes the middle term!",
                5: "Think of x⁴-16 like peeling an onion - one layer at a time until you reach the core!",
                6: "Sum of cubes is like (a+b) is the length, and the trinomial is the 'area' of the remaining space.",
                7: "Perfect square trinomial is like a square sandwich. The -9 is the plate underneath!",
                8: "Grouping is like sorting laundry - put similar terms together in baskets.",
                9: "First three terms form a perfect square 'team', then we battle with the last term using difference of squares!",
                10: "This is like rearranging books on a shelf to find a pattern. (x+1)(x+4) and (x+2)(x+3) both give x²+5x+something!",
                11: "Treat it like a puzzle. We need to find what multiplies to give each part!",
                12: "This identity is like a superhero formula. When you see a³+b³+c³-3abc, the hero (a+b+c) always appears!",
                13: "x⁶-y⁶ is like a double-decker bus. First floor: difference of squares. Second floor: sum/difference of cubes!",
                14: "Four factors at the end! It's like opening a gift box inside a gift box.",
                15: "Sophie Germain's trick: add and subtract the middle term to create a perfect square!"
            };
            
            feedback.innerHTML += `
                <div style="margin-top:20px;padding:15px;background:rgba(78,205,196,0.1);border-radius:10px;border-left:3px solid #4ecdc4">
                    <strong>🎨 Let me explain differently:</strong>
                    <p style="margin-top:10px">${visualExplanations[q.id] || "Let's look at this from another angle. The key is to identify the pattern first!"}</p>
                    <p style="margin-top:10px"><strong>Real-world connection:</strong> Factorisation is like breaking down a big problem into smaller, manageable pieces - just like organizing your study schedule!</p>
                </div>
                <div class="understand-check" style="margin-top:15px">
                    <span>Now do you understand?</span>
                    <button class="btn-yes" onclick="showSimilarQuestion()">Yes!</button>
                    <button class="btn-no" onclick="alert('Let\\'s try the original question again. Take your time!')">Still confused</button>
                </div>
            `;
        }
        
        function nextQuestion() {
            currentQuestionIndex++;
            
            if (currentQuestionIndex >= 15) {
                endSession();
            } else {
                loadQuestion();
            }
        }
        
        function endSession() {
            const correctCount = answeredQuestions.filter(a => a).length;
            const modal = document.getElementById('completionModal');
            const title = document.getElementById('completionTitle');
            const message = document.getElementById('completionMessage');
            const phrase = document.getElementById('foreignPhrase');
            const btn = document.getElementById('completionBtn');
            
            if (correctStreak >= 5 || (correctCount >= 5 && hasStreakOf5())) {
                // Success
                title.textContent = "🎉 Session Complete! Exam Unlocked!";
                message.innerHTML = `<p>Amazing work! You got ${correctCount}/15 correct with a streak of 5+!</p><p>Total coins earned: ${correctCount * 5} 🪙</p>`;
                phrase.textContent = "Mazel tov! (Hebrew: Congratulations!)";
                btn.textContent = "Go to Chapter Exam →";
                btn.onclick = () => window.location.href = '../../exam/algebra/factorisation.html';
                
                // Mark practice complete
                localStorage.setItem('rishi_practice_done_factorisation', 'true');
                localStorage.removeItem('rishi_factorisation_progress');
            } else {
                // Failed - need second session
                title.textContent = "📚 Session Complete - Let's Practice More!";
                message.innerHTML = `<p>You got ${correctCount}/15 correct, but need 5 correct in a row to unlock the exam.</p><p>Don't worry, practice makes perfect!</p>`;
                phrase.textContent = "Fall seven times, stand up eight (Japanese proverb)";
                btn.textContent = "Start New Practice Session";
                btn.onclick = () => {
                    localStorage.setItem('rishi_factorisation_progress', JSON.stringify({session: 2, completed: false}));
                    location.reload();
                };
            }
            
            modal.classList.add('active');
        }
        
        function hasStreakOf5() {
            let maxStreak = 0;
            let current = 0;
            for (let ans of answeredQuestions) {
                if (ans) {
                    current++;
                    maxStreak = Math.max(maxStreak, current);
                } else {
                    current = 0;
                }
            }
            return maxStreak >= 5;
        }
        
        function handleCompletion() {
            // Handled by button onclick
        }
        
        // Voice recognition setup
        let recognition = null;
        function setupVoiceRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.continuous = false;
                recognition.interimResults = false;
                recognition.lang = 'en-US';
                
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    document.getElementById('answerInput').value = transcript;
                    document.getElementById('micBtn').classList.remove('recording');
                };
                
                recognition.onerror = function() {
                    document.getElementById('micBtn').classList.remove('recording');
                    alert('Voice recognition failed. Please type your answer.');
                };
                
                recognition.onend = function() {
                    document.getElementById('micBtn').classList.remove('recording');
                };
            }
        }
        
        function toggleVoice() {
            if (!recognition) {
                alert('Voice recognition not supported in this browser. Please type your answer.');
                return;
            }
            
            const btn = document.getElementById('micBtn');
            if (btn.classList.contains('recording')) {
                recognition.stop();
                btn.classList.remove('recording');
            } else {
                recognition.start();
                btn.classList.add('recording');
            }
        }
        
        // Break functionality
        function toggleBreakMenu() {
            document.getElementById('breakMenu').classList.toggle('active');
        }
        
        function startBreak(reason) {
            document.getElementById('breakReason').textContent = reason + ' Break';
            document.getElementById('breakScreen').classList.add('active');
            document.getElementById('breakMenu').classList.remove('active');
            breakStartTime = Date.now();
            
            breakTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - breakStartTime) / 1000);
                const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const secs = (elapsed % 60).toString().padStart(2, '0');
                document.getElementById('breakTimer').textContent = `${mins}:${secs}`;
            }, 1000);
        }
        
        function endBreak() {
            clearInterval(breakTimerInterval);
            document.getElementById('breakScreen').classList.remove('active');
            document.getElementById('breakTimer').textContent = '00:00';
        }
        
        function updateCoinDisplay() {
            document.getElementById('coinCount').textContent = coins;
        }
        
        function backToSyllabus() {
            if (confirm('Go back to syllabus? Your progress will be saved.')) {
                window.location.href = '../../syllabus.html';
            }
        }
        
        // Close break menu when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.break-dropdown')) {
                document.getElementById('breakMenu').classList.remove('active');
            }
        });
    </script>
