<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chess Puzzles — RISHI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<link rel="stylesheet" href="chessboard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fdf6ec;font-family:'Nunito',sans-serif;color:#2d2a22;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
h1{font-size:20px;font-weight:900;color:#b8860b;letter-spacing:1px;margin-bottom:4px}
.sub{font-size:13px;color:#888;margin-bottom:12px}
#board{width:min(360px,90vw);border:3px solid #b8860b;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.info-row{display:flex;gap:10px;align-items:center;margin:12px 0 6px;flex-wrap:wrap;justify-content:center}
.pill{background:#fff8e8;border:1.5px solid #e2c96e;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;color:#7a6000}
#feedback{min-height:28px;font-size:15px;font-weight:800;text-align:center;padding:5px 12px;border-radius:10px;margin-bottom:6px;transition:all .3s}
.fb-correct{background:#d4edda;color:#1a6b2a}
.fb-wrong{background:#fde8e8;color:#8b1a1a}
.fb-hint{background:#fff3cd;color:#7a5a00}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
button{font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;padding:8px 18px;border-radius:22px;border:none;cursor:pointer;transition:all .2s}
#btnHint{background:#fff3cd;color:#7a5a00;border:2px solid #e2c96e}
#btnNext{background:#b8860b;color:#fff}
#btnNext:disabled{background:#ccc;cursor:not-allowed}
.progress-bar{width:min(360px,90vw);height:7px;background:#f0e4c4;border-radius:4px;margin-bottom:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#f0a500,#b8860b);border-radius:4px;transition:width .4s}
.puzzle-counter{font-size:12px;color:#aaa;margin-bottom:10px}
</style>
</head>
<body>
<h1>♟ Chess Puzzles</h1>
<div class="sub">White to move — find checkmate in 1</div>

<div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
<div class="puzzle-counter" id="puzzleCounter">Puzzle 1 of 10</div>

<div id="board"></div>

<div class="info-row">
  <span class="pill" id="pillTurn">⬜ White to move</span>
  <span class="pill" id="pillCoins">+15 🪙</span>
</div>

<div id="feedback"></div>

<div class="btn-row">
  <button id="btnHint" onclick="showHint()">💡 Hint</button>
  <button id="btnNext" onclick="nextPuzzle()" disabled>Next Puzzle ▶</button>
</div>

<script src="../../rishi-core.js"></script>
<script src="chess.min.js"></script>
<script src="chessboard.min.js"></script>
<script>
/* All positions verified: white to move, black king NOT in check at start, move delivers checkmate */
var PUZZLES = [
  {fen:'6k1/5ppp/8/8/8/8/5PPP/4R1K1 w - - 0 1', move:'e1e8', hint:'Rook slides to the back rank — king is trapped by its own pawns'},
  {fen:'7k/R7/6K1/8/8/8/8/8 w - - 0 1',         move:'a7a8', hint:'Rook to the back rank — white king covers the escape squares'},
  {fen:'7k/6R1/8/8/8/8/8/7R w - - 0 1',         move:'h1h8', hint:'One rook checks, the other rook on g7 covers every escape'},
  {fen:'k7/2Q5/4K3/8/8/8/8/8 w - - 0 1',        move:'c7b7', hint:'Queen steps one square left — king is cornered on a8'},
  {fen:'7k/8/3K4/6Q1/8/8/8/8 w - - 0 1',        move:'g5g7', hint:'Queen slides up two squares — king has nowhere to run'},
  {fen:'k7/8/K7/8/7Q/8/8/8 w - - 0 1',          move:'h4h8', hint:'Queen sweeps all the way across the back rank'},
  {fen:'8/8/8/3Q4/8/3K4/8/k7 w - - 0 1',        move:'d5a2', hint:'Queen checks on a2 — king is boxed in the corner'},
  {fen:'6k1/R7/8/8/8/8/8/1R4K1 w - - 0 1',      move:'b1b8', hint:'Second rook delivers the back rank mate — first rook covers rank 7'},
  {fen:'k7/8/K7/8/8/3Q4/8/8 w - - 0 1',         move:'d3d8', hint:'Queen swings to the back rank — king is trapped in the corner'},
  {fen:'7k/5R2/8/8/8/6K1/8/6R1 w - - 0 1',      move:'g1g8', hint:'Rook mates on g8 — the rank-7 rook cuts off every escape'}
];

var STATE_KEY = 'rishi_chess_state';
var state = {idx:0, solved:[], hints:[]};
try { var _s = JSON.parse(localStorage.getItem(STATE_KEY)||'null'); if(_s && _s.idx !== undefined) state = _s; } catch(e){}

var chess, board, puz, puzzleDone;

function saveState(){ localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

window.onload = function(){ loadPuzzle(state.idx); };

function loadPuzzle(idx){
  clearHighlight();
  state.idx = idx; saveState();
  puz = PUZZLES[idx];
  puzzleDone = state.solved.indexOf(idx) !== -1;

  chess = new Chess(puz.fen);

  if(board) board.destroy();
  board = Chessboard('board', {
    draggable: !puzzleDone,
    position: puz.fen,
    pieceTheme: 'img/chesspieces/wikipedia/{piece}.png',
    orientation: 'white',
    onDragStart: onDragStart,
    onDrop: onDrop,
    onSnapEnd: function(){ board.position(chess.fen()); }
  });

  document.getElementById('pillCoins').textContent = puzzleDone ? '✓ Solved' : '+15 🪙';
  document.getElementById('progFill').style.width = (state.solved.length / PUZZLES.length * 100) + '%';
  document.getElementById('puzzleCounter').textContent = 'Puzzle ' + (idx+1) + ' of ' + PUZZLES.length + ' · Solved: ' + state.solved.length;
  document.getElementById('btnNext').disabled = !puzzleDone;
  setFeedback('', '');
  if(puzzleDone) setFeedback('Already solved! ✓', 'fb-correct');
}

function onDragStart(src, piece){
  if(puzzleDone || chess.game_over()) return false;
  if(chess.turn() === 'w' && piece.search(/^b/) !== -1) return false;
  if(chess.turn() === 'b' && piece.search(/^w/) !== -1) return false;
}

function onDrop(src, tgt){
  if(puzzleDone) return 'snapback';
  var move = chess.move({from:src, to:tgt, promotion:'q'});
  if(!move) return 'snapback';

  var made = move.from + move.to;
  var expected = puz.move.slice(0,4);

  if(made === expected){
    clearHighlight();
    puzzleSolved();
  } else {
    chess.undo();
    setFeedback('Not the right move — try again!', 'fb-wrong');
    return 'snapback';
  }
}

function puzzleSolved(){
  puzzleDone = true;
  if(state.solved.indexOf(state.idx) === -1){
    state.solved.push(state.idx);
    saveState();
    if(typeof rishiAddCoins === 'function') rishiAddCoins(15);
    setFeedback('Brilliant! Checkmate! +15 coins 🪙', 'fb-correct');
  } else {
    setFeedback('Solved! ✓', 'fb-correct');
  }
  document.getElementById('btnNext').disabled = false;
  document.getElementById('pillCoins').textContent = '✓ Solved';
  document.getElementById('progFill').style.width = (state.solved.length / PUZZLES.length * 100) + '%';
  document.getElementById('puzzleCounter').textContent = 'Puzzle ' + (state.idx+1) + ' of ' + PUZZLES.length + ' · Solved: ' + state.solved.length;
}

function showHint(){
  if(state.hints.indexOf(state.idx) === -1) state.hints.push(state.idx);
  saveState();
  setFeedback('Hint: ' + puz.hint, 'fb-hint');
}

function nextPuzzle(){
  loadPuzzle((state.idx + 1) % PUZZLES.length);
}

function highlightSquare(sq){
  clearHighlight();
  var el = document.querySelector('[data-square="' + sq + '"]');
  if(el) el.style.cssText += ';background:rgba(255,215,0,0.65) !important';
}

function clearHighlight(){
  document.querySelectorAll('[data-square]').forEach(function(el){ el.style.background = ''; });
}

function setFeedback(msg, cls){
  var el = document.getElementById('feedback');
  el.textContent = msg;
  el.className = cls;
}
</script>
</body>
</html>
