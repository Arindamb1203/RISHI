  <script>

    l.rel='icon'; l.type='image/png';
    l.href='/icons/fav-'+(1+Math.floor(Math.random()*8))+'.png';
    document.head.appendChild(l);
  })();
  </script>

  <meta charset="utf-8">
  <title>2048 — RISHI Games</title>
  <link href="style/main.css" rel="stylesheet" type="text/css">
  <style>

<body>
  <div class="container">
    <div class="heading">

        <div class="score-container">0</div>
        <div class="best-container">0</div>
      </div>
    </div>

    <div class="above-game">
      <p class="game-intro">Join the numbers and get to the <strong>2048 tile!</strong></p>
      <a class="restart-button">New Game</a>
    </div>

    <div class="game-container">
      <div class="game-message">
        <p></p>
        <div class="lower">
	        <a class="keep-playing-button">Keep going</a>
          <a class="retry-button">Try again</a>
        </div>
      </div>

      <div class="grid-container">
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
        <div class="grid-row">
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
          <div class="grid-cell"></div>
        </div>
      </div>

      <div class="tile-container">

      </div>
    </div>

    <p class="game-explanation">
      <strong class="important">How to play:</strong> Use your <strong>arrow keys</strong> to move the tiles. When two tiles with the same number touch, they <strong>merge into one!</strong>
    </p>
    <p style="text-align:center;font-family:Nunito,sans-serif;font-size:13px;color:#b8860b;margin-top:10px">
      🪙 512 tile = +20 coins &nbsp;|&nbsp; 1024 = +50 coins &nbsp;|&nbsp; 2048 = +100 coins
    </p>
  </div>

  <script src="js/bind_polyfill.js"></script>
  <script src="js/classlist_polyfill.js"></script>
  <script src="js/animframe_polyfill.js"></script>
  <script src="js/keyboard_input_manager.js"></script>
  <script src="js/html_actuator.js"></script>
  <script src="js/grid.js"></script>
  <script src="js/tile.js"></script>
  <script src="js/local_storage_manager.js"></script>
  <script src="js/game_manager.js"></script>
  <script src="js/application.js"></script>
  <script src="../../rishi-core.js"></script>
  <script>
  /* ── RISHI coin milestones ── */
  var _2048milestones = {512:20, 1024:50, 2048:100};
  var _2048earned = {};
  try { _2048earned = JSON.parse(localStorage.getItem('rishi_2048_milestones')||'{}'); } catch(e){}

  function _check2048Tile(val){
    if(_2048milestones[val] && !_2048earned[val]){
      _2048earned[val] = true;
      localStorage.setItem('rishi_2048_milestones', JSON.stringify(_2048earned));
      var coins = _2048milestones[val];
      if(typeof rishiAddCoins==='function') rishiAddCoins(coins);
      var t = document.createElement('div');
      t.className = 'coin-toast';
      t.textContent = val+' tile! +'+coins+' coins earned 🪙';
      document.body.appendChild(t);
      setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 2200);
    }
  }

  /* Observe DOM for new tiles reaching milestones */
  var _obs = new MutationObserver(function(muts){
    muts.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if(n.classList && n.classList.contains('tile')){
          var classes = Array.from(n.classList);
          classes.forEach(function(c){
            var m2 = c.match(/^tile-(\d+)$/);
            if(m2) _check2048Tile(parseInt(m2[1]));
          });
        }
      });
    });
  });
  window.addEventListener('load', function(){
    var tc = document.querySelector('.tile-container');
    if(tc) _obs.observe(tc, {childList:true, subtree:true});
  });
  </script>
<script src="/error-reporter.js"></script>
</body>
</html>
