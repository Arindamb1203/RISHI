function go(t){
  if(busy)return;busy=true;stopFatherVoice();
  const dL=document.getElementById('dL');const dR=document.getElementById('dR');
  dL.style.transform='scaleX(1)';dR.style.transform='scaleX(1)';
  setTimeout(()=>{

function goNext(){if(cur<5)go(cur+1);}
function goBack(){if(cur>0)go(cur-1);}
function doExit(){try{window.close();}catch(e){}window.location.href="about:blank";}

  if(["Enter","ArrowRight"].includes(e.key)&&cur!==0)goNext();
  if(e.key==="ArrowLeft"&&cur>0)goBack();
});

function updateNav(){
  document.getElementById('counter').textContent=String(cur+1).padStart(2,'0')+' / 06';
  document.getElementById('progF').style.width=(cur/5*100)+'%';
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i<=cur));
  document.getElementById('abts').style.display=(cur>=3&&cur<5)?'flex':'none';
  const cw=document.getElementById('cw');const hint=document.getElementById('hint');const cb=document.getElementById('cb');
  if(cur===5){cw.style.display='none';hint.style.display='none';}
  else if(cur===3){cw.style.display='none';hint.style.display='none';}
  else if(cur===0){cw.style.display='none';hint.style.display='block';}
  else{cw.style.display='flex';hint.style.display='none';cb.textContent='Continue →';}
  document.getElementById('content').style.bottom=(document.getElementById('bot').offsetHeight)+'px';
  const backBtn=document.getElementById('backBtn');
  if(backBtn)backBtn.style.display=cur>0?'flex':'none';
}

function render(){
  updateNav();
  const c=document.getElementById('content');
  if(cur===0)c.innerHTML=r0();
  else if(cur===1){c.innerHTML=r1();startType();}
  else if(cur===2)c.innerHTML=r2();
  else if(cur===3){c.innerHTML=r3();startFeat();}
  else if(cur===4)c.innerHTML=r4();
  else c.innerHTML=r5();
}

function startAudio(){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();
  [[528,0,0.8],[660,0.3,0.6],[792,0.6,0.8]].forEach(([freq,delay,vol])=>{
    const osc=ctx.createOscillator();const g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);
    osc.type='sine';osc.frequency.value=freq;
    g.gain.setValueAtTime(0,ctx.currentTime+delay);g.gain.linearRampToValueAtTime(vol*0.15,ctx.currentTime+delay+0.05);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+2);
    osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+2);
  });}catch(e){}
}
