<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RISHI — Smart AI Tutor</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:      #faf8f4;
  --bg2:     #f3efe8;
  --panel:   rgba(255,255,255,0.96);
  --text:    #1c1208;
  --muted:   rgba(28,18,8,0.65);
  --faint:   rgba(28,18,8,0.32);
  --gold:    #c98a00;
  --goldL:   #f0a800;
  --goldBg:  rgba(201,138,0,0.1);
  --amber:   #e06b10;
  --amberBg: rgba(224,107,16,0.1);
  --sage:    #4a7c59;
  --sageBg:  rgba(74,124,89,0.1);
  --red:     #c0392b;
  --cream:   #fff8ee;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}

/* FONTS */
.fd{font-family:'Orbitron',monospace;}
.fb{font-family:'Nunito',sans-serif;}
.fm{font-family:'Share Tech Mono',monospace;}

/* ANIMATIONS */
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes rotateSlow{to{transform:rotate(360deg)}}
@keyframes soundWave{0%,100%{transform:scaleY(0.2)}50%{transform:scaleY(1)}}
@keyframes glowPulse{0%,100%{opacity:0.3}50%{opacity:0.9}}
@keyframes punchIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes nb{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes scanH{0%{left:-100%}100%{left:100%}}
@keyframes doorOpen{to{transform:scaleX(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes orbFloat{0%,100%{transform:translateY(0) rotate(0deg) scale(1)}50%{transform:translateY(-30px) rotate(8deg) scale(1.05)}}
@keyframes orbFloat2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(-5deg)}}
@keyframes crackleGlow{0%,100%{filter:drop-shadow(0 0 8px var(--goldL))}50%{filter:drop-shadow(0 0 30px var(--goldL)) drop-shadow(0 0 60px var(--amber))}}
.fu{animation:fadeUp 0.7s both;}
.d1{animation-delay:.12s}.d2{animation-delay:.26s}.d3{animation-delay:.44s}.d4{animation-delay:.64s}

/* ── DRAMATIC BACKGROUND ── */
#bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}

/* Warm gradient base */
#bg-base{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 90% 10%, rgba(240,168,0,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 10% 80%, rgba(74,124,89,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(255,248,238,0.5) 0%, transparent 70%),
    linear-gradient(160deg, #faf8f4 0%, #f5f0e8 40%, #faf6ee 100%);
}

/* Geometric pattern - warm gold lines */
#bg-geo{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(201,138,0,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,138,0,0.06) 1px, transparent 1px);
  background-size:80px 80px;
}

/* Large decorative RISHI text */
#bg-word{
  position:absolute;
  bottom:-8%;right:-4%;
  font-family:'Orbitron',monospace;
  font-weight:900;
  font-size:clamp(8rem,28vw,22rem);
  line-height:0.8;
  color:rgba(201,138,0,0.055);
  user-select:none;
  letter-spacing:0.05em;
  animation:orbFloat2 10s ease-in-out infinite;
}

/* ── FLOATING 3D OBJECTS ── */
/* Vibranium energy sphere - breaks out of frame */
#orb-main{
  position:absolute;
  top:-8%;
  right:-6%;
  width:clamp(200px,35vw,420px);
  height:clamp(200px,35vw,420px);
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 35%,
      rgba(255,220,120,0.95) 0%,
      rgba(240,168,0,0.85) 25%,
      rgba(224,107,16,0.75) 55%,
      rgba(180,60,0,0.5) 80%,
      transparent 100%);
  box-shadow:
    inset -20px -20px 60px rgba(180,60,0,0.4),
    inset 20px 20px 40px rgba(255,240,160,0.5),
    0 0 80px rgba(240,168,0,0.35),
    0 0 160px rgba(224,107,16,0.15);
  animation:orbFloat 7s ease-in-out infinite;
  z-index:1;
}
/* Ring around orb */
#orb-ring{
  position:absolute;
  top:calc(-8% - 12px);
  right:calc(-6% - 12px);
  width:calc(clamp(200px,35vw,420px) + 24px);
  height:calc(clamp(200px,35vw,420px) + 24px);
  border-radius:50%;
  border:3px solid rgba(240,168,0,0.4);
  box-shadow:0 0 30px rgba(240,168,0,0.2);
  animation:orbFloat 7s ease-in-out infinite, rotateSlow 12s linear infinite;
  z-index:1;
}
#orb-ring2{
  position:absolute;
  top:calc(-8% - 30px);
  right:calc(-6% - 30px);
  width:calc(clamp(200px,35vw,420px) + 60px);
  height:calc(clamp(200px,35vw,420px) + 60px);
  border-radius:50%;
  border:1px dashed rgba(224,107,16,0.2);
  animation:orbFloat 7s ease-in-out infinite, rotateSlow 18s linear infinite reverse;
  z-index:1;
}

/* Energy sparks on the orb */
#orb-glow{
  position:absolute;
  top:-8%;right:-6%;
  width:clamp(200px,35vw,420px);
  height:clamp(200px,35vw,420px);
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,200,0.6) 0%, transparent 40%);
  animation:orbFloat 7s ease-in-out infinite, crackleGlow 2s ease-in-out infinite;
  z-index:2;
  pointer-events:none;
}

/* Secondary smaller orb bottom left */
#orb-small{
  position:absolute;
  bottom:-5%;left:-4%;
  width:clamp(100px,18vw,200px);
  height:clamp(100px,18vw,200px);
  border-radius:50%;
  background:
    radial-gradient(circle at 40% 35%,
      rgba(200,240,210,0.9) 0%,
      rgba(74,124,89,0.7) 40%,
      rgba(30,80,50,0.4) 80%,
      transparent 100%);
  box-shadow:0 0 40px rgba(74,124,89,0.25), inset 10px 10px 25px rgba(200,240,210,0.4);
  animation:orbFloat2 9s ease-in-out infinite;
  z-index:1;
}

/* Scan line */
#scan{
  position:absolute;top:40%;left:0;right:0;height:1px;z-index:3;
  background:linear-gradient(90deg,transparent,rgba(201,138,0,0.6),rgba(224,107,16,0.4),transparent);
  animation:scanH 6s linear infinite;opacity:0.5;
}

/* Floating particles */
.spark{position:absolute;border-radius:50%;animation:floatY linear infinite;}

/* DOOR */
#door{position:fixed;inset:0;z-index:80;display:flex;pointer-events:none;}
.dhalf{
  flex:1;
  background:linear-gradient(160deg,#f5f0e8,#faf8f4);
  transition:transform 0.82s cubic-bezier(0.77,0,0.18,1);
}
#dL{transform-origin:left center;border-right:2px solid rgba(201,138,0,0.3);}
#dR{transform-origin:right center;border-left:2px solid rgba(201,138,0,0.3);}

/* TOP BAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  padding:0.85rem 1.8rem;
  background:rgba(250,248,244,0.95);
  backdrop-filter:blur(20px);
  border-bottom:2px solid rgba(201,138,0,0.15);
  box-shadow:0 2px 20px rgba(201,138,0,0.08);
}
.logo-name{
  font-family:'Orbitron',monospace;font-weight:900;
  font-size:1.6rem;letter-spacing:0.22em;
  background:linear-gradient(135deg,var(--gold),var(--amber),var(--gold));
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite;
}
.logo-tag{font-family:'Share Tech Mono',monospace;font-size:0.44rem;letter-spacing:0.32em;color:var(--faint);margin-top:-2px;}
#counter{font-family:'Share Tech Mono',monospace;font-size:0.58rem;color:var(--faint);letter-spacing:0.2em;}
#dots{display:flex;gap:6px;margin-left:10px;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(201,138,0,0.2);transition:all 0.4s;}
.dot.on{background:var(--gold);box-shadow:0 0 8px var(--goldL);}

/* CONTENT */
#content{
  position:fixed;top:4.2rem;left:0;right:0;z-index:20;
  display:flex;align-items:center;justify-content:center;
  padding:1rem 2rem;overflow-y:auto;
}

/* BOTTOM BAR */
#bot{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:rgba(250,248,244,0.97);
  backdrop-filter:blur(20px);
  border-top:2px solid rgba(201,138,0,0.12);
}
#prog{height:3px;background:rgba(201,138,0,0.1);}
#progF{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--amber));transition:width 0.85s ease;box-shadow:0 0 8px rgba(201,138,0,0.5);}
#abts{display:none;flex-wrap:nowrap;gap:0.5rem;padding:0.5rem 1.2rem 0.28rem;justify-content:center;}
.abt{
  flex:1;max-width:145px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:0.7rem;
  letter-spacing:0.05em;padding:0.6rem 0.4rem;
  line-height:1.35;text-align:center;cursor:pointer;
  transition:all 0.25s;border:2px solid;border-radius:4px;
}
.abt-gold{background:var(--goldBg);border-color:var(--gold);color:var(--gold);}
.abt-green{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.5);color:#16a34a;text-decoration:none;display:flex;align-items:center;justify-content:center;}
.abt-red{background:rgba(192,57,43,0.08);border-color:rgba(192,57,43,0.6);color:var(--red);animation:nb 2.5s ease-in-out infinite;}
.abt:hover{filter:brightness(1.15);transform:translateY(-1px);}
#cw{padding:0.28rem 1.2rem 0.65rem;display:flex;justify-content:center;}
#cb{
  width:100%;max-width:440px;
  font-family:'Orbitron',monospace;font-weight:700;font-size:0.8rem;
  letter-spacing:0.2em;padding:0.75rem 1rem;
  background:transparent;
  border:2px solid rgba(201,138,0,0.4);
  color:var(--gold);cursor:pointer;text-transform:uppercase;transition:all 0.3s;
  border-radius:4px;
}
#cb:hover{background:var(--goldBg);box-shadow:0 0 20px rgba(201,138,0,0.25);}
#hint{padding:0.28rem 1.2rem 0.65rem;text-align:center;font-size:0.75rem;font-weight:600;color:var(--faint);}

/* CARD */
.card{
  background:var(--panel);
  border:2px solid rgba(201,138,0,0.2);
  padding:2rem 2.4rem;position:relative;border-radius:8px;
  box-shadow:0 4px 40px rgba(201,138,0,0.1),0 1px 0 rgba(255,255,255,0.8) inset;
}
.card::before,.card::after,.card .cr-tr,.card .cr-bl{
  content:'';position:absolute;width:16px;height:16px;
}
.card::before{top:-2px;left:-2px;border-top:3px solid var(--gold);border-left:3px solid var(--gold);border-radius:2px 0 0 0;}
.card::after{bottom:-2px;right:-2px;border-bottom:3px solid var(--gold);border-right:3px solid var(--gold);border-radius:0 0 2px 0;}
.card .cr-tr{top:-2px;right:-2px;border-top:3px solid var(--gold);border-right:3px solid var(--gold);border-radius:0 2px 0 0;}
.card .cr-bl{bottom:-2px;left:-2px;border-bottom:3px solid var(--gold);border-left:3px solid var(--gold);border-radius:0 0 0 2px;}
.card-lbl{
  position:absolute;top:0;left:1.8rem;transform:translateY(-50%);
  font-family:'Share Tech Mono',monospace;font-weight:700;font-size:0.58rem;
  letter-spacing:0.24em;color:var(--gold);
  background:var(--panel);padding:0 0.7rem;
  border:1px solid rgba(201,138,0,0.25);border-radius:2px;
}

/* PHOTO FRAME */
.photo-wrap{
  flex-shrink:0;width:140px;
  border-radius:10px;overflow:hidden;
  border:3px solid rgba(201,138,0,0.35);
  box-shadow:0 8px 32px rgba(0,0,0,0.18),0 0 0 1px rgba(255,255,255,0.6);
  position:relative;
}
.photo-img{
  width:100%;display:block;
  /* Using a warm illustrated portrait style */
  aspect-ratio:0.65;
  background:linear-gradient(160deg,#f5e8d5 0%,#e8d0b0 25%,#d4b890 50%,#c0a070 75%,#a88050 100%);
  position:relative;overflow:hidden;
}
/* Realistic illustrated father and son */
.photo-scene{position:absolute;inset:0;}

/* Room */
.r-bg{position:absolute;inset:0;background:linear-gradient(180deg,#f2dfc0 0%,#e8cfa0 45%,#c8a870 100%);}
.r-wall{position:absolute;top:0;left:0;right:0;height:52%;background:linear-gradient(180deg,#f5e5c8,#ecd8b0);}
/* Window light */
.r-window{
  position:absolute;top:4%;left:10%;width:30%;height:22%;
  background:linear-gradient(180deg,rgba(255,240,200,0.9),rgba(255,220,150,0.6));
  border:2px solid rgba(180,150,100,0.4);border-radius:2px;
  box-shadow:0 0 20px rgba(255,220,100,0.5);
}
.r-floor{position:absolute;bottom:0;left:0;right:0;height:48%;background:linear-gradient(180deg,#c8a870,#a87840);}
/* Floor shine */
.r-shine{position:absolute;bottom:0;left:0;right:0;height:48%;background:linear-gradient(180deg,rgba(255,200,100,0.15),transparent 50%);}

/* Sofa */
.r-sofa{
  position:absolute;bottom:26%;left:-5%;right:-5%;height:28%;
  background:linear-gradient(160deg,#8a6855,#6a4838);
  border-radius:25px 25px 0 0;
}
.r-sofa::before{content:'';position:absolute;top:-7px;left:4%;right:4%;height:18px;background:linear-gradient(180deg,#a07865,#8a6855);border-radius:18px 18px 0 0;}
/* Cushions */
.r-cushion{position:absolute;bottom:52%;left:8%;width:35%;height:22%;background:linear-gradient(160deg,rgba(255,200,150,0.5),rgba(200,150,100,0.3));border-radius:6px;}

/* Table in front */
.r-table{position:absolute;bottom:20%;left:10%;right:10%;height:8%;background:linear-gradient(180deg,#c09060,#9a7040);border-radius:4px 4px 0 0;box-shadow:0 4px 8px rgba(0,0,0,0.2);}

/* FATHER - detailed realistic */
.fig-dad{position:absolute;bottom:22%;left:2%;width:46%;}
.fig-son{position:absolute;bottom:22%;right:0%;width:40%;}

.photo-vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(80,40,10,0.3) 100%);pointer-events:none;}
.photo-warm{position:absolute;inset:0;background:rgba(255,160,60,0.07);pointer-events:none;}
.photo-caption{
  background:linear-gradient(transparent,rgba(50,25,5,0.7));
  padding:1.2rem 0.5rem 0.5rem;text-align:center;
  font-family:'Share Tech Mono',monospace;font-size:0.44rem;
  letter-spacing:0.2em;color:rgba(255,220,160,0.9);
}

/* TYPEWRITER */
#tw{font-family:'Nunito',sans-serif;font-size:1.08rem;line-height:2.05;color:var(--text);font-weight:500;min-height:140px;}
.cur{display:inline-block;width:2px;height:1em;background:var(--gold);margin-left:3px;vertical-align:middle;animation:blink 0.7s infinite;}

/* FEAT LAYOUT — full width 3 columns */
#feat-wrap{
  width:100%;max-width:900px;
  display:grid;
  grid-template-columns:160px 1fr 160px;
  gap:1rem;
  align-items:stretch;
  min-height:calc(100vh - 9rem);
}

.fl{
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(201,138,0,0.15);
  border-radius:8px;padding:0.8rem 0.6rem;
  display:flex;flex-direction:column;gap:0.25rem;
}
.fl-title{
  font-family:'Orbitron',monospace;font-weight:700;font-size:0.62rem;
  color:var(--gold);letter-spacing:0.15em;text-align:center;
  margin-bottom:0.4rem;border-bottom:1px solid rgba(201,138,0,0.15);
  padding-bottom:0.32rem;
}
.fi{
  font-family:'Nunito',sans-serif;font-size:0.72rem;
  padding:0.25rem 0.55rem;transition:all 0.3s;
  border-left:3px solid transparent;border-radius:0 4px 4px 0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.fi.on{font-weight:800;color:var(--gold);background:var(--goldBg);border-left-color:var(--gold);}
.fi.dn{font-weight:600;color:var(--amber);border-left-color:rgba(224,107,16,0.4);}
.fi.pd{font-weight:500;color:var(--faint);}

.fc{display:flex;align-items:center;justify-content:center;}

/* Feature card */
.feat-card{transition:all 0.6s cubic-bezier(0.34,1.4,0.64,1);}
.feat-card.hide{opacity:0;transform:translateX(-180px) scale(0.85);}
.feat-card.show{opacity:1;transform:translateX(0) scale(1);}
.feat-card.out{opacity:0;transform:translateX(180px) scale(0.85);transition:all 0.5s ease-in;}

.fn{font-family:'Share Tech Mono',monospace;font-size:0.6rem;letter-spacing:0.3em;margin-bottom:0.5rem;}
.fi-icon{font-size:3.5rem;margin-bottom:0.7rem;animation:floatY 3s ease-in-out infinite;}
.ft{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.3rem,3.5vw,2rem);color:var(--text);line-height:1.25;margin-bottom:0.5rem;}
.fp{font-family:'Orbitron',monospace;font-weight:700;font-size:clamp(0.85rem,2vw,1.1rem);margin-bottom:0.8rem;}
.fb2{font-size:0.95rem;line-height:1.9;color:var(--muted);font-weight:500;text-align:center;}
.fnxt{
  margin-top:1rem;font-family:'Orbitron',monospace;font-weight:700;font-size:0.78rem;
  letter-spacing:0.13em;padding:0.72rem 2rem;
  border:2px solid;cursor:pointer;transition:all 0.25s;border-radius:4px;
}
.fnxt:hover{transform:translateY(-2px);}

/* Punch lines */
.fr{
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(201,138,0,0.15);
  border-radius:8px;padding:0.8rem 0.6rem;
  display:flex;flex-direction:column;gap:0.28rem;
  overflow-y:auto;
}
.fr-title{
  font-family:'Orbitron',monospace;font-weight:700;font-size:0.62rem;
  color:var(--amber);letter-spacing:0.15em;text-align:center;
  margin-bottom:0.4rem;border-bottom:1px solid rgba(224,107,16,0.15);
  padding-bottom:0.32rem;
}
.pl{
  font-family:'Nunito',sans-serif;font-weight:800;font-size:0.7rem;
  line-height:1.4;padding:0.3rem 0.55rem;border-radius:0 4px 4px 0;
  animation:punchIn 0.4s ease both;border-left:3px solid;
}
.pl0{color:var(--gold);border-color:var(--gold);background:var(--goldBg);text-shadow:0 0 8px rgba(201,138,0,0.3);}
.pl1{color:var(--amber);border-color:var(--amber);background:var(--amberBg);text-shadow:0 0 8px rgba(224,107,16,0.3);}
.pl2{color:var(--sage);border-color:var(--sage);background:var(--sageBg);text-shadow:0 0 8px rgba(74,124,89,0.3);}

/* COST */
.ci{background:rgba(255,255,255,0.6);border:1.5px solid rgba(201,138,0,0.15);padding:0.9rem 0.8rem;text-align:center;border-radius:6px;}
.ci.hi{background:var(--goldBg);border-color:var(--gold);box-shadow:0 0 20px rgba(201,138,0,0.2);transform:scale(1.08);}
.ci-e{font-size:1.4rem;margin-bottom:0.25rem;}
.ci-l{font-family:'Share Tech Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;color:var(--faint);margin-bottom:0.12rem;}
.ci.hi .ci-l{color:var(--gold);}
.ci-p{font-family:'Orbitron',monospace;font-weight:700;font-size:0.82rem;color:var(--muted);}
.ci.hi .ci-p{color:var(--gold);}

/* REGISTER */
.reg-btn{
  font-family:'Orbitron',monospace;font-weight:900;font-size:0.88rem;
  letter-spacing:0.17em;padding:1.15rem 3rem;width:100%;max-width:400px;
  background:linear-gradient(135deg,var(--gold),var(--amber));
  color:white;border:none;cursor:pointer;text-transform:uppercase;
  transition:all 0.3s;box-shadow:0 6px 28px rgba(201,138,0,0.35);
  border-radius:6px;margin-bottom:0.9rem;
}
.reg-btn:hover{transform:translateY(-3px);box-shadow:0 10px 40px rgba(201,138,0,0.5);}
.wa-btn{
  font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;
  letter-spacing:0.1em;padding:0.92rem 1.8rem;width:100%;max-width:400px;
  background:rgba(34,197,94,0.08);border:2px solid rgba(34,197,94,0.5);
  color:#16a34a;cursor:pointer;text-decoration:none;
  display:flex;align-items:center;justify-content:center;gap:0.5rem;
  transition:all 0.3s;margin-bottom:0.9rem;border-radius:6px;
}
.wa-btn:hover{background:rgba(34,197,94,0.18);}

/* HOLO */
.holo-av{
  width:115px;height:148px;cursor:pointer;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;

function startAudio(){
  // Play welcome chime
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [[528,0,0.8],[660,0.3,0.6],[792,0.6,0.8]].forEach(([freq,delay,vol])=>{
      const osc=ctx.createOscillator();
      const g=ctx.createGain();
      osc.connect(g);g.connect(ctx.destination);
      osc.type='sine';osc.frequency.value=freq;
      g.gain.setValueAtTime(0,ctx.currentTime+delay);
      g.gain.linearRampToValueAtTime(vol*0.15,ctx.currentTime+delay+0.05);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+2);
      osc.start(ctx.currentTime+delay);osc.stop(ctx.currentTime+delay+2);
    });
  }catch(e){}
}

function playWhoosh(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    // Whoosh + impact sound
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.4,ctx.sampleRate);
    const data=buf.getChannelData(0);
    for(let i=0;i<data.length;i++){
      data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,2)*0.6;
    }
    const src=ctx.createBufferSource();
    const g=ctx.createGain();
    const filter=ctx.createBiquadFilter();
    filter.type='bandpass';
    filter.frequency.setValueAtTime(800,ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.3);
    filter.Q.value=0.8;
    src.buffer=buf;
    src.connect(filter);filter.connect(g);g.connect(ctx.destination);
    g.gain.setValueAtTime(0.5,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
    src.start();src.stop(ctx.currentTime+0.4);

    // Impact tone
    const osc=ctx.createOscillator();
    const og=ctx.createGain();
    osc.connect(og);og.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(320,ctx.currentTime+0.05);
    osc.frequency.exponentialRampToValueAtTime(180,ctx.currentTime+0.25);
    og.gain.setValueAtTime(0,ctx.currentTime+0.05);
    og.gain.linearRampToValueAtTime(0.18,ctx.currentTime+0.08);
    og.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
    osc.start(ctx.currentTime+0.05);
    osc.stop(ctx.currentTime+0.35);
  }catch(e){}
}
