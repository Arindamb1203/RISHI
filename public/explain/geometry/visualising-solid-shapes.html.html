<script>
function G(id){return document.getElementById(id);}
var atTimers=[];
function clearAt(){atTimers.forEach(clearTimeout);atTimers=[];}
function at(ms,fn){atTimers.push(setTimeout(fn,ms));}
var chosenVoice=null,mouthTimer=null;
function initVoices(cb){
  var v=speechSynthesis.getVoices();
  if(v.length){pickVoice(v);cb();return;}
  speechSynthesis.onvoiceschanged=function(){pickVoice(speechSynthesis.getVoices());cb();};
}
function pickVoice(voices){
  var pri=['heera','veena','priya','raveena','female','woman','zira','samantha','victoria','karen','moira','tessa','fiona'];
  var enIN=voices.filter(function(v){return v.lang==='en-IN';});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enIN.length;i++){if(enIN[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enIN[i];return;}}}
  var enA=voices.filter(function(v){return v.lang.startsWith('en');});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enA.length;i++){if(enA[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enA[i];return;}}}
  if(enIN.length){chosenVoice=enIN[0];return;}
  if(enA.length){chosenVoice=enA[0];}
}
function say(text){
  speechSynthesis.cancel();rStopTalk();
  var u=new SpeechSynthesisUtterance(text);
  if(chosenVoice)u.voice=chosenVoice;
  u.lang='en-IN';u.rate=0.88;u.pitch=1.15;
  u.onstart=function(){rStartTalk();};
  u.onend=function(){rStopTalk();};
  speechSynthesis.speak(u);
}
function rStartTalk(){
  G('blushL').style.opacity='0.7';G('blushR').style.opacity='0.7';
  if(mouthTimer)clearInterval(mouthTimer);
  var open=false;
  mouthTimer=setInterval(function(){
    open=!open;
    G('mouth').setAttribute('d',open?'M53 87 Q60 96 67 87':'M53 89 Q60 93 67 89');
  },160);
}
function rStopTalk(){
  if(mouthTimer){clearInterval(mouthTimer);mouthTimer=null;}
  G('mouth').setAttribute('d','M53 89 Q60 93 67 89');
  G('blushL').style.opacity='0';G('blushR').style.opacity='0';
}
var blinkTimer=null;
function startBlink(){
  function doBlink(){
    G('lidL').setAttribute('opacity','0.95');G('lidR').setAttribute('opacity','0.95');
    setTimeout(function(){G('lidL').setAttribute('opacity','0');G('lidR').setAttribute('opacity','0');blinkTimer=setTimeout(doBlink,2200+Math.random()*3000);},120);
  }
  blinkTimer=setTimeout(doBlink,2200+Math.random()*3000);
}
function fade(id,v){var e=G(id);if(!e)return;e.style.transition='opacity .5s';e.style.opacity=v;}

var questions=[
{q:'A cube has how many faces?',opts:['4','6','8','12'],ans:1,anim:'cube1',
narr:'A cube is the most symmetric 3D shape. It has 6 square faces — top, bottom, front, back, left and right. Count them as I show you!'},

{q:'A triangular prism has how many edges?',opts:['6','8','9','12'],ans:2,anim:'triprism',
narr:'A triangular prism has two triangular faces and three rectangular faces. Each triangle has 3 edges, plus 3 edges connecting them. Total: 3 plus 3 plus 3 equals 9 edges.'},

{q:'A square pyramid has how many vertices?',opts:['4','5','6','8'],ans:1,anim:'sqpyr',
narr:'A square pyramid has 4 vertices at the square base, plus 1 apex vertex at the top. Total: 5 vertices. Remember — vertices are the corners of a 3D shape.'},

{q:"Euler's formula for polyhedra is V – E + F = ?",opts:['0','1','2','3'],ans:2,anim:'euler1',
narr:"Euler's remarkable formula says: Vertices minus Edges plus Faces always equals 2 for any polyhedron. V minus E plus F equals 2. This works for every solid!"},

{q:'A tetrahedron has 4 vertices and 4 faces. Using Euler\'s formula, find the number of edges.',opts:['4','5','6','8'],ans:2,anim:'tetra',
narr:'Using V minus E plus F equals 2. We know V equals 4 and F equals 4. So 4 minus E plus 4 equals 2. That gives 8 minus E equals 2, so E equals 6.'},

{q:'An octahedron has 6 vertices and 12 edges. Find number of faces using Euler\'s formula.',opts:['6','7','8','10'],ans:2,anim:'octa',
narr:'V minus E plus F equals 2. V is 6, E is 12. So 6 minus 12 plus F equals 2. Negative 6 plus F equals 2. So F equals 8. The octahedron has 8 triangular faces.'},

{q:'The top view of a cone (placed on its base) is:',opts:['Triangle','Square','Rectangle','Circle'],ans:3,anim:'conetop',
narr:'When you look at a cone from directly above, you see the circular base with a dot at the centre where the apex projects. So the top view of a cone is a circle.'},

{q:'The front view of a cylinder (placed upright) is:',opts:['Circle','Square','Rectangle','Oval'],ans:2,anim:'cylfront',
narr:'When you look at an upright cylinder from the front, you see two vertical edges and two horizontal edges — making a rectangle. The width equals the diameter and the height equals the cylinder height.'},

{q:'The front view of a sphere from any direction is:',opts:['Oval','Circle','Square','Triangle'],ans:1,anim:'sphere1',
narr:'A sphere looks the same from every direction — it is perfectly symmetrical. No matter which direction you look from, the front view is always a circle.'},

{q:'A solid has 5 faces and 6 vertices. Using Euler\'s formula, find the number of edges.',opts:['7','8','9','11'],ans:2,anim:'euler2',
narr:'Apply Euler\'s formula: V minus E plus F equals 2. V is 6, F is 5. So 6 minus E plus 5 equals 2. 11 minus E equals 2. So E equals 9. This is a triangular prism!'},

{q:'How many unit cubes are needed to build a 3×3×3 cube?',opts:['9','18','24','27'],ans:3,anim:'unitcube',
narr:'A 3 by 3 by 3 cube has 3 layers, each layer has 3 rows of 3 cubes. So total unit cubes equals 3 times 3 times 3 which is 27.'},

{q:'Which of the following is NOT a polyhedron?',opts:['Cube','Tetrahedron','Sphere','Prism'],ans:2,anim:'poly1',
narr:'A polyhedron must have only flat faces. A cube, tetrahedron and prism all have flat faces. But a sphere has a curved surface — it has no flat faces at all. So sphere is not a polyhedron.'},

{q:'A dodecahedron has 12 faces and 20 vertices. Find edges using Euler\'s formula.',opts:['20','28','30','32'],ans:2,anim:'euler3',
narr:'V minus E plus F equals 2. V is 20, F is 12. So 20 minus E plus 12 equals 2. 32 minus E equals 2. So E equals 30. A dodecahedron has 30 edges!'},

{q:'The net of a cube is made up of how many squares?',opts:['4','5','6','8'],ans:2,anim:'netcube',
narr:'When you unfold a cube flat, you get 6 squares arranged in a cross or T shape. These 6 squares fold back up to form the 6 faces of the cube — top, bottom and 4 sides.'},

{q:'A polyhedron has 12 edges and 8 vertices. Euler\'s formula gives the number of faces as:',opts:['4','6','8','10'],ans:1,anim:'euler4',
narr:'V minus E plus F equals 2. V is 8, E is 12. So 8 minus 12 plus F equals 2. Negative 4 plus F equals 2. So F equals 6. This is a cube — 8 vertices, 12 edges, 6 faces!'}
];

'sphere1':function(){fade('sp1sphere','1');at(1200,function(){fade('sp1views','1');});},
'euler2':function(){fade('eu2given','1');at(900,function(){fade('eu2apply','1');});at(2500,function(){fade('eu2ans','1');});},

'poly1':function(){fade('pl1rule','1');at(900,function(){fade('pl1shapes','1');});at(2000,function(){fade('pl1explain','1');});},
'euler3':function(){fade('eu3given','1');at(900,function(){fade('eu3apply','1');});at(2500,function(){fade('eu3ans','1');});},
'netcube':function(){fade('nc1net','1');at(1000,function(){fade('nc1count','1');});at(2200,function(){fade('nc1fold','1');});},

var cur=0,score=0,answered=false;
function loadQ(i){
  answered=false;
  var q=questions[i];
  G('qNumber').textContent='Question '+(i+1)+' of 15';
  G('qText').textContent=q.q;
  G('feedback').textContent='';G('feedback').className='feedback';
  G('nextBtn').style.display='none';
  G('progressBar').style.width=(i/15*100)+'%';
  G('scorePill').textContent='Score: '+score+' / 15';
  var og=G('optionsGrid');og.innerHTML='';
  q.opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){checkAns(idx);};og.appendChild(b);
  });
  clearAt();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(400,function(){runAnim(q.anim);});
  G('bubble').textContent=q.narr.substring(0,78)+'…';
  at(300,function(){say(q.narr);});
}
function checkAns(idx){
  if(answered)return;answered=true;
  var q=questions[cur];
  var opts=G('optionsGrid').querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true;});
  if(idx===q.ans){
    opts[idx].classList.add('correct');score++;
    G('feedback').textContent='✅ Correct! Well done!';G('feedback').className='feedback correct';
    G('scorePill').textContent='Score: '+score+' / 15';
    say('Excellent! That is correct!');
  }else{
    opts[idx].classList.add('wrong');opts[q.ans].classList.add('correct');
    G('feedback').textContent='❌ Incorrect. Right answer: '+q.opts[q.ans];G('feedback').className='feedback wrong';
    say('Not quite. The correct answer is '+q.opts[q.ans]);
  }
  G('nextBtn').style.display='block';
}
function nextQ(){cur++;if(cur>=questions.length){showDone();return;}loadQ(cur);}
function replayAnim(){
  var q=questions[cur];clearAt();speechSynthesis.cancel();rStopTalk();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(200,function(){runAnim(q.anim);});at(400,function(){say(q.narr);});
}
function showDone(){
  G('mainArea').style.display='none';G('doneScreen').style.display='flex';
  G('progressBar').style.width='100%';
  G('doneScore').textContent='You scored '+score+' out of 15!';
  localStorage.setItem('explain_visualising_done','1');
  say('Congratulations! You completed Visualising Solid Shapes! You scored '+score+' out of 15!');
}
window.onload=function init(){initVoices(function(){startBlink();loadQ(0);});};
window.addEventListener('beforeunload',function(){speechSynthesis.cancel();});
window.addEventListener('pagehide',function(){speechSynthesis.cancel();});
</script>
</body>
