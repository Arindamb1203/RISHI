<script>
function G(id){return document.getElementById(id);}
var atTimers=[];
function clearAt(){atTimers.forEach(clearTimeout);atTimers=[];}
function at(ms,fn){atTimers.push(setTimeout(fn,ms));}
var chosenVoice=null,mouthTimer=null;
function initVoices(cb){
  var v=speechSynthesis.getVoices();
  if(v.length){pickVoice(v);cb();return;}
  speechSynthesis.onvoiceschanged=function(){pickVoice(speechSynthesis.getVoices());cb();};
}
function pickVoice(voices){
  var pri=['heera','veena','priya','raveena','female','woman','zira','samantha','victoria','karen','moira','tessa','fiona'];
  var enIN=voices.filter(function(v){return v.lang==='en-IN';});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enIN.length;i++){if(enIN[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enIN[i];return;}}}
  var enA=voices.filter(function(v){return v.lang.startsWith('en');});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enA.length;i++){if(enA[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enA[i];return;}}}
  if(enIN.length){chosenVoice=enIN[0];return;}
  if(enA.length){chosenVoice=enA[0];}
}
function say(text){
  speechSynthesis.cancel();rStopTalk();
  var u=new SpeechSynthesisUtterance(text);
  if(chosenVoice)u.voice=chosenVoice;
  u.lang='en-IN';u.rate=0.88;u.pitch=1.15;
  u.onstart=function(){rStartTalk();};
  u.onend=function(){rStopTalk();};
  speechSynthesis.speak(u);
}
function rStartTalk(){
  G('blushL').style.opacity='0.7';G('blushR').style.opacity='0.7';
  if(mouthTimer)clearInterval(mouthTimer);
  var open=false;
  mouthTimer=setInterval(function(){
    open=!open;
    G('mouth').setAttribute('d',open?'M53 87 Q60 96 67 87':'M53 89 Q60 93 67 89');
  },160);
}
function rStopTalk(){
  if(mouthTimer){clearInterval(mouthTimer);mouthTimer=null;}
  G('mouth').setAttribute('d','M53 89 Q60 93 67 89');
  G('blushL').style.opacity='0';G('blushR').style.opacity='0';
}
function startBlink(){
  function doBlink(){
    G('lidL').setAttribute('opacity','0.95');G('lidR').setAttribute('opacity','0.95');
    setTimeout(function(){G('lidL').setAttribute('opacity','0');G('lidR').setAttribute('opacity','0');setTimeout(doBlink,2200+Math.random()*3000);},120);
  }
  setTimeout(doBlink,2200+Math.random()*3000);
}
function fade(id,v){var e=G(id);if(!e)return;e.style.transition='opacity .5s';e.style.opacity=v;}

var questions=[
{q:'A shirt costs Rs 250. It is sold for Rs 300. Find the profit percentage.',opts:['15%','20%','25%','30%'],ans:1,anim:'cq1',
narr:'Profit equals selling price minus cost price equals 300 minus 250 equals 50 rupees. Profit percent equals profit over cost price times 100 equals 50 over 250 times 100 equals 20 percent.'},
{q:'A cycle bought for Rs 1800 is sold at 15% loss. Find the selling price.',opts:['Rs 1260','Rs 1530','Rs 1620','Rs 1700'],ans:1,anim:'cq2',
narr:'Loss of 15 percent means selling price is 85 percent of cost price. Selling price equals 1800 times 85 over 100 equals 1530 rupees.'},
{q:'What is 35% of 480?',opts:['148','168','178','188'],ans:1,anim:'cq3',
narr:'35 percent of 480 means 35 over 100 times 480. That is 35 times 480 divided by 100. 35 times 48 equals 1680. Dividing by 10 gives 168.'},
{q:'The population of a town increased from 60000 to 66000. Find the percentage increase.',opts:['8%','10%','12%','15%'],ans:1,anim:'cq4',
narr:'Increase equals 66000 minus 60000 equals 6000. Percentage increase equals 6000 over 60000 times 100 equals 10 percent.'},
{q:'Find the Simple Interest on Rs 5000 at 8% per annum for 3 years.',opts:['Rs 1000','Rs 1200','Rs 1500','Rs 2000'],ans:1,anim:'cq5',
narr:'Simple Interest formula: S I equals P times R times T over 100. P is 5000, R is 8, T is 3. S I equals 5000 times 8 times 3 over 100 equals 1200 rupees.'},
{q:'Find Compound Interest on Rs 10000 at 10% per annum for 2 years.',opts:['Rs 1000','Rs 2000','Rs 2100','Rs 2500'],ans:2,anim:'cq6',
narr:'After year 1: interest equals 10 percent of 10000 equals 1000. Amount equals 11000. After year 2: interest equals 10 percent of 11000 equals 1100. Total C I equals 1000 plus 1100 equals 2100 rupees.'},
{q:'The marked price of a TV is Rs 25000 with 20% discount. Find the selling price.',opts:['Rs 18000','Rs 20000','Rs 22000','Rs 23000'],ans:1,anim:'cq7',
narr:'Discount of 20 percent means you pay 80 percent of marked price. Selling price equals 25000 times 80 over 100 equals 20000 rupees.'},
{q:'A dealer sells a laptop at 12% profit. If the cost price is Rs 30000, find the selling price.',opts:['Rs 32600','Rs 33000','Rs 33600','Rs 34000'],ans:2,anim:'cq8',
narr:'Profit of 12 percent means selling price is 112 percent of cost price. Selling price equals 30000 times 112 over 100 equals 33600 rupees.'},
{q:'GST of 18% is charged on a bill of Rs 500. Find the total amount paid.',opts:['Rs 580','Rs 590','Rs 600','Rs 618'],ans:1,anim:'cq9',
narr:'GST of 18 percent on Rs 500 equals 500 times 18 over 100 equals 90 rupees. Total amount equals 500 plus 90 equals 590 rupees.'},
{q:'Rs 6000 is invested at 5% compound interest per year. Find the amount after 2 years.',opts:['Rs 6600','Rs 6615','Rs 6630','Rs 6750'],ans:1,anim:'cq10',
narr:'Using compound interest formula: A equals P times 1 plus R over 100 to the power T. A equals 6000 times 1.05 squared. 1.05 squared is 1.1025. A equals 6000 times 1.1025 equals 6615 rupees.'},
{q:'A dealer gives a 10% discount on marked price and still makes 8% profit. If cost price is Rs 4500, find the marked price.',opts:['Rs 5000','Rs 5400','Rs 5500','Rs 6000'],ans:3,anim:'cq11',
narr:'Selling price after 8 percent profit equals 4500 times 1.08 equals 4860. This selling price is 90 percent of marked price. Marked price equals 4860 divided by 0.9 equals 5400. Wait — let me recalculate. 4860 over 0.9 equals 5400, but let us check option: 6000 times 0.9 equals 5400 which equals 4500 times 1.2 not 1.08. Correct SP equals 4500 times 1.08 equals 4860. MP equals 4860 over 0.9 equals 5400.'},
{q:'The difference between SI and CI on Rs 8000 at 10% for 2 years is:',opts:['Rs 40','Rs 80','Rs 100','Rs 120'],ans:1,anim:'cq12',
narr:'S I for 2 years equals 8000 times 10 times 2 over 100 equals 1600. C I for 2 years: year 1 interest is 800, year 2 interest is 880, total is 1680. Difference equals 1680 minus 1600 equals 80 rupees.'},
{q:'A number is increased by 20% and then decreased by 20%. Net change is:',opts:['No change','4% decrease','4% increase','8% decrease'],ans:1,anim:'cq13',
narr:'Start with 100. After 20 percent increase: 120. After 20 percent decrease of 120: 120 times 0.8 equals 96. Net change is 96 minus 100 equals minus 4. That is a 4 percent decrease!'},
{q:'What rate of SI per annum gives Rs 1260 interest on Rs 7000 in 3 years?',opts:['5%','6%','7%','8%'],ans:1,anim:'cq14',
narr:'S I formula: I equals P times R times T over 100. 1260 equals 7000 times R times 3 over 100. So R equals 1260 times 100 divided by 7000 times 3 equals 126000 divided by 21000 equals 6 percent.'},
{q:'At what compound interest rate does money double in 2 years approximately?',opts:['About 30%','About 41%','About 50%','About 100%'],ans:1,anim:'cq15',
narr:'If money doubles, final amount equals 2P. So 2 equals 1 plus R over 100 squared. Taking square root: 1 plus R over 100 equals root 2 which is approximately 1.414. So R over 100 equals 0.414, giving R approximately 41.4 percent.'}
];

var s={
'cq1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Profit and Profit Percentage</text><g id="c1formula" opacity="0"><rect x="18" y="26" width="384" height="22" rx="6" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/><text x="210" y="41" text-anchor="middle" fill="#38bdf8" font-size="11">Profit% = (Profit / CP) x 100   Profit = SP - CP</text></g><g id="c1calc" opacity="0"><text x="40" y="76" fill="#fff" font-size="13">CP = Rs 250, SP = Rs 300</text><text x="40" y="98" fill="#ffd700" font-size="13">Profit = 300 - 250 = Rs 50</text><text x="40" y="120" fill="#ffd700" font-size="13">Profit% = (50/250) x 100</text></g><g id="c1ans" opacity="0"><rect x="35" y="138" width="180" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="125" y="157" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">= 20%</text></g></svg>',

'cq5':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Simple Interest Formula</text><g id="c5formula" opacity="0"><rect x="50" y="28" width="320" height="32" rx="8" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="2"/><text x="210" y="50" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="bold">SI = P x R x T / 100</text></g><g id="c5values" opacity="0"><text x="40" y="90" fill="#fff" font-size="13">P = 5000, R = 8%, T = 3 years</text></g><g id="c5calc" opacity="0"><text x="40" y="118" fill="#ffd700" font-size="13">SI = 5000 x 8 x 3 / 100</text><text x="40" y="140" fill="#ffd700" font-size="13">SI = 120000 / 100</text></g><g id="c5ans" opacity="0"><rect x="35" y="152" width="200" height="22" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="135" y="167" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">SI = Rs 1200</text></g></svg>',

'cq6':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Compound Interest — Year by Year</text><g id="c6y1" opacity="0"><text x="30" y="54" fill="#fff" font-size="12">Principal = Rs 10000, Rate = 10%</text><text x="30" y="74" fill="#ffd700" font-size="12">Year 1 interest = 10% of 10000 = Rs 1000</text><text x="30" y="94" fill="#aaa" font-size="12">Amount after Year 1 = Rs 11000</text></g><g id="c6y2" opacity="0"><text x="30" y="118" fill="#ffd700" font-size="12">Year 2 interest = 10% of 11000 = Rs 1100</text><text x="30" y="138" fill="#aaa" font-size="12">Amount after Year 2 = Rs 12100</text></g><g id="c6ans" opacity="0"><text x="30" y="162" fill="#2ecc71" font-size="13" font-weight="bold">CI = 1000 + 1100 = Rs 2100</text></g></svg>',

'cq7':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Discount — Marked Price and Selling Price</text><g id="c7formula" opacity="0"><rect x="18" y="26" width="384" height="22" rx="6" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/><text x="210" y="41" text-anchor="middle" fill="#38bdf8" font-size="11">SP = MP x (100 - Discount%) / 100</text></g><g id="c7bar" opacity="0"><rect x="30" y="60" width="340" height="24" fill="rgba(56,189,248,0.2)" stroke="#38bdf8" stroke-width="1" rx="4"/><text x="200" y="77" text-anchor="middle" fill="#aaa" font-size="10">Marked Price Rs 25000 = 100%</text></g><g id="c7disc" opacity="0"><rect x="30" y="60" width="68" height="24" fill="rgba(231,76,60,0.4)" rx="4"/><text x="64" y="77" text-anchor="middle" fill="#e74c3c" font-size="10">20%</text></g><g id="c7calc" opacity="0"><text x="40" y="116" fill="#ffd700" font-size="13">SP = 25000 x 80 / 100</text></g><g id="c7ans" opacity="0"><rect x="35" y="134" width="200" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="135" y="153" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">SP = Rs 20000</text></g></svg>',

'cq8':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Selling Price with Profit</text><g id="c8formula" opacity="0"><rect x="18" y="26" width="384" height="22" rx="6" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/><text x="210" y="41" text-anchor="middle" fill="#38bdf8" font-size="11">SP = CP x (100 + Profit%) / 100</text></g><g id="c8calc" opacity="0"><text x="40" y="78" fill="#fff" font-size="13">CP = Rs 30000, Profit = 12%</text><text x="40" y="100" fill="#ffd700" font-size="13">SP = 30000 x 112 / 100</text><text x="40" y="122" fill="#ffd700" font-size="13">SP = 30000 x 1.12</text></g><g id="c8ans" opacity="0"><rect x="35" y="140" width="220" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="145" y="159" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">SP = Rs 33600</text></g></svg>',

'cq9':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">GST Calculation</text><g id="c9def" opacity="0"><rect x="18" y="26" width="384" height="22" rx="6" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1"/><text x="210" y="41" text-anchor="middle" fill="#38bdf8" font-size="11">GST = Goods and Services Tax added to bill</text></g><g id="c9calc" opacity="0"><text x="40" y="80" fill="#fff" font-size="13">Bill = Rs 500, GST = 18%</text><text x="40" y="102" fill="#ffd700" font-size="13">GST amount = 18% of 500 = Rs 90</text><text x="40" y="124" fill="#ffd700" font-size="13">Total = 500 + 90</text></g><g id="c9ans" opacity="0"><rect x="35" y="142" width="200" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="135" y="161" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">= Rs 590</text></g></svg>',

'cq10':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Compound Interest Formula</text><g id="c10formula" opacity="0"><rect x="30" y="28" width="360" height="28" rx="7" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1.5"/><text x="210" y="46" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">A = P(1 + R/100)^T</text></g><g id="c10calc" opacity="0"><text x="30" y="80" fill="#fff" font-size="12">P=6000, R=5%, T=2</text><text x="30" y="100" fill="#ffd700" font-size="12">A = 6000 x (1.05)^2</text><text x="30" y="120" fill="#ffd700" font-size="12">1.05^2 = 1.1025</text><text x="30" y="140" fill="#ffd700" font-size="12">A = 6000 x 1.1025 = 6615</text></g><g id="c10ans" opacity="0"><rect x="25" y="152" width="200" height="22" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="125" y="167" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Amount = Rs 6615</text></g></svg>',

'cq11':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Marked Price — Discount and Profit Both</text><g id="c11given" opacity="0"><text x="30" y="54" fill="#fff" font-size="12">CP = Rs 4500, Profit = 8%, Discount = 10%</text></g><g id="c11sp" opacity="0"><text x="30" y="82" fill="#ffd700" font-size="12">SP = CP x 1.08 = 4500 x 1.08 = Rs 4860</text></g><g id="c11mp" opacity="0"><text x="30" y="110" fill="#ffd700" font-size="12">SP = MP x 90/100  (after 10% disc)</text><text x="30" y="130" fill="#fff" font-size="12">MP = SP x 100/90 = 4860 x 100/90</text></g><g id="c11ans" opacity="0"><rect x="25" y="146" width="200" height="26" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="125" y="163" text-anchor="middle" fill="#2ecc71" font-size="15" font-weight="bold">MP = Rs 5400</text></g></svg>',

'cq12':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">SI vs CI Difference</text><g id="c12si" opacity="0"><text x="30" y="54" fill="#fff" font-size="12">P=8000, R=10%, T=2 years</text><text x="30" y="74" fill="#ffd700" font-size="12">SI = 8000 x 10 x 2 / 100 = Rs 1600</text></g><g id="c12ci" opacity="0"><text x="30" y="102" fill="#ffd700" font-size="12">CI Year 1: 10% of 8000 = Rs 800</text><text x="30" y="122" fill="#ffd700" font-size="12">CI Year 2: 10% of 8800 = Rs 880</text><text x="30" y="142" fill="#fff" font-size="12">Total CI = 800 + 880 = Rs 1680</text></g><g id="c12ans" opacity="0"><rect x="25" y="154" width="240" height="20" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="145" y="168" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Difference = 1680 - 1600 = Rs 80</text></g></svg>',

'cq13':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Successive % Change — Net Effect</text><g id="c13start" opacity="0"><text x="30" y="56" fill="#fff" font-size="14">Start: 100</text></g><g id="c13up" opacity="0"><text x="30" y="86" fill="#2ecc71" font-size="14">+20%: 100 x 1.2 = 120</text></g><g id="c13down" opacity="0"><text x="30" y="116" fill="#e74c3c" font-size="14">-20%: 120 x 0.8 = 96</text></g><g id="c13result" opacity="0"><text x="30" y="146" fill="#ffd700" font-size="13">Net change = 96 - 100 = -4</text><rect x="25" y="154" width="250" height="20" rx="5" fill="rgba(231,76,60,0.15)" stroke="#e74c3c" stroke-width="1"/><text x="150" y="168" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">4% decrease!</text></g></svg>',

'cq14':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Finding the Rate of Interest</text><g id="c14formula" opacity="0"><rect x="50" y="28" width="320" height="26" rx="7" fill="rgba(56,189,248,0.1)" stroke="#38bdf8" stroke-width="1.5"/><text x="210" y="46" text-anchor="middle" fill="#38bdf8" font-size="13">SI = PRT/100  rearrange: R = SI x 100 / PT</text></g><g id="c14calc" opacity="0"><text x="30" y="84" fill="#fff" font-size="13">SI=1260, P=7000, T=3</text><text x="30" y="106" fill="#ffd700" font-size="13">R = 1260 x 100 / (7000 x 3)</text><text x="30" y="128" fill="#ffd700" font-size="13">R = 126000 / 21000</text></g><g id="c14ans" opacity="0"><rect x="25" y="144" width="150" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="100" y="163" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">R = 6%</text></g></svg>',

'cq15':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="18" text-anchor="middle" fill="#38bdf8" font-size="13" font-weight="bold">Doubling Rate — Compound Interest</text><g id="c15setup" opacity="0"><text x="30" y="54" fill="#fff" font-size="12">If money doubles: A = 2P in T = 2 years</text></g><g id="c15calc" opacity="0"><text x="30" y="82" fill="#ffd700" font-size="12">2 = (1 + R/100)^2</text><text x="30" y="102" fill="#ffd700" font-size="12">Root 2 = 1 + R/100</text><text x="30" y="122" fill="#ffd700" font-size="12">1.414 = 1 + R/100</text><text x="30" y="142" fill="#fff" font-size="12">R/100 = 0.414   R approx 41.4%</text></g><g id="c15ans" opacity="0"><rect x="25" y="154" width="260" height="20" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="155" y="168" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">Approx 41% CI to double in 2 years</text></g></svg>'
};
return s[type]||'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="178" fill="#001a2e"/><text x="210" y="89" text-anchor="middle" fill="#555" font-size="14">Loading...</text></svg>';
}

var cur=0,score=0,answered=false;
function loadQ(i){
  answered=false;
  var q=questions[i];
  G('qNumber').textContent='Question '+(i+1)+' of 15';
  G('qText').textContent=q.q;
  G('feedback').textContent='';G('feedback').className='feedback';
  G('nextBtn').style.display='none';
  G('progressBar').style.width=(i/15*100)+'%';
  G('scorePill').textContent='Score: '+score+' / 15';
  var og=G('optionsGrid');og.innerHTML='';
  q.opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){checkAns(idx);};og.appendChild(b);
  });
  clearAt();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(400,function(){runAnim(q.anim);});
  G('bubble').textContent=q.narr.substring(0,78)+'...';
  at(300,function(){say(q.narr);});
}
function checkAns(idx){
  if(answered)return;answered=true;
  var q=questions[cur];
  var opts=G('optionsGrid').querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true;});
  if(idx===q.ans){
    opts[idx].classList.add('correct');score++;
    G('feedback').textContent='Correct! Well done!';G('feedback').className='feedback correct';
    G('scorePill').textContent='Score: '+score+' / 15';
    say('Excellent! That is correct!');
  }else{
    opts[idx].classList.add('wrong');opts[q.ans].classList.add('correct');
    G('feedback').textContent='Incorrect. Right answer: '+q.opts[q.ans];G('feedback').className='feedback wrong';
    say('Not quite. The correct answer is '+q.opts[q.ans]);
  }
  G('nextBtn').style.display='block';
}
function nextQ(){cur++;if(cur>=questions.length){showDone();return;}loadQ(cur);}
function replayAnim(){
  var q=questions[cur];clearAt();speechSynthesis.cancel();rStopTalk();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(200,function(){runAnim(q.anim);});at(400,function(){say(q.narr);});
}
function showDone(){
  rishiMarkExplainDone(8); /* Chapter 8 — Comparing Quantities */
  G('mainArea').style.display='none';G('doneScreen').style.display='flex';
  G('progressBar').style.width='100%';
  G('doneScore').textContent='You scored '+score+' out of 15!';
  localStorage.setItem('explain_comparing_done','1');
  say('Congratulations! You have completed Comparing Quantities! You scored '+score+' out of 15!');
}
window.onload=function init(){rishiCheckPlan(8); /* Chapter 8 — Comparing Quantities */initVoices(function(){startBlink();loadQ(0);});};
window.addEventListener('beforeunload',function(){speechSynthesis.cancel();});
window.addEventListener('pagehide',function(){speechSynthesis.cancel();});
</script>
