<script>
function G(id){return document.getElementById(id);}
var atTimers=[];
function clearAt(){atTimers.forEach(clearTimeout);atTimers=[];}
function at(ms,fn){atTimers.push(setTimeout(fn,ms));}
var chosenVoice=null,mouthTimer=null;
function initVoices(cb){
  var v=speechSynthesis.getVoices();
  if(v.length){pickVoice(v);cb();return;}
  speechSynthesis.onvoiceschanged=function(){pickVoice(speechSynthesis.getVoices());cb();};
}
function pickVoice(voices){
  var pri=['heera','veena','priya','raveena','female','woman','zira','samantha','victoria','karen','moira','tessa','fiona'];
  var enIN=voices.filter(function(v){return v.lang==='en-IN';});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enIN.length;i++){if(enIN[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enIN[i];return;}}}
  var enA=voices.filter(function(v){return v.lang.startsWith('en');});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enA.length;i++){if(enA[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enA[i];return;}}}
  if(enIN.length){chosenVoice=enIN[0];return;}
  if(enA.length){chosenVoice=enA[0];}
}
function say(text){
  speechSynthesis.cancel();rStopTalk();
  var u=new SpeechSynthesisUtterance(text);
  if(chosenVoice)u.voice=chosenVoice;
  u.lang='en-IN';u.rate=0.88;u.pitch=1.15;
  u.onstart=function(){rStartTalk();};
  u.onend=function(){rStopTalk();};
  speechSynthesis.speak(u);
}
function rStartTalk(){
  G('blushL').style.opacity='0.7';G('blushR').style.opacity='0.7';
  if(mouthTimer)clearInterval(mouthTimer);
  var open=false;
  mouthTimer=setInterval(function(){
    open=!open;
    G('mouth').setAttribute('d',open?'M53 87 Q60 96 67 87':'M53 89 Q60 93 67 89');
  },160);
}
function rStopTalk(){
  if(mouthTimer){clearInterval(mouthTimer);mouthTimer=null;}
  G('mouth').setAttribute('d','M53 89 Q60 93 67 89');
  G('blushL').style.opacity='0';G('blushR').style.opacity='0';
}
function startBlink(){
  function doBlink(){
    G('lidL').setAttribute('opacity','0.95');G('lidR').setAttribute('opacity','0.95');
    setTimeout(function(){G('lidL').setAttribute('opacity','0');G('lidR').setAttribute('opacity','0');setTimeout(doBlink,2200+Math.random()*3000);},120);
  }
  setTimeout(doBlink,2200+Math.random()*3000);
}
function fade(id,v){var e=G(id);if(!e)return;e.style.transition='opacity .5s';e.style.opacity=v;}

var questions=[
{q:'What does 2⁵ equal?',opts:['10','25','32','16'],ans:2,anim:'pe1',
narr:'2 to the power 5 means 2 multiplied by itself 5 times. 2 times 2 is 4, times 2 is 8, times 2 is 16, times 2 is 32. So 2 to the power 5 equals 32.'},
{q:'Simplify: a³ × a⁴',opts:['a⁷','a¹²','a¹','2a⁷'],ans:0,anim:'pe2',
narr:'Law of exponents: when multiplying with the same base, add the powers. a cubed times a to the 4 equals a to the power 3 plus 4 which is a to the power 7.'},
{q:'Simplify: (a⁴) ÷ (a²)',opts:['a²','a⁸','a⁶','a'],ans:0,anim:'pe3',
narr:'When dividing with the same base, subtract the exponents. a to the 4 divided by a squared equals a to the power 4 minus 2 which is a squared.'},
{q:'What is the value of 5⁰?',opts:['0','5','1','Undefined'],ans:2,anim:'pe4',
narr:'Any number to the power zero equals 1. This is a fundamental law of exponents. So 5 to the power zero equals 1. Even 1000 to the power zero equals 1.'},
{q:'Simplify: (2³)²',opts:['2⁵','2⁶','4³','2⁹'],ans:1,anim:'pe5',
narr:'Power of a power law: multiply the exponents. 2 cubed, whole squared means 2 to the power 3 times 2, which is 2 to the power 6. That equals 64.'},
{q:'What does 3⁻² equal?',opts:['–9','1/9','–1/9','9'],ans:1,anim:'pe6',
narr:'A negative exponent means the reciprocal. a to the power minus n equals 1 over a to the n. So 3 to the power minus 2 equals 1 over 3 squared which is 1 over 9.'},
{q:'Simplify: (ab)³',opts:['a³b','ab³','a³b³','3ab'],ans:2,anim:'pe7',
narr:'Power of a product law: raise each factor to the power. a b, whole cubed equals a cubed times b cubed.'},
{q:'Express 0.000001 in standard form.',opts:['10⁻⁵','10⁻⁶','10⁻⁴','6 × 10⁻⁶'],ans:1,anim:'pe8',
narr:'Count the decimal places after the point before the 1. There are 6 places. So 0.000001 equals 10 to the power minus 6. This is standard scientific notation.'},
{q:'Simplify: (a/b)³',opts:['a³/b','a/b³','a³/b³','3a/3b'],ans:2,anim:'pe9',
narr:'Power of a quotient: raise numerator and denominator separately. a over b, whole cubed equals a cubed over b cubed.'},
{q:'The value of (–2)⁴ is:',opts:['–16','16','–8','8'],ans:1,anim:'pe10',
narr:'Negative 2 to the power 4 means minus 2 times minus 2 times minus 2 times minus 2. Negative times negative is positive. So we get positive 16.'},
{q:'Express 4.5 × 10⁵ as a normal number.',opts:['45000','450000','4500000','0.000045'],ans:1,anim:'pe11',
narr:'Multiply 4.5 by 10 to the power 5 means move the decimal point 5 places to the right. 4.5 becomes 450000. So the answer is 4 lakh 50 thousand.'},
{q:'Simplify: 2³ × 3³',opts:['6³','6⁶','5³','6⁹'],ans:0,anim:'pe12',
narr:'When both bases have the same exponent, we can combine them. 2 cubed times 3 cubed equals 2 times 3, whole cubed, which is 6 cubed, equals 216.'},
{q:'Which is greater: 2¹⁰ or 10²?',opts:['2¹⁰','10²','They are equal','Cannot compare'],ans:0,anim:'pe13',
narr:'2 to the power 10 equals 1024. 10 squared equals 100. So 2 to the power 10 equals 1024 which is much greater than 100. Powers grow very fast!'},
{q:'If 2ˣ = 64, find x.',opts:['5','6','7','8'],ans:1,anim:'pe14',
narr:'We need to express 64 as a power of 2. 2 to the 1 is 2, to the 2 is 4, to the 3 is 8, to the 4 is 16, to the 5 is 32, to the 6 is 64. So x equals 6.'},
{q:"Mass of Earth ≈ 6 × 10²⁴ kg. Mass of Moon ≈ 7.4 × 10²² kg. Earth is how many times heavier?",opts:['About 8 times','About 81 times','About 810 times','About 8100 times'],ans:1,anim:'pe15',
narr:'Divide Earth mass by Moon mass: 6 times 10 to the 24 divided by 7.4 times 10 to the 22. 10 to the 24 over 10 to the 22 is 10 squared which is 100. 6 over 7.4 is about 0.81. So 0.81 times 100 equals about 81 times heavier.'}
];

var s={
'pe1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Powers Mean Repeated Multiplication</text><g id="p1cubes" opacity="0"><rect x="28" y="110" width="28" height="28" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="2"/><text x="42" y="130" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">2</text><rect x="64" y="110" width="28" height="28" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="2"/><text x="78" y="130" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">2</text><rect x="100" y="110" width="28" height="28" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="2"/><text x="114" y="130" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">2</text><rect x="136" y="110" width="28" height="28" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="2"/><text x="150" y="130" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">2</text><rect x="172" y="110" width="28" height="28" fill="rgba(74,222,128,0.3)" stroke="#4ade80" stroke-width="2"/><text x="186" y="130" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">2</text><text x="215" y="128" fill="#aaa" font-size="18">= 32</text></g><g id="p1label" opacity="0"><text x="42" y="100" text-anchor="middle" fill="#aaa" font-size="10">x1</text><text x="78" y="100" text-anchor="middle" fill="#aaa" font-size="10">x2</text><text x="114" y="100" text-anchor="middle" fill="#aaa" font-size="10">x3</text><text x="150" y="100" text-anchor="middle" fill="#aaa" font-size="10">x4</text><text x="186" y="100" text-anchor="middle" fill="#aaa" font-size="10">x5</text></g><g id="p1ans" opacity="0"><text x="28" y="170" fill="#fff" font-size="15">2 x 2 x 2 x 2 x 2 = 32</text><rect x="280" y="152" width="120" height="22" rx="5" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/><text x="340" y="167" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">2 to 5 = 32</text></g></svg>',

'pe2':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Multiplication Law of Exponents</text><g id="p2law" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">a^m x a^n = a^(m+n)   Same base: ADD the powers</text></g><g id="p2expr" opacity="0"><text x="55" y="86" fill="#fff" font-size="22" font-weight="bold">a3 x a4</text></g><g id="p2calc" opacity="0"><text x="55" y="116" fill="#ffd700" font-size="15">Same base (a): add exponents</text><text x="55" y="140" fill="#fff" font-size="18">3 + 4 = 7</text></g><g id="p2ans" opacity="0"><rect x="50" y="152" width="110" height="22" rx="5" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/><text x="105" y="167" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">= a to 7</text></g></svg>',

'pe4':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Zero Exponent Law</text><g id="p4law" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">a to the power 0 = 1 (for any a not 0)</text></g><g id="p4proof" opacity="0"><text x="40" y="82" fill="#ffd700" font-size="12">Why? Using division law:</text><text x="40" y="102" fill="#fff" font-size="13">a3 / a3 = a^(3-3) = a to 0</text><text x="40" y="122" fill="#fff" font-size="13">But also: a3 / a3 = 1</text><text x="40" y="142" fill="#2ecc71" font-size="13">Therefore a to 0 = 1</text></g><g id="p4egs" opacity="0"><text x="40" y="166" fill="#aaa" font-size="12">5 to 0 = 1   100 to 0 = 1   999 to 0 = 1</text></g></svg>',

'pe5':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Power of a Power Law</text><g id="p5law" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">(a^m)^n = a^(m x n)   MULTIPLY the powers</text></g><g id="p5expr" opacity="0"><text x="55" y="86" fill="#fff" font-size="22" font-weight="bold">(2 cubed) squared</text></g><g id="p5calc" opacity="0"><text x="55" y="116" fill="#ffd700" font-size="15">Multiply exponents: 3 x 2 = 6</text><text x="55" y="140" fill="#fff" font-size="18">= 2 to 6 = 64</text></g><g id="p5verify" opacity="0"><text x="230" y="116" fill="#aaa" font-size="11">Check: 2^3 = 8</text><text x="230" y="134" fill="#aaa" font-size="11">8 squared = 64</text><rect x="225" y="144" width="90" height="18" rx="4" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="270" y="157" text-anchor="middle" fill="#4ade80" font-size="11">Verified!</text></g></svg>',

'pe6':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Negative Exponent Law</text><g id="p6law" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">a^(-n) = 1 / (a^n)   Flip to denominator!</text></g><g id="p6expr" opacity="0"><text x="55" y="86" fill="#fff" font-size="22" font-weight="bold">3 to -2</text></g><g id="p6step" opacity="0"><text x="55" y="116" fill="#ffd700" font-size="14">Negative power = reciprocal</text><text x="55" y="140" fill="#fff" font-size="16">= 1 / (3 squared) = 1/9</text></g><g id="p6vis" opacity="0"><text x="280" y="86" fill="#aaa" font-size="11">Pattern:</text><text x="280" y="104" fill="#aaa" font-size="11">3^2 = 9</text><text x="280" y="122" fill="#aaa" font-size="11">3^1 = 3</text><text x="280" y="140" fill="#aaa" font-size="11">3^0 = 1</text><text x="280" y="158" fill="#4ade80" font-size="11">3^-1 = 1/3</text></g></svg>',

'pe7':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Power of a Product Law</text><g id="p7law" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">(ab)^n = a^n x b^n   Each factor gets the power</text></g><g id="p7expr" opacity="0"><text x="55" y="84" fill="#fff" font-size="22" font-weight="bold">(ab) cubed</text></g><g id="p7expand" opacity="0"><text x="55" y="114" fill="#ffd700" font-size="14">= (ab)(ab)(ab)</text><text x="55" y="138" fill="#ffd700" font-size="14">= a.a.a x b.b.b</text></g><g id="p7ans" opacity="0"><rect x="50" y="152" width="160" height="22" rx="5" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/><text x="130" y="167" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="bold">= a cubed x b cubed</text></g></svg>',

'pe8':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Standard Form (Scientific Notation)</text><g id="p8expr" opacity="0"><text x="40" y="58" fill="#fff" font-size="18" font-weight="bold">0.000001</text></g><g id="p8count" opacity="0"><text x="40" y="86" fill="#ffd700" font-size="13">Count zeros after decimal before the 1:</text><text x="40" y="106" fill="#fff" font-size="14">0 . 0 0 0 0 0 1</text><text x="40" y="124" fill="#aaa" font-size="12">  1  2  3  4  5  6  places</text></g><g id="p8ans" opacity="0"><rect x="35" y="140" width="190" height="28" rx="6" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/><text x="130" y="158" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="bold">= 10 to -6</text></g></svg>',

'pe9':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Power of a Quotient Law</text><g id="p9law" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">(a/b)^n = a^n / b^n   Power applies to top and bottom</text></g><g id="p9expr" opacity="0"><text x="55" y="86" fill="#fff" font-size="22" font-weight="bold">(a/b) cubed</text></g><g id="p9expand" opacity="0"><text x="55" y="116" fill="#ffd700" font-size="14">= (a.a.a) / (b.b.b)</text></g><g id="p9ans" opacity="0"><rect x="50" y="134" width="200" height="28" rx="6" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/><text x="150" y="152" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="bold">= a cubed / b cubed</text></g></svg>',

'pe10':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Negative Base with Even Power</text><g id="p10expr" opacity="0"><text x="55" y="68" fill="#fff" font-size="22" font-weight="bold">(-2) to 4</text></g><g id="p10expand" opacity="0"><text x="40" y="100" fill="#ffd700" font-size="13">= (-2) x (-2) x (-2) x (-2)</text></g><g id="p10pairs" opacity="0"><text x="40" y="126" fill="#aaa" font-size="12">(-2)x(-2) = +4  and  (-2)x(-2) = +4</text><text x="40" y="146" fill="#fff" font-size="14">= 4 x 4 = 16</text></g><g id="p10rule" opacity="0"><rect x="35" y="156" width="300" height="18" rx="5" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="185" y="169" text-anchor="middle" fill="#4ade80" font-size="11">Even power = always positive result</text></g></svg>',

'pe11':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Scientific Notation to Normal Number</text><g id="p11expr" opacity="0"><text x="40" y="60" fill="#fff" font-size="20" font-weight="bold">4.5 x 10 to 5</text></g><g id="p11step" opacity="0"><text x="40" y="90" fill="#ffd700" font-size="13">Positive power: move decimal RIGHT</text><text x="40" y="110" fill="#aaa" font-size="12">Move 5 places to the right:</text><text x="40" y="132" fill="#fff" font-size="16">4.50000 becomes 450000</text></g><g id="p11ans" opacity="0"><rect x="35" y="150" width="200" height="22" rx="5" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/><text x="135" y="165" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">= 4,50,000</text></g></svg>',

'pe12':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Same Power Different Bases</text><g id="p12law" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(74,222,128,0.1)" stroke="#4ade80" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">a^n x b^n = (ab)^n</text></g><g id="p12expr" opacity="0"><text x="55" y="86" fill="#fff" font-size="22" font-weight="bold">2 cubed x 3 cubed</text></g><g id="p12calc" opacity="0"><text x="55" y="116" fill="#ffd700" font-size="14">Same exponent: combine bases</text><text x="55" y="140" fill="#fff" font-size="16">= (2 x 3) cubed = 6 cubed = 216</text></g><g id="p12ans" opacity="0"><rect x="50" y="154" width="180" height="20" rx="5" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/><text x="140" y="168" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">= 6 cubed = 216</text></g></svg>',

'pe13':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Powers Grow Very Fast!</text><g id="p13calc" opacity="0"><text x="40" y="58" fill="#fff" font-size="15">2 to 10 = 1024</text><text x="40" y="80" fill="#fff" font-size="15">10 squared = 100</text></g><g id="p13bar1" opacity="0"><rect x="220" y="90" width="0" height="22" fill="#4ade80" id="bar1r"/><text x="215" y="106" text-anchor="end" fill="#aaa" font-size="11">2^10</text></g><g id="p13bar2" opacity="0"><rect x="220" y="120" width="0" height="22" fill="#e74c3c" id="bar2r"/><text x="215" y="136" text-anchor="end" fill="#aaa" font-size="11">10^2</text></g><g id="p13ans" opacity="0"><rect x="35" y="152" width="280" height="20" rx="5" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/><text x="175" y="166" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="bold">1024 is greater than 100   2^10 wins!</text></g></svg>',

'pe14':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Finding the Exponent</text><g id="p14expr" opacity="0"><text x="55" y="62" fill="#fff" font-size="22" font-weight="bold">2^x = 64</text></g><g id="p14steps" opacity="0"><text x="40" y="92" fill="#ffd700" font-size="12">Keep multiplying 2 until we reach 64:</text><text x="40" y="112" fill="#aaa" font-size="12">2^1=2  2^2=4  2^3=8  2^4=16</text><text x="40" y="130" fill="#aaa" font-size="12">2^5=32  2^6=64</text></g><g id="p14ans" opacity="0"><rect x="35" y="148" width="140" height="24" rx="6" fill="rgba(74,222,128,0.2)" stroke="#4ade80" stroke-width="1.5"/><text x="105" y="164" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="bold">x = 6</text></g></svg>',

'pe15':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="18" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Real World: Comparing Masses</text><g id="p15data" opacity="0"><text x="25" y="52" fill="#fff" font-size="12">Earth: 6 x 10^24 kg</text><text x="25" y="70" fill="#fff" font-size="12">Moon: 7.4 x 10^22 kg</text></g><g id="p15calc" opacity="0"><text x="25" y="96" fill="#ffd700" font-size="12">Divide: (6 x 10^24) / (7.4 x 10^22)</text><text x="25" y="114" fill="#fff" font-size="12">= (6/7.4) x 10^(24-22)</text><text x="25" y="132" fill="#fff" font-size="12">= 0.81 x 10^2 = 0.81 x 100 = 81</text></g><g id="p15ans" opacity="0"><rect x="20" y="148" width="260" height="24" rx="6" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1"/><text x="150" y="164" text-anchor="middle" fill="#4ade80" font-size="13" font-weight="bold">Earth is about 81 times heavier</text></g></svg>'
};
return s[type]||'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="178" fill="#0d1f12"/><text x="210" y="89" text-anchor="middle" fill="#555" font-size="14">Loading...</text></svg>';
}

function runAnim(type){
var s={
'pe1':function(){fade('p1cubes','1');at(900,function(){fade('p1label','1');});at(2000,function(){fade('p1ans','1');});},
'pe2':function(){fade('p2law','1');at(700,function(){fade('p2expr','1');});at(1600,function(){fade('p2calc','1');});at(2800,function(){fade('p2ans','1');});},
'pe3':function(){fade('p3law','1');at(700,function(){fade('p3expr','1');});at(1600,function(){fade('p3calc','1');});at(2800,function(){fade('p3ans','1');});},
'pe4':function(){fade('p4law','1');at(800,function(){fade('p4proof','1');});at(2800,function(){fade('p4egs','1');});},
'pe5':function(){fade('p5law','1');at(700,function(){fade('p5expr','1');});at(1600,function(){fade('p5calc','1');});at(2800,function(){fade('p5verify','1');});},
'pe6':function(){fade('p6law','1');at(700,function(){fade('p6expr','1');});at(1600,function(){fade('p6step','1');});at(2800,function(){fade('p6vis','1');});},
'pe7':function(){fade('p7law','1');at(700,function(){fade('p7expr','1');});at(1600,function(){fade('p7expand','1');});at(2800,function(){fade('p7ans','1');});},
'pe8':function(){fade('p8expr','1');at(700,function(){fade('p8count','1');});at(2400,function(){fade('p8ans','1');});},
'pe9':function(){fade('p9law','1');at(700,function(){fade('p9expr','1');});at(1600,function(){fade('p9expand','1');});at(2600,function(){fade('p9ans','1');});},
'pe10':function(){fade('p10expr','1');at(700,function(){fade('p10expand','1');});at(1800,function(){fade('p10pairs','1');});at(3000,function(){fade('p10rule','1');});},
'pe11':function(){fade('p11expr','1');at(700,function(){fade('p11step','1');});at(2400,function(){fade('p11ans','1');});},
'pe12':function(){fade('p12law','1');at(700,function(){fade('p12expr','1');});at(1600,function(){fade('p12calc','1');});at(2800,function(){fade('p12ans','1');});},
'pe13':function(){fade('p13calc','1');at(900,function(){fade('p13bar1','1');var el=document.getElementById('bar1r');if(el){var w=0;var t=setInterval(function(){w+=3;el.setAttribute('width',w+'');if(w>=155)clearInterval(t);},20);}});at(1800,function(){fade('p13bar2','1');var el=document.getElementById('bar2r');if(el){var w=0;var t=setInterval(function(){w+=1.5;el.setAttribute('width',w+'');if(w>=15)clearInterval(t);},20);}});at(3000,function(){fade('p13ans','1');});},
'pe14':function(){fade('p14expr','1');at(700,function(){fade('p14steps','1');});at(2400,function(){fade('p14ans','1');});},
'pe15':function(){fade('p15data','1');at(900,function(){fade('p15calc','1');});at(2800,function(){fade('p15ans','1');});}
};
if(s[type])s[type]();
}

var cur=0,score=0,answered=false;
function loadQ(i){
  answered=false;
  var q=questions[i];
  G('qNumber').textContent='Question '+(i+1)+' of 15';
  G('qText').textContent=q.q;
  G('feedback').textContent='';G('feedback').className='feedback';
  G('nextBtn').style.display='none';
  G('progressBar').style.width=(i/15*100)+'%';
  G('scorePill').textContent='Score: '+score+' / 15';
  var og=G('optionsGrid');og.innerHTML='';
  q.opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){checkAns(idx);};og.appendChild(b);
  });
  clearAt();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(400,function(){runAnim(q.anim);});
  G('bubble').textContent=q.narr.substring(0,78)+'...';
  at(300,function(){say(q.narr);});
}
function checkAns(idx){
  if(answered)return;answered=true;
  var q=questions[cur];
  var opts=G('optionsGrid').querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true;});
  if(idx===q.ans){
    opts[idx].classList.add('correct');score++;
    G('feedback').textContent='Correct! Well done!';G('feedback').className='feedback correct';
    G('scorePill').textContent='Score: '+score+' / 15';
    say('Excellent! That is correct!');
  }else{
    opts[idx].classList.add('wrong');opts[q.ans].classList.add('correct');
    G('feedback').textContent='Incorrect. Right answer: '+q.opts[q.ans];G('feedback').className='feedback wrong';
    say('Not quite. The correct answer is '+q.opts[q.ans]);
  }
  G('nextBtn').style.display='block';
}
function nextQ(){cur++;if(cur>=questions.length){showDone();return;}loadQ(cur);}
function replayAnim(){
  var q=questions[cur];clearAt();speechSynthesis.cancel();rStopTalk();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(200,function(){runAnim(q.anim);});at(400,function(){say(q.narr);});
}
function showDone(){
  rishiMarkExplainDone(12); /* Chapter 12 — Exponents and Powers */
  G('mainArea').style.display='none';G('doneScreen').style.display='flex';
  G('progressBar').style.width='100%';
  G('doneScore').textContent='You scored '+score+' out of 15!';
  localStorage.setItem('explain_powers_done','1');
  say('Congratulations! You have completed Powers and Exponents! You scored '+score+' out of 15!');
}
window.onload=function init(){rishiCheckPlan(12); /* Chapter 12 — Exponents and Powers */initVoices(function(){startBlink();loadQ(0);});};
window.addEventListener('beforeunload',function(){speechSynthesis.cancel();});
window.addEventListener('pagehide',function(){speechSynthesis.cancel();});
</script>
