<script>
function G(id){return document.getElementById(id);}
var atTimers=[];
function clearAt(){atTimers.forEach(clearTimeout);atTimers=[];}
function at(ms,fn){atTimers.push(setTimeout(fn,ms));}
var chosenVoice=null,mouthTimer=null;
function initVoices(cb){
  var v=speechSynthesis.getVoices();
  if(v.length){pickVoice(v);cb();return;}
  speechSynthesis.onvoiceschanged=function(){pickVoice(speechSynthesis.getVoices());cb();};
}
function pickVoice(voices){
  var pri=['heera','veena','priya','raveena','female','woman','zira','samantha','victoria','karen','moira','tessa','fiona'];
  var enIN=voices.filter(function(v){return v.lang==='en-IN';});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enIN.length;i++){if(enIN[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enIN[i];return;}}}
  var enA=voices.filter(function(v){return v.lang.startsWith('en');});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enA.length;i++){if(enA[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enA[i];return;}}}
  if(enIN.length){chosenVoice=enIN[0];return;}
  if(enA.length){chosenVoice=enA[0];}
}
function stopAllAudio(){
  if(elAudio){try{elAudio.pause();elAudio.src="";}catch(x){} elAudio=null;}
  if(window.speechSynthesis)window.speechSynthesis.cancel();
}
function sayBrowser(text,onEnd){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  rSetAvatar("speaking");startSpeakAnim();
  var u=new SpeechSynthesisUtterance(text);
  u.lang="en-IN";u.rate=0.88;u.pitch=1.15;
  if(selectedVoice)u.voice=selectedVoice;
  u.onend=function(){stopSpeakAnim();rSetAvatar("idle");if(onEnd)onEnd();};
  u.onerror=function(){stopSpeakAnim();rSetAvatar("idle");if(onEnd)onEnd();};
  window.speechSynthesis.speak(u);
}
function say(text,onEnd){
  stopAllAudio();
  rSetAvatar("speaking");startSpeakAnim();
  fetch("/tts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:text})})
  .then(function(res){if(!res.ok)throw new Error("TTS "+res.status);return res.blob();})
  .then(function(blob){
    var url=URL.createObjectURL(blob);
    elAudio=new Audio(url);
    elAudio.onended=function(){URL.revokeObjectURL(url);elAudio=null;stopSpeakAnim();rSetAvatar("idle");if(onEnd)onEnd();};
    elAudio.onerror=function(){URL.revokeObjectURL(url);elAudio=null;stopSpeakAnim();rSetAvatar("idle");if(onEnd)onEnd();};
    elAudio.play();
  })
  .catch(function(err){sayBrowser(text,onEnd);});
}
function rStartTalk(){
  G('blushL').style.opacity='0.7';G('blushR').style.opacity='0.7';
  if(mouthTimer)clearInterval(mouthTimer);
  var open=false;
  mouthTimer=setInterval(function(){
    open=!open;
    G('mouth').setAttribute('d',open?'M53 87 Q60 96 67 87':'M53 89 Q60 93 67 89');
  },160);
}
function rStopTalk(){
  if(mouthTimer){clearInterval(mouthTimer);mouthTimer=null;}
  G('mouth').setAttribute('d','M53 89 Q60 93 67 89');
  G('blushL').style.opacity='0';G('blushR').style.opacity='0';
}
function startBlink(){
  function doBlink(){
    G('lidL').setAttribute('opacity','0.95');G('lidR').setAttribute('opacity','0.95');
    setTimeout(function(){G('lidL').setAttribute('opacity','0');G('lidR').setAttribute('opacity','0');setTimeout(doBlink,2200+Math.random()*3000);},120);
  }
  setTimeout(doBlink,2200+Math.random()*3000);
}
function fade(id,v){var e=G(id);if(!e)return;e.style.transition='opacity .5s';e.style.opacity=v;}

var questions=[
{q:'Which of the following is a rational number?',opts:['Root 2','Pi (π)','3/4','Root 3'],ans:2,anim:'rn1',
narr:'A rational number can be written as p over q, where p and q are integers and q is not zero. Three-fourths fits perfectly. Root 2 and pi are irrational.'},
{q:'What is the additive inverse of –3/5?',opts:['3/5','–3/5','5/3','–5/3'],ans:0,anim:'rn2',
narr:'The additive inverse is what you add to get zero. Minus 3 over 5 plus 3 over 5 equals zero. So the additive inverse of minus 3 over 5 is positive 3 over 5.'},
{q:'What is the multiplicative inverse of 7/9?',opts:['–9/7','7/9','9/7','–7/9'],ans:2,anim:'rn3',
narr:'The multiplicative inverse, or reciprocal, is what you multiply to get 1. 7 over 9 times 9 over 7 equals 1. So the reciprocal of 7 over 9 is 9 over 7.'},
{q:'3/4 + (1/4 + 5/8) = (3/4 + 1/4) + 5/8 shows which property?',opts:['Commutative','Associative','Distributive','Closure'],ans:1,anim:'rn4',
narr:'When we rearrange the brackets but keep the numbers in the same order, that is the Associative Property of addition. The grouping changes but the result stays the same.'},
{q:'Simplify: –3/7 + (–2/7)',opts:['–5/7','5/7','–1/7','1/7'],ans:0,anim:'rn5',
narr:'Both fractions have the same denominator 7. Add the numerators: minus 3 plus minus 2 equals minus 5. Answer is minus 5 over 7.'},
{q:'Between which two consecutive integers does –7/3 lie?',opts:['–3 and –2','–2 and –1','–4 and –3','–1 and 0'],ans:0,anim:'rn6',
narr:'7 divided by 3 equals 2.33. So minus 7 over 3 equals minus 2.33. On the number line, minus 2.33 lies between minus 3 and minus 2.'},
{q:'The product of 4/9 and –3/8 is:',opts:['–1/6','1/6','–12/17','–7/72'],ans:0,anim:'rn7',
narr:'Multiply numerators: 4 times minus 3 equals minus 12. Multiply denominators: 9 times 8 equals 72. Simplify minus 12 over 72 by dividing both by 12 to get minus 1 over 6.'},
{q:'Rational numbers are closed under which operations?',opts:['+  and – only','× only','+, –, × and ÷ (not ÷0)','+ only'],ans:2,anim:'rn8',
narr:'Rational numbers are closed under addition, subtraction, multiplication and division — except division by zero. All four operations keep us within rational numbers.'},
{q:'Simplify: (–5/6) ÷ (5/12)',opts:['–2','2','–25/72','1/2'],ans:0,anim:'rn9',
narr:'To divide fractions, multiply by the reciprocal. Minus 5 over 6 times 12 over 5. The 5s cancel and 12 over 6 equals 2. Answer: minus 2.'},
{q:'A rational number between 1/4 and 1/2 is:',opts:['1/3','1/5','2/3','3/4'],ans:0,anim:'rn10',
narr:'1 over 4 equals 0.25 and 1 over 2 equals 0.5. We need a number between them. 1 over 3 equals 0.33, which lies between 0.25 and 0.5. So 1 over 3 is our answer.'},
{q:'What is (–3/5) × (–5/3)?',opts:['–1','1','9/25','–9/25'],ans:1,anim:'rn11',
narr:'Multiply numerators: minus 3 times minus 5 equals positive 15. Multiply denominators: 5 times 3 equals 15. So the answer is 15 over 15 which equals 1. A number times its reciprocal is always 1.'},
{q:'Which of these lies between –1 and 0 on the number line?',opts:['–3/2','–1/3','–5/4','–7/6'],ans:1,anim:'rn12',
narr:'We need a number with absolute value less than 1. Minus 3 over 2 equals minus 1.5, outside the range. Minus 1 over 3 equals approximately minus 0.33, which is between minus 1 and 0.'},
{q:'Find x if (2/3) × x = –4/9',opts:['–2/3','–6/9','2/3','–3/6'],ans:0,anim:'rn13',
narr:'Divide both sides by 2 over 3, meaning multiply by its reciprocal 3 over 2. x equals minus 4 over 9 times 3 over 2 equals minus 12 over 18 which simplifies to minus 2 over 3.'},
{q:'The sum of a rational number and its additive inverse is always:',opts:['1','–1','0','The number itself'],ans:2,anim:'rn14',
narr:'By definition, the additive inverse of p over q is minus p over q. Their sum equals p over q plus minus p over q equals zero. Always zero, for every rational number.'},
{q:'If p/q = –8/12, which is the standard form?',opts:['–2/3','–4/6','–8/12','2/3'],ans:0,anim:'rn15',
narr:'Standard form means the denominator is positive and the fraction is fully simplified. H C F of 8 and 12 is 4. Dividing both by 4 gives minus 2 over 3. The negative sign stays with the numerator.'}
];

'rn1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">What is a Rational Number?</text><g id="r1def" opacity="0"><rect x="18" y="26" width="384" height="26" rx="6" fill="rgba(192,132,252,0.1)" stroke="#c084fc" stroke-width="1"/><text x="210" y="43" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold">p/q where p, q are integers and q is not 0</text></g><g id="r1yes" opacity="0"><text x="30" y="80" fill="#2ecc71" font-size="13">Rational: 3/4, -2/7, 0, 5, -3</text></g><g id="r1no" opacity="0"><text x="30" y="104" fill="#e74c3c" font-size="13">Irrational: root 2,  pi,  root 3</text></g><g id="r1check" opacity="0"><text x="30" y="136" fill="#fff" font-size="12">3/4  p=3, q=4, q not 0  Rational</text><text x="30" y="158" fill="#aaa" font-size="12">root 2 cannot be written as p/q  Irrational</text></g></svg>',

'rn2':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Additive Inverse</text><g id="r2def" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(192,132,252,0.1)" stroke="#c084fc" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#c084fc" font-size="11">Additive Inverse of p/q = -p/q   Their sum = 0</text></g><g id="r2nl" opacity="0"><line x1="40" y1="98" x2="380" y2="98" stroke="#888" stroke-width="2"/><line x1="210" y1="88" x2="210" y2="108" stroke="#fff" stroke-width="2"/><text x="210" y="120" text-anchor="middle" fill="#fff" font-size="11">0</text><line x1="118" y1="88" x2="118" y2="108" stroke="#e74c3c" stroke-width="2"/><text x="118" y="120" text-anchor="middle" fill="#e74c3c" font-size="11">-3/5</text><line x1="302" y1="88" x2="302" y2="108" stroke="#2ecc71" stroke-width="2"/><text x="302" y="120" text-anchor="middle" fill="#2ecc71" font-size="11">3/5</text></g><g id="r2ans" opacity="0"><text x="90" y="150" fill="#fff" font-size="14">(-3/5) + (3/5) = 0</text><rect x="85" y="157" width="175" height="18" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="172" y="170" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">Additive Inverse = 3/5</text></g></svg>',

'rn3':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Multiplicative Inverse</text><g id="r3def" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(192,132,252,0.1)" stroke="#c084fc" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#c084fc" font-size="11">Reciprocal of p/q = q/p   Product = 1</text></g><g id="r3show" opacity="0"><text x="65" y="92" fill="#fff" font-size="24" font-weight="bold">7/9</text><text x="135" y="92" fill="#aaa" font-size="22">x</text><text x="160" y="92" fill="#ffd700" font-size="24" font-weight="bold">9/7</text><text x="228" y="92" fill="#aaa" font-size="22">=</text><text x="256" y="92" fill="#2ecc71" font-size="24" font-weight="bold">1</text></g><g id="r3rule" opacity="0"><text x="60" y="128" fill="#aaa" font-size="12">Flip numerator and denominator</text><rect x="55" y="138" width="175" height="20" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="142" y="153" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">Reciprocal of 7/9 = 9/7</text></g></svg>',

'rn4':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Associative Property</text><g id="r4rule" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(192,132,252,0.1)" stroke="#c084fc" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#c084fc" font-size="11">a + (b + c) = (a + b) + c    Grouping changes, result same</text></g><g id="r4left" opacity="0"><text x="25" y="76" fill="#ffd700" font-size="11">Left side: 3/4 + (1/4 + 5/8)</text><text x="25" y="94" fill="#fff" font-size="11">= 3/4 + (2/8 + 5/8) = 3/4 + 7/8 = 6/8 + 7/8 = 13/8</text></g><g id="r4right" opacity="0"><text x="25" y="120" fill="#ffd700" font-size="11">Right side: (3/4 + 1/4) + 5/8</text><text x="25" y="138" fill="#fff" font-size="11">= (6/8 + 2/8) + 5/8 = 8/8 + 5/8 = 13/8</text></g><g id="r4same" opacity="0"><rect x="20" y="152" width="220" height="20" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="130" y="166" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">Both = 13/8   Associative!</text></g></svg>',

'rn5':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Adding Rational Numbers</text><g id="r5expr" opacity="0"><text x="55" y="68" fill="#fff" font-size="22" font-weight="bold">-3/7 + (-2/7)</text></g><g id="r5step" opacity="0"><text x="55" y="100" fill="#ffd700" font-size="13">Same denominator: add numerators</text><text x="55" y="124" fill="#fff" font-size="18">(-3) + (-2) = -5</text></g><g id="r5ans" opacity="0"><rect x="50" y="142" width="130" height="28" rx="7" fill="rgba(192,132,252,0.2)" stroke="#c084fc" stroke-width="1.5"/><text x="115" y="161" text-anchor="middle" fill="#c084fc" font-size="18" font-weight="bold">= -5/7</text></g></svg>',

'rn6':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Locating -7/3 on the Number Line</text><g id="r6line" opacity="0"><line x1="28" y1="90" x2="390" y2="90" stroke="#888" stroke-width="2"/><line x1="28" y1="82" x2="28" y2="98" stroke="#fff" stroke-width="2"/><text x="28" y="112" text-anchor="middle" fill="#aaa" font-size="10">-4</text><line x1="100" y1="82" x2="100" y2="98" stroke="#fff" stroke-width="2"/><text x="100" y="112" text-anchor="middle" fill="#aaa" font-size="10">-3</text><line x1="172" y1="82" x2="172" y2="98" stroke="#fff" stroke-width="2"/><text x="172" y="112" text-anchor="middle" fill="#aaa" font-size="10">-2</text><line x1="244" y1="82" x2="244" y2="98" stroke="#fff" stroke-width="2"/><text x="244" y="112" text-anchor="middle" fill="#aaa" font-size="10">-1</text><line x1="316" y1="82" x2="316" y2="98" stroke="#fff" stroke-width="2"/><text x="316" y="112" text-anchor="middle" fill="#aaa" font-size="10">0</text></g><g id="r6pt" opacity="0"><circle cx="124" cy="90" r="7" fill="#c084fc"/><text x="124" y="74" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold">-7/3 = -2.33</text></g><g id="r6exp" opacity="0"><text x="55" y="140" fill="#ffd700" font-size="12">7 / 3 = 2.33  so  -7/3 = -2.33</text><text x="55" y="160" fill="#2ecc71" font-size="12">Lies between -3 and -2</text></g></svg>',

'rn7':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Multiplying Rational Numbers</text><g id="r7expr" opacity="0"><text x="40" y="60" fill="#fff" font-size="19" font-weight="bold">4/9 x (-3/8)</text></g><g id="r7step" opacity="0"><text x="40" y="90" fill="#ffd700" font-size="13">Multiply numerators: 4 x -3 = -12</text><text x="40" y="112" fill="#ffd700" font-size="13">Multiply denominators: 9 x 8 = 72</text><text x="40" y="134" fill="#fff" font-size="14">= -12/72</text></g><g id="r7ans" opacity="0"><text x="40" y="158" fill="#aaa" font-size="12">Simplify (divide by HCF 12):</text><rect x="140" y="146" width="120" height="24" rx="6" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="200" y="162" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">= -1/6</text></g></svg>',

'rn8':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Closure Property of Rational Numbers</text><g id="r8rule" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(192,132,252,0.1)" stroke="#c084fc" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#c084fc" font-size="11">Result of any operation on rationals is also rational</text></g><g id="r8ops" opacity="0"><text x="30" y="76" fill="#2ecc71" font-size="12">1/2 + 1/3 = 5/6  Rational</text><text x="30" y="96" fill="#2ecc71" font-size="12">3/4 - 1/4 = 2/4  Rational</text><text x="30" y="116" fill="#2ecc71" font-size="12">2/3 x 3/4 = 6/12  Rational</text><text x="30" y="136" fill="#2ecc71" font-size="12">4/5 / 2/5 = 2/1  Rational</text></g><g id="r8exc" opacity="0"><text x="30" y="162" fill="#e74c3c" font-size="12">Exception: division by zero is not defined</text></g></svg>',

'rn9':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Dividing Rational Numbers</text><g id="r9expr" opacity="0"><text x="40" y="60" fill="#fff" font-size="18" font-weight="bold">(-5/6) / (5/12)</text></g><g id="r9step" opacity="0"><text x="40" y="88" fill="#ffd700" font-size="13">Division = multiply by reciprocal</text><text x="40" y="110" fill="#fff" font-size="16">= (-5/6) x (12/5)</text></g><g id="r9cancel" opacity="0"><text x="40" y="134" fill="#aaa" font-size="12">5s cancel, 12/6 = 2</text><text x="40" y="154" fill="#fff" font-size="16">= -1 x 2 = -2</text></g><g id="r9ans" opacity="0"><rect x="160" y="144" width="80" height="24" rx="6" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="200" y="160" text-anchor="middle" fill="#2ecc71" font-size="15" font-weight="bold">= -2</text></g></svg>',

'rn10':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Finding a Rational Number Between Two</text><g id="r10line" opacity="0"><line x1="40" y1="80" x2="380" y2="80" stroke="#888" stroke-width="2"/><line x1="80" y1="70" x2="80" y2="90" stroke="#e74c3c" stroke-width="2"/><text x="80" y="104" text-anchor="middle" fill="#e74c3c" font-size="11">1/4 = 0.25</text><line x1="340" y1="70" x2="340" y2="90" stroke="#e74c3c" stroke-width="2"/><text x="340" y="104" text-anchor="middle" fill="#e74c3c" font-size="11">1/2 = 0.5</text></g><g id="r10pt" opacity="0"><circle cx="180" cy="80" r="8" fill="#c084fc"/><text x="180" y="64" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="bold">1/3 = 0.33</text></g><g id="r10check" opacity="0"><text x="80" y="136" fill="#ffd700" font-size="12">0.25  &lt;  0.33  &lt;  0.5</text><rect x="75" y="148" width="170" height="20" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="160" y="162" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">1/3 lies between 1/4 and 1/2</text></g></svg>',

'rn11':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Number Times Its Reciprocal = 1</text><g id="r11expr" opacity="0"><text x="55" y="72" fill="#fff" font-size="22" font-weight="bold">(-3/5) x (-5/3)</text></g><g id="r11calc" opacity="0"><text x="55" y="102" fill="#ffd700" font-size="13">Neg x Neg = Positive</text><text x="55" y="124" fill="#fff" font-size="16">= (3 x 5) / (5 x 3) = 15/15</text></g><g id="r11ans" opacity="0"><rect x="50" y="140" width="140" height="28" rx="7" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="120" y="159" text-anchor="middle" fill="#2ecc71" font-size="20" font-weight="bold">= 1</text><text x="220" y="159" fill="#aaa" font-size="12">Always 1 !</text></g></svg>',

'rn12':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Between -1 and 0 on the Number Line</text><g id="r12line" opacity="0"><line x1="40" y1="80" x2="380" y2="80" stroke="#888" stroke-width="2"/><line x1="40" y1="70" x2="40" y2="90" stroke="#fff" stroke-width="2"/><text x="40" y="104" text-anchor="middle" fill="#fff" font-size="11">-2</text><line x1="150" y1="70" x2="150" y2="90" stroke="#e74c3c" stroke-width="2"/><text x="150" y="104" text-anchor="middle" fill="#e74c3c" font-size="11">-1</text><line x1="260" y1="70" x2="260" y2="90" stroke="#e74c3c" stroke-width="2"/><text x="260" y="104" text-anchor="middle" fill="#e74c3c" font-size="11">0</text><line x1="370" y1="70" x2="370" y2="90" stroke="#fff" stroke-width="2"/><text x="370" y="104" text-anchor="middle" fill="#fff" font-size="11">1</text></g><g id="r12pt" opacity="0"><circle cx="223" cy="80" r="8" fill="#c084fc"/><text x="223" y="64" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold">-1/3 = -0.33</text></g><g id="r12check" opacity="0"><text x="75" y="136" fill="#ffd700" font-size="12">-1  &lt;  -0.33  &lt;  0</text><rect x="70" y="148" width="200" height="20" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="170" y="162" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">-1/3 lies between -1 and 0</text></g></svg>',

'rn13':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Solving for x — Rational Equation</text><g id="r13expr" opacity="0"><text x="40" y="60" fill="#fff" font-size="18" font-weight="bold">(2/3) x x = -4/9</text></g><g id="r13step" opacity="0"><text x="40" y="90" fill="#ffd700" font-size="13">Multiply both sides by reciprocal of 2/3</text><text x="40" y="112" fill="#fff" font-size="15">x = -4/9 x 3/2</text></g><g id="r13calc" opacity="0"><text x="40" y="138" fill="#fff" font-size="15">x = -12/18</text><text x="40" y="158" fill="#aaa" font-size="12">Simplify (divide by HCF 6):</text></g><g id="r13ans" opacity="0"><rect x="160" y="146" width="110" height="22" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="215" y="162" text-anchor="middle" fill="#2ecc71" font-size="13" font-weight="bold">x = -2/3</text></g></svg>',

'rn14':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Additive Inverse Sum = 0 Always</text><g id="r14rule" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(192,132,252,0.1)" stroke="#c084fc" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#c084fc" font-size="11">p/q + (-p/q) = 0  for every rational number</text></g><g id="r14eg1" opacity="0"><text x="40" y="80" fill="#fff" font-size="13">3/7 + (-3/7) = 0</text></g><g id="r14eg2" opacity="0"><text x="40" y="106" fill="#fff" font-size="13">-5/9 + (5/9) = 0</text></g><g id="r14eg3" opacity="0"><text x="40" y="132" fill="#fff" font-size="13">p/q + (-p/q) = 0</text></g><g id="r14box" opacity="0"><rect x="35" y="148" width="240" height="22" rx="6" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="155" y="163" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">Sum is ALWAYS zero</text></g></svg>',

'rn15':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="18" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">Standard Form of a Rational Number</text><g id="r15rule" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(192,132,252,0.1)" stroke="#c084fc" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#c084fc" font-size="11">Standard form: denominator positive, HCF of |p| and q = 1</text></g><g id="r15expr" opacity="0"><text x="40" y="82" fill="#fff" font-size="17" font-weight="bold">-8/12</text></g><g id="r15step" opacity="0"><text x="40" y="110" fill="#ffd700" font-size="13">HCF(8, 12) = 4</text><text x="40" y="132" fill="#fff" font-size="14">-8 / 4 = -2,   12 / 4 = 3</text></g><g id="r15ans" opacity="0"><rect x="35" y="148" width="160" height="24" rx="6" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1.5"/><text x="115" y="164" text-anchor="middle" fill="#2ecc71" font-size="15" font-weight="bold">Standard form = -2/3</text></g></svg>'
};
return s[type]||'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="178" fill="#1a0533"/><text x="210" y="89" text-anchor="middle" fill="#555" font-size="14">Loading...</text></svg>';
}

var s={

'rn7':function(){fade('r7expr','1');at(700,function(){fade('r7step','1');});at(2400,function(){fade('r7ans','1');});},
'rn8':function(){fade('r8rule','1');at(700,function(){fade('r8ops','1');});at(2400,function(){fade('r8exc','1');});},
'rn9':function(){fade('r9expr','1');at(700,function(){fade('r9step','1');});at(2000,function(){fade('r9cancel','1');});at(3000,function(){fade('r9ans','1');});},
'rn10':function(){fade('r10line','1');at(900,function(){fade('r10pt','1');});at(2200,function(){fade('r10check','1');});},
'rn11':function(){fade('r11expr','1');at(800,function(){fade('r11calc','1');});at(2200,function(){fade('r11ans','1');});},
'rn12':function(){fade('r12line','1');at(900,function(){fade('r12pt','1');});at(2200,function(){fade('r12check','1');});},
'rn13':function(){fade('r13expr','1');at(700,function(){fade('r13step','1');});at(2000,function(){fade('r13calc','1');});at(3000,function(){fade('r13ans','1');});},
'rn14':function(){fade('r14rule','1');at(700,function(){fade('r14eg1','1');});at(1600,function(){fade('r14eg2','1');});at(2400,function(){fade('r14eg3','1');});at(3200,function(){fade('r14box','1');});},
'rn15':function(){fade('r15rule','1');at(700,function(){fade('r15expr','1');});at(1600,function(){fade('r15step','1');});at(2800,function(){fade('r15ans','1');});}

if(s[type])s[type]();
}

var cur=0,score=0,answered=false;
function loadQ(i){
  answered=false;
  var q=questions[i];
  G('qNumber').textContent='Question '+(i+1)+' of 15';
  G('qText').textContent=q.q;
  G('feedback').textContent='';G('feedback').className='feedback';
  G('nextBtn').style.display='none';
  G('progressBar').style.width=(i/15*100)+'%';
  G('scorePill').textContent='Score: '+score+' / 15';
  var og=G('optionsGrid');og.innerHTML='';
  q.opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){checkAns(idx);};og.appendChild(b);
  });
  clearAt();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(400,function(){runAnim(q.anim);});
  G('bubble').textContent=q.narr.substring(0,78)+'...';
  at(300,function(){say(q.narr);});
}
function checkAns(idx){
  if(answered)return;answered=true;
  var q=questions[cur];
  var opts=G('optionsGrid').querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true;});
  if(idx===q.ans){
    opts[idx].classList.add('correct');score++;
    G('feedback').textContent='Correct! Well done!';G('feedback').className='feedback correct';
    G('scorePill').textContent='Score: '+score+' / 15';
    say('Excellent! That is correct!');
  }else{
    opts[idx].classList.add('wrong');opts[q.ans].classList.add('correct');
    G('feedback').textContent='Incorrect. Right answer: '+q.opts[q.ans];G('feedback').className='feedback wrong';
    say('Not quite. The correct answer is '+q.opts[q.ans]);
  }
  G('nextBtn').style.display='block';
}
function nextQ(){cur++;if(cur>=questions.length){showDone();return;}loadQ(cur);}
function replayAnim(){
  var q=questions[cur];clearAt();speechSynthesis.cancel();rStopTalk();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(200,function(){runAnim(q.anim);});at(400,function(){say(q.narr);});
}
function showDone(){
  rishiMarkExplainDone(1); /* Chapter 1 — Rational Numbers */
  G('mainArea').style.display='none';G('doneScreen').style.display='flex';
  G('progressBar').style.width='100%';
  G('doneScore').textContent='You scored '+score+' out of 15!';
  localStorage.setItem('explain_rational_done','1');
  say('Congratulations! You have completed Rational Numbers! You scored '+score+' out of 15!');
}
window.onload=function init(){rishiCheckPlan(1); /* Chapter 1 — Rational Numbers */initVoices(function(){startBlink();loadQ(0);});};
window.addEventListener('beforeunload',function(){speechSynthesis.cancel();});
window.addEventListener('pagehide',function(){speechSynthesis.cancel();});
</script>

<script>
function mathNormalise(raw){
  var s=raw,fixes=[];
  if(/sq[\.\s_-]*r[\.\s_-]*t|square[\s_-]*root|squrt|squroot|sqroot/i.test(s)){
    s=s.replace(/square[\s_-]*root[\s_-]*(of[\s_-]*)?/gi,"sqrt ");
    s=s.replace(/sq[\.\s_-]*r[\.\s_-]*t[\.\s_-]*/gi,"sqrt ");
    s=s.replace(/\b(squrt|squroot|sqroot)\b/gi,"sqrt ");
    fixes.push({label:"Did you mean: sqrt?",type:"fuzzy"});
  }
  if(/cube[\s_-]*root|cubert|cbroot/i.test(s)){
    s=s.replace(/cube[\s_-]*root[\s_-]*(of[\s_-]*)?/gi,"cbrt ");
    s=s.replace(/\b(cubert|cbroot)\b/gi,"cbrt ");
    fixes.push({label:"Did you mean: cbrt?",type:"fuzzy"});
  }
  s=s.replace(/([a-zA-Z])(\d+)/g,function(m,l,d){return l+"^"+d;});
  return {normalised:s.trim(),fixes:fixes};
}
function mathToLatex(s){
  s=s.replace(/sqrt\s*\(([^)]*)\)/g,"\\sqrt{$1}");
  s=s.replace(/sqrt\s+([^\s+\-*\/\^]+)/g,"\\sqrt{$1}");
  s=s.replace(/cbrt\s*\(([^)]*)\)/g,"\\sqrt[3]{$1}");
  s=s.replace(/cbrt\s+([^\s+\-*\/\^]+)/g,"\\sqrt[3]{$1}");
  s=s.replace(/\(([^)]+)\)\/\(([^)]+)\)/g,"\\frac{$1}{$2}");
  s=s.replace(/([A-Za-z0-9\^\{\}]+)\/([A-Za-z0-9\^\{\}]+)/g,"\\frac{$1}{$2}");
  s=s.replace(/\bpi\b/g,"\\pi");
  s=s.replace(/\*/g,"\\times");
  s=s.replace(/\+-/g,"\\pm");
  s=s.replace(/!=/g,"\\neq");
  s=s.replace(/>=/g,"\\geq");
  s=s.replace(/<=/g,"\\leq");
  return s;
}
function mathRender(latex){
  var el=G("mathPreview");if(!el)return;
  if(!latex.trim()){el.innerHTML='<span class="mph">your answer will render here...</span>';return;}
  try{katex.render(latex,el,{throwOnError:false,displayMode:true});}
  catch(e){el.textContent=latex;}
}
function mathGetSuggs(raw,norm){
  if(/[a-zA-Z]\^2/.test(norm)&&!/[a-zA-Z]\^3/.test(norm)){
    var b=(norm.match(/([a-zA-Z])\^2/)||["","x"])[1];
    return {chips:[
      {label:b+"^2 confirmed",ins:b+"^2",type:"confirm"},
      {label:b+"^2-b^2=("+b+"+b)("+b+"-b)",ins:b+"^2-b^2=("+b+"+b)("+b+"-b)",type:"identity"},
      {label:b+"^2+2"+b+"b+b^2=("+b+"+b)^2",ins:b+"^2+2"+b+"b+b^2=("+b+"+b)^2",type:"identity"},
      {label:"("+b+"+a)("+b+"+b)",ins:"("+b+"+a)("+b+"+b)",type:"shortcut"},
    ]};}
  if(/[a-zA-Z]\^3/.test(norm)){return {chips:[
    {label:"a^3+b^3=(a+b)(a^2-ab+b^2)",ins:"a^3+b^3=(a+b)(a^2-ab+b^2)",type:"identity"},
    {label:"a^3-b^3=(a-b)(a^2+ab+b^2)",ins:"a^3-b^3=(a-b)(a^2+ab+b^2)",type:"identity"},
  ]};}
  if(/\\sqrt/.test(mathToLatex(norm))){return {chips:[
    {label:"sqrt confirmed",ins:"sqrt()",type:"confirm"},
    {label:"sqrt(a^2)=a",ins:"sqrt(a^2)=a",type:"identity"},
  ]};}
  if(/\//.test(norm)){return {chips:[
    {label:"Factor numerator",ins:"",type:"hint",action:"num"},
    {label:"Factor denominator",ins:"",type:"hint",action:"den"},
    {label:"Cancel common factor",ins:"",type:"hint",action:"cancel"},
  ]};}
  if(/\(/.test(norm)){return {chips:[
    {label:"(x+a)(x+b)",ins:"(x+a)(x+b)",type:"shortcut"},
    {label:"(x+a)(x-a)",ins:"(x+a)(x-a)",type:"shortcut"},
  ]};}
  return null;
}
var MATH_HINTS={split:"Find two numbers: product=axc, sum=b.",num:"Factor numerator first.",den:"Factor denominator first.",cancel:"Cancel common factors.",hcf:"HCF: ab+ac=a(b+c)"};
var MATH_DEFAULTS=[
  {label:"x^2",ins:"x^2",type:"shortcut"},{label:"x^3",ins:"x^3",type:"shortcut"},
  {label:"(a+b)^2",ins:"(a+b)^2",type:"shortcut"},{label:"(a-b)^2",ins:"(a-b)^2",type:"shortcut"},
  {label:"a^2-b^2",ins:"a^2-b^2",type:"shortcut"},{label:"(x+a)(x+b)",ins:"(x+a)(x+b)",type:"shortcut"},
  {label:"sqrt()",ins:"sqrt()",type:"shortcut"},{label:"cbrt()",ins:"cbrt()",type:"shortcut"},
  {label:"Take HCF out",ins:"",type:"hint",action:"hcf"},
];
function buildSuggChips(list){
  var el=G("suggChips");if(!el)return;
  var ra=G("rawAnswer");
  el.innerHTML="";
  list.forEach(function(c){
    var btn=document.createElement("button");
    btn.className="schip "+(c.type||"shortcut");
    btn.textContent=c.label;btn.type="button";
    btn.addEventListener("click",function(){
      if(c.action&&MATH_HINTS[c.action]){showMathHint(MATH_HINTS[c.action]);return;}
      if(c.ins&&ra){var s=ra.selectionStart,e=ra.selectionEnd;ra.value=ra.value.slice(0,s)+c.ins+ra.value.slice(e);ra.selectionStart=ra.selectionEnd=s+c.ins.length;ra.focus();mathUpdate();}
    });
    el.appendChild(btn);
  });
}
function showMathHint(msg){
  var old=G("mathHintToast");if(old)old.remove();
  var t=document.createElement("div");t.id="mathHintToast";t.className="math-hint-toast";t.textContent=msg;
  var sc=G("suggChips");if(sc)sc.parentNode.insertBefore(t,sc.nextSibling);
  setTimeout(function(){t.remove();},4000);
}
function mathUpdate(){
  var ra=G("rawAnswer");if(!ra)return;
  var raw=ra.value;
  var res=mathNormalise(raw);
  var latex=mathToLatex(res.normalised);
  mathRender(latex);
  var result=raw.trim()?mathGetSuggs(raw,res.normalised):null;
  var chips=[];
  res.fixes.forEach(function(f){chips.push(f);});
  if(result)result.chips.forEach(function(c){chips.push(c);});
  else MATH_DEFAULTS.forEach(function(c){chips.push(c);});
  buildSuggChips(chips);
}

</script>
