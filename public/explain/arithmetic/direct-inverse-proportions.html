<script>
function G(id){return document.getElementById(id);}
var atTimers=[];
function clearAt(){atTimers.forEach(clearTimeout);atTimers=[];}
function at(ms,fn){atTimers.push(setTimeout(fn,ms));}
var chosenVoice=null,mouthTimer=null;
function initVoices(cb){
  var v=speechSynthesis.getVoices();
  if(v.length){pickVoice(v);cb();return;}
  speechSynthesis.onvoiceschanged=function(){pickVoice(speechSynthesis.getVoices());cb();};
}
function pickVoice(voices){
  var pri=['heera','veena','priya','raveena','female','woman','zira','samantha','victoria','karen','moira','tessa','fiona'];
  var enIN=voices.filter(function(v){return v.lang==='en-IN';});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enIN.length;i++){if(enIN[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enIN[i];return;}}}
  var enA=voices.filter(function(v){return v.lang.startsWith('en');});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enA.length;i++){if(enA[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enA[i];return;}}}
  if(enIN.length){chosenVoice=enIN[0];return;}
  if(enA.length){chosenVoice=enA[0];}
}
function stopAllAudio(){
  if(elAudio){try{elAudio.pause();elAudio.src="";}catch(x){} elAudio=null;}
  if(window.speechSynthesis)window.speechSynthesis.cancel();
}
function sayBrowser(text,onEnd){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  rStartTalk(text.length);
  var u=new SpeechSynthesisUtterance(text);
  u.lang="en-IN";u.rate=0.88;u.pitch=1.15;
  var v=(typeof selectedVoice!=="undefined"&&selectedVoice)?selectedVoice:
         (typeof chosenVoice!=="undefined"&&chosenVoice)?chosenVoice:null;
  if(v)u.voice=v;
  u.onend=function(){rStopTalk();if(onEnd)onEnd();};
  u.onerror=function(){rStopTalk();if(onEnd)onEnd();};
  window.speechSynthesis.speak(u);
}
function say(text,onEnd){
  stopAllAudio();
  rStartTalk(text.length);
  fetch("/tts",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:text})})
  .then(function(res){if(!res.ok)throw new Error("TTS "+res.status);return res.blob();})
  .then(function(blob){
    var url=URL.createObjectURL(blob);
    elAudio=new Audio(url);
    elAudio.onended=function(){URL.revokeObjectURL(url);elAudio=null;rStopTalk();if(onEnd)onEnd();};
    elAudio.onerror=function(){URL.revokeObjectURL(url);elAudio=null;rStopTalk();if(onEnd)onEnd();};
    var p=elAudio.play();
    if(p&&p.catch){p.catch(function(){URL.revokeObjectURL(url);elAudio=null;sayBrowser(text,onEnd);});}
  })
  .catch(function(err){sayBrowser(text,onEnd);});
}
function rStartTalk(){
  G('blushL').style.opacity='0.7';G('blushR').style.opacity='0.7';
  if(mouthTimer)clearInterval(mouthTimer);
  var open=false;
  mouthTimer=setInterval(function(){
    open=!open;
    G('mouth').setAttribute('d',open?'M53 87 Q60 96 67 87':'M53 89 Q60 93 67 89');
  },160);
}
function rStopTalk(){
  if(mouthTimer){clearInterval(mouthTimer);mouthTimer=null;}
  G('mouth').setAttribute('d','M53 89 Q60 93 67 89');
  G('blushL').style.opacity='0';G('blushR').style.opacity='0';
}
function startBlink(){
  function doBlink(){
    G('lidL').setAttribute('opacity','0.95');G('lidR').setAttribute('opacity','0.95');
    setTimeout(function(){G('lidL').setAttribute('opacity','0');G('lidR').setAttribute('opacity','0');setTimeout(doBlink,2200+Math.random()*3000);},120);
  }
  setTimeout(doBlink,2200+Math.random()*3000);
}
function fade(id,v){var e=G(id);if(!e)return;e.style.transition='opacity .5s';e.style.opacity=v;}

'dp3':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Direct Proportion Formula</text><g id="d3formula" opacity="0"><rect x="80" y="30" width="260" height="42" rx="10" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="2"/><text x="210" y="56" text-anchor="middle" fill="#fb923c" font-size="22" font-weight="bold">x / y = k</text></g><g id="d3meaning" opacity="0"><text x="55" y="100" fill="#aaa" font-size="12">k is the constant of proportionality</text><text x="55" y="120" fill="#fff" font-size="13">Also written as: x = ky</text></g><g id="d3eg" opacity="0"><text x="55" y="148" fill="#ffd700" font-size="12">Example: 5 pens / Rs 30 = 1/6 = k</text><text x="55" y="168" fill="#aaa" font-size="12">8 pens / ? = 1/6  so  ? = 48</text></g></svg>',

'dp4':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Direct Proportion — Distance and Time</text><g id="d4given" opacity="0"><text x="30" y="56" fill="#fff" font-size="13">Given: 150 km in 3 hours</text><text x="30" y="76" fill="#ffd700" font-size="13">Find: distance in 5 hours</text></g><g id="d4bar1" opacity="0"><rect x="30" y="92" width="0" height="18" fill="rgba(251,146,60,0.4)" stroke="#fb923c" stroke-width="1" id="dbar1"/><text x="25" y="106" text-anchor="end" fill="#aaa" font-size="10">3h</text></g><g id="d4bar2" opacity="0"><rect x="30" y="116" width="0" height="18" fill="rgba(46,204,113,0.4)" stroke="#2ecc71" stroke-width="1" id="dbar2"/><text x="25" y="130" text-anchor="end" fill="#aaa" font-size="10">5h</text></g><g id="d4calc" opacity="0"><text x="30" y="156" fill="#fff" font-size="13">Speed = 150/3 = 50 km/h</text><text x="30" y="172" fill="#2ecc71" font-size="13" font-weight="bold">Distance = 50 x 5 = 250 km</text></g></svg>',

'ip1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Inverse Proportion — Workers and Days</text><g id="i1rule" opacity="0"><rect x="18" y="26" width="384" height="22" rx="6" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="1"/><text x="210" y="41" text-anchor="middle" fill="#fb923c" font-size="11">Inverse Proportion: x x y = k (constant product)</text></g><g id="i1table" opacity="0"><text x="50" y="72" fill="#aaa" font-size="11">Workers</text><text x="170" y="72" fill="#aaa" font-size="11">Days</text><text x="50" y="92" fill="#fff" font-size="13">12</text><text x="170" y="92" fill="#fff" font-size="13">6</text><text x="50" y="112" fill="#ffd700" font-size="13">4</text><text x="170" y="112" fill="#ffd700" font-size="13">?</text><line x1="40" y1="78" x2="240" y2="78" stroke="#555" stroke-width="1"/><line x1="150" y1="66" x2="150" y2="122" stroke="#555" stroke-width="1"/></g><g id="i1calc" opacity="0"><text x="260" y="80" fill="#ffd700" font-size="12">k = 12 x 6 = 72</text><text x="260" y="100" fill="#fff" font-size="12">4 x ? = 72</text><text x="260" y="120" fill="#2ecc71" font-size="13" font-weight="bold">? = 18 days</text></g></svg>',

'ip2':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Inverse Proportion — Opposite Directions</text><g id="i2arrows" opacity="0"><text x="40" y="62" fill="#aaa" font-size="12">x triples</text><text x="40" y="82" fill="#fff" font-size="18">x: 2 to 6</text><text x="220" y="62" fill="#aaa" font-size="12">y becomes 1/3</text><text x="220" y="82" fill="#fff" font-size="18">y: 9 to 3</text></g><g id="i2product" opacity="0"><text x="40" y="118" fill="#ffd700" font-size="12">Product stays constant:</text><text x="40" y="138" fill="#fff" font-size="13">2 x 9 = 18   and   6 x 3 = 18</text></g><g id="i2rule" opacity="0"><rect x="35" y="152" width="300" height="20" rx="5" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1"/><text x="185" y="166" text-anchor="middle" fill="#fb923c" font-size="12">x increases = y decreases</text></g></svg>',

'ip3':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Inverse Proportion Formula</text><g id="i3formula" opacity="0"><rect x="80" y="30" width="260" height="42" rx="10" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="2"/><text x="210" y="56" text-anchor="middle" fill="#fb923c" font-size="22" font-weight="bold">x x y = k</text></g><g id="i3compare" opacity="0"><text x="40" y="100" fill="#ffd700" font-size="11">Direct: x/y = k (ratio constant)</text><text x="40" y="118" fill="#fb923c" font-size="11">Inverse: xy = k (product constant)</text></g><g id="i3eg" opacity="0"><text x="40" y="146" fill="#aaa" font-size="12">Example: 8 taps x 9 hrs = 72 = k</text><text x="40" y="166" fill="#2ecc71" font-size="12">6 taps x ? = 72  so  ? = 12 hours</text></g></svg>',

'ip4':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Inverse Proportion — Taps and Time</text><g id="i4given" opacity="0"><text x="30" y="56" fill="#fff" font-size="13">8 taps fill in 9 hours</text><text x="30" y="76" fill="#ffd700" font-size="13">Find time for 6 taps</text></g><g id="i4table" opacity="0"><text x="50" y="106" fill="#aaa" font-size="11">Taps</text><text x="150" y="106" fill="#aaa" font-size="11">Hours</text><text x="50" y="124" fill="#fff" font-size="12">8</text><text x="150" y="124" fill="#fff" font-size="12">9</text><text x="50" y="142" fill="#ffd700" font-size="12">6</text><text x="150" y="142" fill="#ffd700" font-size="12">?</text><line x1="40" y1="112" x2="230" y2="112" stroke="#555" stroke-width="1"/></g><g id="i4calc" opacity="0"><text x="260" y="120" fill="#ffd700" font-size="12">k = 8 x 9 = 72</text><text x="260" y="140" fill="#fff" font-size="12">6 x ? = 72</text><rect x="255" y="152" width="120" height="20" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="315" y="166" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">? = 12 hours</text></g></svg>',

'ip5':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Inverse Proportion — Speed and Time</text><g id="i5given" opacity="0"><text x="30" y="54" fill="#fff" font-size="12">Fixed distance: 60 km/h for 4 hours</text><text x="30" y="72" fill="#ffd700" font-size="12">Find time at 80 km/h</text></g><g id="i5dist" opacity="0"><text x="30" y="100" fill="#ffd700" font-size="13">Distance = 60 x 4 = 240 km</text></g><g id="i5calc" opacity="0"><text x="30" y="126" fill="#fff" font-size="13">Speed x Time = 240</text><text x="30" y="148" fill="#fff" font-size="13">80 x ? = 240</text></g><g id="i5ans" opacity="0"><rect x="25" y="158" width="180" height="16" rx="4" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="115" y="170" text-anchor="middle" fill="#2ecc71" font-size="12" font-weight="bold">Time = 3 hours</text></g></svg>',

'ip6':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Inverse Proportion — Men and Days</text><g id="i6given" opacity="0"><text x="30" y="56" fill="#fff" font-size="13">18 men dig in 6 days</text><text x="30" y="76" fill="#ffd700" font-size="13">Find men needed in 3 days</text></g><g id="i6calc" opacity="0"><text x="30" y="106" fill="#ffd700" font-size="13">k = 18 x 6 = 108</text><text x="30" y="128" fill="#fff" font-size="13">? x 3 = 108</text></g><g id="i6ans" opacity="0"><rect x="25" y="144" width="160" height="26" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="105" y="162" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">? = 36 men</text></g></svg>',

'dp5':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Direct Proportion — Cloth and Cost</text><g id="d5given" opacity="0"><text x="30" y="56" fill="#fff" font-size="13">15 m of cloth costs Rs 225</text><text x="30" y="76" fill="#ffd700" font-size="13">Find cost of 4 metres</text></g><g id="d5calc" opacity="0"><text x="30" y="106" fill="#ffd700" font-size="13">Rate = 225 / 15 = Rs 15 per metre</text><text x="30" y="128" fill="#fff" font-size="13">Cost of 4 m = 4 x 15</text></g><g id="d5ans" opacity="0"><rect x="25" y="144" width="160" height="26" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="105" y="162" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">= Rs 60</text></g></svg>',

'dp6':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Direct Proportion — Photo Enlargement</text><g id="d6given" opacity="0"><text x="30" y="56" fill="#fff" font-size="13">Original: width 4 cm, height 6 cm</text><text x="30" y="76" fill="#ffd700" font-size="13">Enlarged: width 8 cm, find height</text></g><g id="d6calc" opacity="0"><text x="30" y="106" fill="#ffd700" font-size="13">Scale factor = 8 / 4 = 2</text><text x="30" y="128" fill="#fff" font-size="13">New height = 6 x 2 = 12 cm</text></g><g id="d6ans" opacity="0"><rect x="25" y="144" width="180" height="26" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="115" y="162" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">New height = 12 cm</text></g></svg>',

'dp7':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Direct Proportion — Rice Purchase</text><g id="d7given" opacity="0"><text x="30" y="54" fill="#fff" font-size="12">50 kg rice costs Rs 1750</text><text x="30" y="72" fill="#ffd700" font-size="12">Asha has Rs 1050, find kg she can buy</text></g><g id="d7calc" opacity="0"><text x="30" y="100" fill="#ffd700" font-size="13">Price/kg = 1750 / 50 = Rs 35</text><text x="30" y="122" fill="#fff" font-size="13">Kg = 1050 / 35</text></g><g id="d7ans" opacity="0"><rect x="25" y="138" width="160" height="26" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="105" y="156" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">= 30 kg</text></g></svg>',

'ip7':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Inverse Proportion — Pumps</text><g id="i7given" opacity="0"><text x="30" y="56" fill="#fff" font-size="13">6 pumps drain in 10 hours</text><text x="30" y="76" fill="#ffd700" font-size="13">Find pumps needed in 4 hours</text></g><g id="i7calc" opacity="0"><text x="30" y="106" fill="#ffd700" font-size="13">k = 6 x 10 = 60</text><text x="30" y="128" fill="#fff" font-size="13">? x 4 = 60</text></g><g id="i7ans" opacity="0"><rect x="25" y="144" width="160" height="26" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="105" y="162" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">? = 15 pumps</text></g></svg>',

'ip8':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="18" text-anchor="middle" fill="#fb923c" font-size="13" font-weight="bold">Inverse Proportion — Find the Unknown</text><g id="i8given" opacity="0"><text x="30" y="54" fill="#fff" font-size="13">x = 4 when y = 9</text><text x="30" y="74" fill="#ffd700" font-size="13">Find y when x = 12</text></g><g id="i8calc" opacity="0"><text x="30" y="102" fill="#ffd700" font-size="13">k = x x y = 4 x 9 = 36</text><text x="30" y="124" fill="#fff" font-size="13">12 x y = 36</text></g><g id="i8ans" opacity="0"><rect x="25" y="140" width="140" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="95" y="159" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">y = 3</text></g><g id="i8check" opacity="0"><text x="200" y="156" fill="#aaa" font-size="11">x tripled 4 to 12</text><text x="200" y="172" fill="#aaa" font-size="11">y became 1/3 of 9</text></g></svg>'
};
return s[type]||'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="178" fill="#1a0a00"/><text x="210" y="89" text-anchor="middle" fill="#555" font-size="14">Loading...</text></svg>';

var cur=0,score=0,answered=false;
function loadQ(i){
  answered=false;
  var q=questions[i];
  G('qNumber').textContent='Question '+(i+1)+' of 15';
  G('qText').textContent=q.q;
  G('feedback').textContent='';G('feedback').className='feedback';
  G('nextBtn').style.display='none';
  G('progressBar').style.width=(i/15*100)+'%';
  G('scorePill').textContent='Score: '+score+' / 15';
  var og=G('optionsGrid');og.innerHTML='';
  q.opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){checkAns(idx);};og.appendChild(b);
  });
  clearAt();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(400,function(){runAnim(q.anim);});
  G('bubble').textContent=q.narr.substring(0,78)+'...';
  at(300,function(){say(q.narr);});
}
function checkAns(idx){
  if(answered)return;answered=true;
  var q=questions[cur];
  var opts=G('optionsGrid').querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true;});
  if(idx===q.ans){
    opts[idx].classList.add('correct');score++;
    G('feedback').textContent='Correct! Well done!';G('feedback').className='feedback correct';
    G('scorePill').textContent='Score: '+score+' / 15';
    say('Excellent! That is correct!');
  }else{
    opts[idx].classList.add('wrong');opts[q.ans].classList.add('correct');
    G('feedback').textContent='Incorrect. Right answer: '+q.opts[q.ans];G('feedback').className='feedback wrong';
    say('Not quite. The correct answer is '+q.opts[q.ans]);
  }
  G('nextBtn').style.display='block';
}
function nextQ(){cur++;if(cur>=questions.length){showDone();return;}loadQ(cur);}
function replayAnim(){
  var q=questions[cur];clearAt();speechSynthesis.cancel();rStopTalk();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(200,function(){runAnim(q.anim);});at(400,function(){say(q.narr);});
}
function showDone(){
  rishiMarkExplainDone(13); /* Chapter 13 — Direct & Inverse Proportions */
  G('mainArea').style.display='none';G('doneScreen').style.display='flex';

<script>
function mathNormalise(raw){
  var s=raw,fixes=[];
  if(/sq[\.\s_-]*r[\.\s_-]*t|square[\s_-]*root|squrt|squroot|sqroot/i.test(s)){
    s=s.replace(/square[\s_-]*root[\s_-]*(of[\s_-]*)?/gi,"sqrt ");
    s=s.replace(/sq[\.\s_-]*r[\.\s_-]*t[\.\s_-]*/gi,"sqrt ");
    s=s.replace(/\b(squrt|squroot|sqroot)\b/gi,"sqrt ");
    fixes.push({label:"Did you mean: sqrt?",type:"fuzzy"});
  }
  if(/cube[\s_-]*root|cubert|cbroot/i.test(s)){
    s=s.replace(/cube[\s_-]*root[\s_-]*(of[\s_-]*)?/gi,"cbrt ");
    s=s.replace(/\b(cubert|cbroot)\b/gi,"cbrt ");
    fixes.push({label:"Did you mean: cbrt?",type:"fuzzy"});
  }
  s=s.replace(/([a-zA-Z])(\d+)/g,function(m,l,d){return l+"^"+d;});
  return {normalised:s.trim(),fixes:fixes};
}
function mathToLatex(s){
  s=s.replace(/sqrt\s*\(([^)]*)\)/g,"\\sqrt{$1}");
  s=s.replace(/sqrt\s+([^\s+\-*\/\^]+)/g,"\\sqrt{$1}");
  s=s.replace(/cbrt\s*\(([^)]*)\)/g,"\\sqrt[3]{$1}");
  s=s.replace(/cbrt\s+([^\s+\-*\/\^]+)/g,"\\sqrt[3]{$1}");
  s=s.replace(/\(([^)]+)\)\/\(([^)]+)\)/g,"\\frac{$1}{$2}");
  s=s.replace(/([A-Za-z0-9\^\{\}]+)\/([A-Za-z0-9\^\{\}]+)/g,"\\frac{$1}{$2}");
  s=s.replace(/\bpi\b/g,"\\pi");
  s=s.replace(/\*/g,"\\times");
  s=s.replace(/\+-/g,"\\pm");
  s=s.replace(/!=/g,"\\neq");
  s=s.replace(/>=/g,"\\geq");
  s=s.replace(/<=/g,"\\leq");
  return s;
}
function mathRender(latex){
  var el=G("mathPreview");if(!el)return;
  if(!latex.trim()){el.innerHTML='<span class="mph">your answer will render here...</span>';return;}
  try{katex.render(latex,el,{throwOnError:false,displayMode:true});}
  catch(e){el.textContent=latex;}
}
function mathGetSuggs(raw,norm){
  if(/[a-zA-Z]\^2/.test(norm)&&!/[a-zA-Z]\^3/.test(norm)){
    var b=(norm.match(/([a-zA-Z])\^2/)||["","x"])[1];
    return {chips:[
      {label:b+"^2 confirmed",ins:b+"^2",type:"confirm"},
      {label:b+"^2-b^2=("+b+"+b)("+b+"-b)",ins:b+"^2-b^2=("+b+"+b)("+b+"-b)",type:"identity"},
      {label:b+"^2+2"+b+"b+b^2=("+b+"+b)^2",ins:b+"^2+2"+b+"b+b^2=("+b+"+b)^2",type:"identity"},
      {label:"("+b+"+a)("+b+"+b)",ins:"("+b+"+a)("+b+"+b)",type:"shortcut"},
    ]};}
  if(/[a-zA-Z]\^3/.test(norm)){return {chips:[
    {label:"a^3+b^3=(a+b)(a^2-ab+b^2)",ins:"a^3+b^3=(a+b)(a^2-ab+b^2)",type:"identity"},
    {label:"a^3-b^3=(a-b)(a^2+ab+b^2)",ins:"a^3-b^3=(a-b)(a^2+ab+b^2)",type:"identity"},
  ]};}
  if(/\\sqrt/.test(mathToLatex(norm))){return {chips:[
    {label:"sqrt confirmed",ins:"sqrt()",type:"confirm"},
    {label:"sqrt(a^2)=a",ins:"sqrt(a^2)=a",type:"identity"},
  ]};}
  if(/\//.test(norm)){return {chips:[
    {label:"Factor numerator",ins:"",type:"hint",action:"num"},
    {label:"Factor denominator",ins:"",type:"hint",action:"den"},
    {label:"Cancel common factor",ins:"",type:"hint",action:"cancel"},
  ]};}
  if(/\(/.test(norm)){return {chips:[
    {label:"(x+a)(x+b)",ins:"(x+a)(x+b)",type:"shortcut"},
    {label:"(x+a)(x-a)",ins:"(x+a)(x-a)",type:"shortcut"},
  ]};}
  return null;
}
var MATH_HINTS={split:"Find two numbers: product=axc, sum=b.",num:"Factor numerator first.",den:"Factor denominator first.",cancel:"Cancel common factors.",hcf:"HCF: ab+ac=a(b+c)"};
var MATH_DEFAULTS=[
  {label:"x^2",ins:"x^2",type:"shortcut"},{label:"x^3",ins:"x^3",type:"shortcut"},
  {label:"(a+b)^2",ins:"(a+b)^2",type:"shortcut"},{label:"(a-b)^2",ins:"(a-b)^2",type:"shortcut"},
  {label:"a^2-b^2",ins:"a^2-b^2",type:"shortcut"},{label:"(x+a)(x+b)",ins:"(x+a)(x+b)",type:"shortcut"},
  {label:"sqrt()",ins:"sqrt()",type:"shortcut"},{label:"cbrt()",ins:"cbrt()",type:"shortcut"},
  {label:"Take HCF out",ins:"",type:"hint",action:"hcf"},
];
function buildSuggChips(list){
  var el=G("suggChips");if(!el)return;
  var ra=G("rawAnswer");
  el.innerHTML="";
  list.forEach(function(c){
    var btn=document.createElement("button");
    btn.className="schip "+(c.type||"shortcut");
    btn.textContent=c.label;btn.type="button";
    btn.addEventListener("click",function(){
      if(c.action&&MATH_HINTS[c.action]){showMathHint(MATH_HINTS[c.action]);return;}
      if(c.ins&&ra){var s=ra.selectionStart,e=ra.selectionEnd;ra.value=ra.value.slice(0,s)+c.ins+ra.value.slice(e);ra.selectionStart=ra.selectionEnd=s+c.ins.length;ra.focus();mathUpdate();}
    });
    el.appendChild(btn);
  });
}
function showMathHint(msg){
  var old=G("mathHintToast");if(old)old.remove();
  var t=document.createElement("div");t.id="mathHintToast";t.className="math-hint-toast";t.textContent=msg;
  var sc=G("suggChips");if(sc)sc.parentNode.insertBefore(t,sc.nextSibling);
  setTimeout(function(){t.remove();},4000);
}
function mathUpdate(){
  var ra=G("rawAnswer");if(!ra)return;
  var raw=ra.value;
  var res=mathNormalise(raw);
  var latex=mathToLatex(res.normalised);
  mathRender(latex);
  var result=raw.trim()?mathGetSuggs(raw,res.normalised):null;
  var chips=[];
  res.fixes.forEach(function(f){chips.push(f);});
  if(result)result.chips.forEach(function(c){chips.push(c);});
  else MATH_DEFAULTS.forEach(function(c){chips.push(c);});
  buildSuggChips(chips);
}
