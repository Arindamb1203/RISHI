<script>
function G(id){return document.getElementById(id);}
var atTimers=[];
function clearAt(){atTimers.forEach(clearTimeout);atTimers=[];}
function at(ms,fn){atTimers.push(setTimeout(fn,ms));}
var chosenVoice=null,mouthTimer=null;
function initVoices(cb){
  var v=speechSynthesis.getVoices();
  if(v.length){pickVoice(v);cb();return;}
  speechSynthesis.onvoiceschanged=function(){pickVoice(speechSynthesis.getVoices());cb();};
}
function pickVoice(voices){
  var pri=['heera','veena','priya','raveena','female','woman','zira','samantha','victoria','karen','moira','tessa','fiona'];
  var enIN=voices.filter(function(v){return v.lang==='en-IN';});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enIN.length;i++){if(enIN[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enIN[i];return;}}}
  var enA=voices.filter(function(v){return v.lang.startsWith('en');});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enA.length;i++){if(enA[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enA[i];return;}}}
  if(enIN.length){chosenVoice=enIN[0];return;}
  if(enA.length){chosenVoice=enA[0];}
}
function say(text){
  speechSynthesis.cancel();rStopTalk();
  var u=new SpeechSynthesisUtterance(text);
  if(chosenVoice)u.voice=chosenVoice;
  u.lang='en-IN';u.rate=0.88;u.pitch=1.15;
  u.onstart=function(){rStartTalk();};
  u.onend=function(){rStopTalk();};
  speechSynthesis.speak(u);
}
function rStartTalk(){
  G('blushL').style.opacity='0.7';G('blushR').style.opacity='0.7';
  if(mouthTimer)clearInterval(mouthTimer);
  var open=false;
  mouthTimer=setInterval(function(){
    open=!open;
    G('mouth').setAttribute('d',open?'M53 87 Q60 96 67 87':'M53 89 Q60 93 67 89');
  },160);
}
function rStopTalk(){
  if(mouthTimer){clearInterval(mouthTimer);mouthTimer=null;}
  G('mouth').setAttribute('d','M53 89 Q60 93 67 89');
  G('blushL').style.opacity='0';G('blushR').style.opacity='0';
}
function startBlink(){
  function doBlink(){
    G('lidL').setAttribute('opacity','0.95');G('lidR').setAttribute('opacity','0.95');
    setTimeout(function(){G('lidL').setAttribute('opacity','0');G('lidR').setAttribute('opacity','0');setTimeout(doBlink,2200+Math.random()*3000);},120);
  }
  setTimeout(doBlink,2200+Math.random()*3000);
}
function fade(id,v){var e=G(id);if(!e)return;e.style.transition='opacity .5s';e.style.opacity=v;}

var questions=[
{q:'What does "frequency" mean in statistics?',opts:['The highest value','Number of times a value occurs','The middle value','The total of all values'],ans:1,anim:'fd1',
narr:'Frequency means how many times a particular value or observation appears in a dataset. If the score 7 appears 4 times in a list of scores, then the frequency of 7 is 4.'},
{q:'In a grouped frequency table, the class 10–20 has frequency 8. This means:',opts:['8 values equal 10','8 values equal 20','8 values fall between 10 and 20','8 is the average of the class'],ans:2,anim:'fd2',
narr:'In a grouped frequency table, the class interval 10 to 20 with frequency 8 means that exactly 8 data values fall within the range 10 to 20. These are grouped together to make the data manageable.'},
{q:'What is the class width (class size) of the interval 20–30?',opts:['20','30','10','50'],ans:2,anim:'fd3',
narr:'Class width equals upper boundary minus lower boundary. For the class 20 to 30: class width equals 30 minus 20 equals 10. All classes in a frequency table usually have the same width.'},
{q:'The class mark (mid-point) of the interval 30–40 is:',opts:['30','35','40','70'],ans:1,anim:'fd4',
narr:'Class mark equals lower limit plus upper limit divided by 2. For 30 to 40: class mark equals 30 plus 40 divided by 2 equals 70 divided by 2 equals 35. The class mark represents the middle value of that class.'},
{q:'The sum of all frequencies in a frequency distribution equals:',opts:['The highest frequency','The number of classes','The total number of observations','The range of data'],ans:2,anim:'fd5',
narr:'The sum of all frequencies always equals the total number of observations, or n, in the dataset. This is a fundamental property. It is a good way to check if your frequency table is correct.'},
{q:'In a histogram, the horizontal axis shows:',opts:['Frequencies','Class intervals','Tally marks','Cumulative frequencies'],ans:1,anim:'fd6',
narr:'In a histogram, the horizontal axis, called the x-axis, shows the class intervals. The vertical axis shows the frequencies. Unlike a bar graph, the bars in a histogram touch each other because the data is continuous.'},
{q:'What does a cumulative frequency tell you?',opts:['The frequency of each class','The total frequency up to and including that class','The average frequency','The most common class'],ans:1,anim:'fd7',
narr:'Cumulative frequency is the running total of frequencies. It tells you the total number of observations up to and including that class. It is useful for finding medians and drawing ogives.'},
{q:'Scores of 10 students: 5,7,7,8,5,9,7,8,5,7. What is the frequency of score 7?',opts:['2','3','4','5'],ans:2,anim:'fd8',
narr:'Count how many times 7 appears in the list: 5, 7, 7, 8, 5, 9, 7, 8, 5, 7. The value 7 appears at positions 2, 3, 7 and 10. So the frequency of 7 is 4.'},
{q:'In the frequency table below, what is the missing frequency if total = 50? Classes: 0-10 (f=8), 10-20 (f=?), 20-30 (f=14), 30-40 (f=12)',opts:['14','16','18','20'],ans:1,anim:'fd9',
narr:'Total frequency equals sum of all frequencies equals 50. Known frequencies: 8 plus 14 plus 12 equals 34. Missing frequency equals 50 minus 34 equals 16.'},
{q:'A bar graph shows data about 4 subjects. The tallest bar represents:',opts:['The least popular subject','The most popular subject','The average subject','The hardest subject'],ans:1,anim:'fd10',
narr:'In a bar graph, the height of each bar represents the frequency or count for that category. The tallest bar represents the category with the highest frequency — in this case the most popular subject.'},
{q:'The range of data is defined as:',opts:['Highest value','Lowest value','Highest minus lowest value','Sum of all values'],ans:2,anim:'fd11',
narr:'Range equals the highest value minus the lowest value in a dataset. It measures the spread of the data. For example, if scores range from 45 to 95, the range is 95 minus 45 equals 50.'},
{q:'What is the mean of 4, 7, 13, 2, 4?',opts:['4','5','6','7'],ans:2,anim:'fd12',
narr:'Mean equals sum of all values divided by total count. Sum equals 4 plus 7 plus 13 plus 2 plus 4 equals 30. Count equals 5. Mean equals 30 divided by 5 equals 6.'},
{q:'What is the median of 3, 7, 2, 9, 5?',opts:['3','5','7','9'],ans:1,anim:'fd13',
narr:'To find the median, first arrange in ascending order: 2, 3, 5, 7, 9. There are 5 values, so the median is the middle value which is the 3rd value. That is 5.'},
{q:'The mode of 2, 3, 3, 4, 5, 3, 2, 3 is:',opts:['2','3','4','5'],ans:1,anim:'fd14',
narr:'The mode is the value that appears most often. Count: 2 appears twice, 3 appears four times, 4 appears once, 5 appears once. The value 3 appears most frequently, so the mode is 3.'},
{q:'Mean of a dataset is 25 and there are 8 observations. What is the sum of all observations?',opts:['25','33','200','8'],ans:2,anim:'fd15',
narr:'Mean equals sum divided by number of observations. So sum equals mean times number of observations. Sum equals 25 times 8 equals 200. This formula is very useful in data problems.'}
];

'fd4':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Class Mark (Mid-point)</text><g id="f4line" opacity="0"><line x1="60" y1="90" x2="360" y2="90" stroke="#888" stroke-width="2"/><line x1="110" y1="80" x2="110" y2="100" stroke="#60a5fa" stroke-width="2"/><line x1="310" y1="80" x2="310" y2="100" stroke="#60a5fa" stroke-width="2"/><text x="110" y="115" text-anchor="middle" fill="#fff" font-size="12">30</text><text x="310" y="115" text-anchor="middle" fill="#fff" font-size="12">40</text></g><g id="f4mid" opacity="0"><circle cx="210" cy="90" r="8" fill="#ffd700"/><text x="210" y="115" text-anchor="middle" fill="#ffd700" font-size="12">35</text><text x="210" y="75" text-anchor="middle" fill="#ffd700" font-size="11">Class Mark</text></g><g id="f4formula" opacity="0"><text x="80" y="150" fill="#ffd700" font-size="13">Class Mark = (30+40)/2 = 70/2 = 35</text></g></svg>',

'fd6':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Reading a Histogram</text><g id="f6axes" opacity="0"><line x1="50" y1="140" x2="360" y2="140" stroke="#888" stroke-width="2"/><line x1="50" y1="30" x2="50" y2="140" stroke="#888" stroke-width="2"/><text x="205" y="165" text-anchor="middle" fill="#aaa" font-size="11">Class Intervals (horizontal)</text><text x="20" y="85" fill="#aaa" font-size="11" transform="rotate(-90,20,85)">Freq</text></g><g id="f6bars" opacity="0"><rect x="50" y="100" width="60" height="40" fill="rgba(96,165,250,0.5)" stroke="#60a5fa" stroke-width="1"/><rect x="110" y="70" width="60" height="70" fill="rgba(96,165,250,0.5)" stroke="#60a5fa" stroke-width="1"/><rect x="170" y="50" width="60" height="90" fill="rgba(96,165,250,0.5)" stroke="#60a5fa" stroke-width="1"/><rect x="230" y="85" width="60" height="55" fill="rgba(96,165,250,0.5)" stroke="#60a5fa" stroke-width="1"/><rect x="290" y="110" width="60" height="30" fill="rgba(96,165,250,0.5)" stroke="#60a5fa" stroke-width="1"/></g><g id="f6note" opacity="0"><text x="80" y="18" fill="#ffd700" font-size="10">Bars touch each other (continuous data)</text></g></svg>',

'fd7':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Cumulative Frequency</text><g id="f7table" opacity="0"><text x="20" y="46" fill="#aaa" font-size="10">Class</text><text x="100" y="46" fill="#aaa" font-size="10">Freq</text><text x="190" y="46" fill="#60a5fa" font-size="10">Cumulative Freq</text><text x="20" y="64" fill="#fff" font-size="11">0-10</text><text x="100" y="64" fill="#fff" font-size="11">5</text><text x="190" y="64" fill="#60a5fa" font-size="11">5</text><text x="20" y="82" fill="#fff" font-size="11">10-20</text><text x="100" y="82" fill="#fff" font-size="11">8</text><text x="190" y="82" fill="#60a5fa" font-size="11">5+8 = 13</text><text x="20" y="100" fill="#fff" font-size="11">20-30</text><text x="100" y="100" fill="#fff" font-size="11">12</text><text x="190" y="100" fill="#60a5fa" font-size="11">13+12 = 25</text></g><g id="f7meaning" opacity="0"><text x="20" y="132" fill="#ffd700" font-size="11">CF of 25 means: 25 values are below 30</text></g></svg>',

'fd8':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Counting Frequency from Raw Data</text><g id="f8data" opacity="0"><text x="30" y="52" fill="#aaa" font-size="12">Scores: 5, 7, 7, 8, 5, 9, 7, 8, 5, 7</text></g><g id="f8highlight" opacity="0"><text x="30" y="82" fill="#ffd700" font-size="13">Highlight all 7s:</text><text x="30" y="104" fill="#fff" font-size="13">5, <tspan fill="#60a5fa" font-weight="bold">7</tspan>, <tspan fill="#60a5fa" font-weight="bold">7</tspan>, 8, 5, 9, <tspan fill="#60a5fa" font-weight="bold">7</tspan>, 8, 5, <tspan fill="#60a5fa" font-weight="bold">7</tspan></text></g><g id="f8ans" opacity="0"><rect x="25" y="124" width="230" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="140" y="142" text-anchor="middle" fill="#2ecc71" font-size="15" font-weight="bold">Frequency of 7 = 4</text></g></svg>',

'fd9':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Finding Missing Frequency</text><g id="f9table" opacity="0"><text x="30" y="52" fill="#aaa" font-size="11">0-10: 8   10-20: ?   20-30: 14   30-40: 12</text></g><g id="f9calc" opacity="0"><text x="30" y="82" fill="#ffd700" font-size="13">Total = 50</text><text x="30" y="104" fill="#ffd700" font-size="13">Known sum = 8+14+12 = 34</text><text x="30" y="126" fill="#fff" font-size="13">Missing = 50 - 34</text></g><g id="f9ans" opacity="0"><rect x="25" y="142" width="160" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="105" y="161" text-anchor="middle" fill="#2ecc71" font-size="17" font-weight="bold">= 16</text></g></svg>',

'fd10':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Reading a Bar Graph</text><g id="f10bars" opacity="0"><line x1="40" y1="140" x2="380" y2="140" stroke="#888" stroke-width="2"/><rect x="55" y="100" width="50" height="40" fill="rgba(96,165,250,0.4)" stroke="#60a5fa" stroke-width="1"/><rect x="125" y="60" width="50" height="80" fill="rgba(96,165,250,0.8)" stroke="#60a5fa" stroke-width="1.5"/><rect x="195" y="90" width="50" height="50" fill="rgba(96,165,250,0.4)" stroke="#60a5fa" stroke-width="1"/><rect x="265" y="80" width="50" height="60" fill="rgba(96,165,250,0.4)" stroke="#60a5fa" stroke-width="1"/><text x="80" y="155" text-anchor="middle" fill="#aaa" font-size="10">Maths</text><text x="150" y="155" text-anchor="middle" fill="#ffd700" font-size="10">Science</text><text x="220" y="155" text-anchor="middle" fill="#aaa" font-size="10">Hindi</text><text x="290" y="155" text-anchor="middle" fill="#aaa" font-size="10">English</text></g><g id="f10label" opacity="0"><text x="140" y="50" fill="#ffd700" font-size="11">Tallest bar = most popular</text></g></svg>',

'fd11':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Range of Data</text><g id="f11def" opacity="0"><rect x="18" y="26" width="384" height="24" rx="6" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/><text x="210" y="42" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Range = Highest value - Lowest value</text></g><g id="f11line" opacity="0"><line x1="50" y1="90" x2="370" y2="90" stroke="#888" stroke-width="2"/><circle cx="80" cy="90" r="6" fill="#e74c3c"/><text x="80" y="110" text-anchor="middle" fill="#e74c3c" font-size="11">45 (min)</text><circle cx="340" cy="90" r="6" fill="#2ecc71"/><text x="340" y="110" text-anchor="middle" fill="#2ecc71" font-size="11">95 (max)</text></g><g id="f11calc" opacity="0"><path d="M80 72 L340 72" stroke="#ffd700" stroke-width="2" marker-start="url(#arr)" marker-end="url(#arr)"/><text x="210" y="65" text-anchor="middle" fill="#ffd700" font-size="12" font-weight="bold">Range = 95 - 45 = 50</text></g></svg>',

'fd12':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Mean (Average)</text><g id="f12formula" opacity="0"><rect x="40" y="28" width="340" height="24" rx="6" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/><text x="210" y="44" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="bold">Mean = Sum of all values / Number of values</text></g><g id="f12data" opacity="0"><text x="40" y="80" fill="#fff" font-size="14">Data: 4, 7, 13, 2, 4</text></g><g id="f12calc" opacity="0"><text x="40" y="110" fill="#ffd700" font-size="13">Sum = 4+7+13+2+4 = 30</text><text x="40" y="132" fill="#ffd700" font-size="13">Count = 5</text></g><g id="f12ans" opacity="0"><rect x="35" y="148" width="180" height="24" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="125" y="164" text-anchor="middle" fill="#2ecc71" font-size="15" font-weight="bold">Mean = 30/5 = 6</text></g></svg>',

'fd13':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Median — Middle Value</text><g id="f13rule" opacity="0"><rect x="18" y="26" width="384" height="22" rx="6" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/><text x="210" y="41" text-anchor="middle" fill="#60a5fa" font-size="11">Sort data first, then pick the middle value</text></g><g id="f13sort" opacity="0"><text x="30" y="76" fill="#ffd700" font-size="13">Sort: 3, 7, 2, 9, 5  to  2, 3, 5, 7, 9</text></g><g id="f13mid" opacity="0"><text x="30" y="106" fill="#aaa" font-size="15">2,  3,  </text><text x="120" y="106" fill="#2ecc71" font-size="18" font-weight="bold">5</text><text x="136" y="106" fill="#aaa" font-size="15">,  7,  9</text><text x="120" y="126" text-anchor="middle" fill="#2ecc71" font-size="11">Middle (3rd)</text></g><g id="f13ans" opacity="0"><rect x="25" y="144" width="180" height="26" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="115" y="162" text-anchor="middle" fill="#2ecc71" font-size="16" font-weight="bold">Median = 5</text></g></svg>',

'fd14':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Mode — Most Frequent Value</text><g id="f14rule" opacity="0"><rect x="18" y="26" width="384" height="22" rx="6" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/><text x="210" y="41" text-anchor="middle" fill="#60a5fa" font-size="11">Mode = value that appears most often</text></g><g id="f14data" opacity="0"><text x="30" y="76" fill="#fff" font-size="13">Data: 2, 3, 3, 4, 5, 3, 2, 3</text></g><g id="f14count" opacity="0"><text x="30" y="104" fill="#aaa" font-size="12">2 appears: 2 times</text><text x="30" y="122" fill="#60a5fa" font-size="12" font-weight="bold">3 appears: 4 times (most!)</text><text x="30" y="140" fill="#aaa" font-size="12">4,5 appear: 1 time each</text></g><g id="f14ans" opacity="0"><rect x="25" y="152" width="160" height="22" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="105" y="167" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">Mode = 3</text></g></svg>',

'fd15':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="18" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="bold">Using Mean to Find the Sum</text><g id="f15formula" opacity="0"><rect x="40" y="28" width="340" height="24" rx="6" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="1"/><text x="210" y="44" text-anchor="middle" fill="#60a5fa" font-size="12">Mean = Sum / n   so   Sum = Mean x n</text></g><g id="f15given" opacity="0"><text x="40" y="82" fill="#fff" font-size="13">Mean = 25, n = 8 observations</text></g><g id="f15calc" opacity="0"><text x="40" y="112" fill="#ffd700" font-size="14">Sum = 25 x 8</text></g><g id="f15ans" opacity="0"><rect x="35" y="130" width="180" height="28" rx="6" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="125" y="149" text-anchor="middle" fill="#2ecc71" font-size="18" font-weight="bold">Sum = 200</text></g></svg>'
};
return s[type]||'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="178" fill="#0a1a2e"/><text x="210" y="89" text-anchor="middle" fill="#555" font-size="14">Loading...</text></svg>';
}

function runAnim(type){
var fns={
'fd1':function(){fade('f1data','1');at(800,function(){fade('f1count','1');});at(2400,function(){fade('f1def','1');});},
'fd2':function(){fade('f2table','1');at(1200,function(){fade('f2explain','1');});},
'fd3':function(){fade('f3line','1');at(900,function(){fade('f3bracket','1');});at(2200,function(){fade('f3formula','1');});},
'fd4':function(){fade('f4line','1');at(900,function(){fade('f4mid','1');});at(2200,function(){fade('f4formula','1');});},
'fd5':function(){fade('f5table','1');at(1200,function(){fade('f5rule','1');});},
'fd6':function(){fade('f6axes','1');at(700,function(){fade('f6bars','1');});at(2000,function(){fade('f6note','1');});},
'fd7':function(){fade('f7table','1');at(1600,function(){fade('f7meaning','1');});},
'fd8':function(){fade('f8data','1');at(800,function(){fade('f8highlight','1');});at(2000,function(){fade('f8ans','1');});},
'fd9':function(){fade('f9table','1');at(800,function(){fade('f9calc','1');});at(2400,function(){fade('f9ans','1');});},
'fd10':function(){fade('f10bars','1');at(1200,function(){fade('f10label','1');});},
'fd11':function(){fade('f11def','1');at(700,function(){fade('f11line','1');});at(1800,function(){fade('f11calc','1');});},
'fd12':function(){fade('f12formula','1');at(700,function(){fade('f12data','1');});at(1600,function(){fade('f12calc','1');});at(2800,function(){fade('f12ans','1');});},
'fd13':function(){fade('f13rule','1');at(700,function(){fade('f13sort','1');});at(1800,function(){fade('f13mid','1');});at(3000,function(){fade('f13ans','1');});},
'fd14':function(){fade('f14rule','1');at(700,function(){fade('f14data','1');});at(1600,function(){fade('f14count','1');});at(2800,function(){fade('f14ans','1');});},
'fd15':function(){fade('f15formula','1');at(700,function(){fade('f15given','1');});at(1600,function(){fade('f15calc','1');});at(2600,function(){fade('f15ans','1');});}
};
if(fns[type])fns[type]();
}

var cur=0,score=0,answered=false;
function loadQ(i){
  answered=false;
  var q=questions[i];
  G('qNumber').textContent='Question '+(i+1)+' of 15';
  G('qText').textContent=q.q;
  G('feedback').textContent='';G('feedback').className='feedback';
  G('nextBtn').style.display='none';
  G('progressBar').style.width=(i/15*100)+'%';
  G('scorePill').textContent='Score: '+score+' / 15';
  var og=G('optionsGrid');og.innerHTML='';
  q.opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){checkAns(idx);};og.appendChild(b);
  });
  clearAt();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(400,function(){runAnim(q.anim);});
  G('bubble').textContent=q.narr.substring(0,78)+'...';
  at(300,function(){say(q.narr);});
}
function checkAns(idx){
  if(answered)return;answered=true;
  var q=questions[cur];
  var opts=G('optionsGrid').querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true;});
  if(idx===q.ans){
    opts[idx].classList.add('correct');score++;
    G('feedback').textContent='Correct! Well done!';G('feedback').className='feedback correct';
    G('scorePill').textContent='Score: '+score+' / 15';
    say('Excellent! That is correct!');
  }else{
    opts[idx].classList.add('wrong');opts[q.ans].classList.add('correct');
    G('feedback').textContent='Incorrect. Right answer: '+q.opts[q.ans];G('feedback').className='feedback wrong';
    say('Not quite. The correct answer is '+q.opts[q.ans]);
  }
  G('nextBtn').style.display='block';
}
function nextQ(){cur++;if(cur>=questions.length){showDone();return;}loadQ(cur);}
function replayAnim(){
  var q=questions[cur];clearAt();speechSynthesis.cancel();rStopTalk();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(200,function(){runAnim(q.anim);});at(400,function(){say(q.narr);});
}
function showDone(){
  G('mainArea').style.display='none';G('doneScreen').style.display='flex';
  G('progressBar').style.width='100%';
  G('doneScore').textContent='You scored '+score+' out of 15!';
  localStorage.setItem('explain_frequency_done','1');
  say('Congratulations! You have completed Frequency Distribution! You scored '+score+' out of 15!');
}
window.onload=function init(){initVoices(function(){startBlink();loadQ(0);});};
window.addEventListener('beforeunload',function(){speechSynthesis.cancel();});
window.addEventListener('pagehide',function(){speechSynthesis.cancel();});
</script>
