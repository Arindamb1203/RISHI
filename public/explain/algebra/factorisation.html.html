.replay-btn:hover{background:rgba(255,255,255,0.1)}
.content{flex:1;padding:18px;display:flex;flex-direction:column;gap:13px;overflow-y:auto}

.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}

.opt:hover:not(:disabled){background:rgba(255,255,255,0.13);border-color:#ffd700}
.opt.correct{background:rgba(39,174,96,0.25);border-color:#27ae60}
.opt.wrong{background:rgba(231,76,60,0.25);border-color:#e74c3c}
.feedback{font-size:0.83rem;padding:9px 13px;border-radius:8px;min-height:34px}
.feedback.correct{background:rgba(39,174,96,0.2);color:#2ecc71}
.feedback.wrong{background:rgba(231,76,60,0.2);color:#e74c3c}
.next-btn{align-self:flex-end;background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border:none;border-radius:24px;padding:10px 28px;font-weight:700;font-size:0.88rem;cursor:pointer;font-family:'Poppins',sans-serif;display:none}
.next-btn:hover{transform:scale(1.03)}
.done-screen{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:18px;text-align:center;padding:40px}
.done-screen h2{font-size:1.9rem;color:#ffd700}
.done-screen p{color:#ccc;font-size:0.96rem}
.done-btn{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border:none;border-radius:24px;padding:11px 30px;font-weight:700;font-size:0.96rem;cursor:pointer;font-family:'Poppins',sans-serif}
</style>

<script>
function G(id){return document.getElementById(id);}
var atTimers=[];
function clearAt(){atTimers.forEach(clearTimeout);atTimers=[];}
function at(ms,fn){atTimers.push(setTimeout(fn,ms));}
var chosenVoice=null,mouthTimer=null;
function initVoices(cb){
  var v=speechSynthesis.getVoices();
  if(v.length){pickVoice(v);cb();return;}
  speechSynthesis.onvoiceschanged=function(){pickVoice(speechSynthesis.getVoices());cb();};
}
function pickVoice(voices){
  var pri=['heera','veena','priya','raveena','female','woman','zira','samantha','victoria','karen','moira','tessa','fiona'];
  var enIN=voices.filter(function(v){return v.lang==='en-IN';});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enIN.length;i++){if(enIN[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enIN[i];return;}}}
  var enA=voices.filter(function(v){return v.lang.startsWith('en');});
  for(var p=0;p<pri.length;p++){for(var i=0;i<enA.length;i++){if(enA[i].name.toLowerCase().indexOf(pri[p])>-1){chosenVoice=enA[i];return;}}}
  if(enIN.length){chosenVoice=enIN[0];return;}
  if(enA.length){chosenVoice=enA[0];}
}
function say(text){
  speechSynthesis.cancel();rStopTalk();
  var u=new SpeechSynthesisUtterance(text);
  if(chosenVoice)u.voice=chosenVoice;
  u.lang='en-IN';u.rate=0.88;u.pitch=1.15;
  u.onstart=function(){rStartTalk();};
  u.onend=function(){rStopTalk();};
  speechSynthesis.speak(u);
}
function rStartTalk(){
  G('blushL').style.opacity='0.7';G('blushR').style.opacity='0.7';
  if(mouthTimer)clearInterval(mouthTimer);
  var open=false;
  mouthTimer=setInterval(function(){
    open=!open;
    G('mouth').setAttribute('d',open?'M53 87 Q60 96 67 87':'M53 89 Q60 93 67 89');
  },160);
}
function rStopTalk(){
  if(mouthTimer){clearInterval(mouthTimer);mouthTimer=null;}
  G('mouth').setAttribute('d','M53 89 Q60 93 67 89');
  G('blushL').style.opacity='0';G('blushR').style.opacity='0';
}
var blinkTimer=null;
function startBlink(){
  function doBlink(){
    G('lidL').setAttribute('opacity','0.95');G('lidR').setAttribute('opacity','0.95');
    setTimeout(function(){G('lidL').setAttribute('opacity','0');G('lidR').setAttribute('opacity','0');blinkTimer=setTimeout(doBlink,2200+Math.random()*3000);},120);
  }
  blinkTimer=setTimeout(doBlink,2200+Math.random()*3000);
}
function fade(id,v){var e=G(id);if(!e)return;e.style.transition='opacity .5s';e.style.opacity=v;}

var questions=[
{q:'Factorise: 4x + 8',opts:['4(x + 2)','2(x + 4)','4(x + 4)','2(2x + 4)'],ans:0,anim:'common1',
narr:'Watch! The H C F of 4 and 8 is 4. We divide both terms by 4. So 4x plus 8 equals 4 times x plus 2.'},

{q:'Factorise: 6a² + 3a',opts:['3a(2a + 1)','6a(a + 1)','3(2a² + a)','3a(2a + 3)'],ans:0,anim:'common2',
narr:'The H C F of 6a squared and 3a is 3a. Dividing each term by 3a gives us 3a times 2a plus 1.'},

{q:'Factorise: 12m²n + 8mn²',opts:['4mn(3m + 2n)','4m(3mn + 2n²)','2mn(6m + 4n)','4mn(3m + 4n)'],ans:0,anim:'common3',
narr:'H C F of coefficients 12 and 8 is 4. Lowest powers: m to the 1 and n to the 1. So H C F is 4mn, giving 4mn times 3m plus 2n.'},

{q:'Factorise: x² – 9',opts:['(x + 3)(x – 3)','(x – 9)(x + 1)','(x + 9)(x – 1)','(x – 3)²'],ans:0,anim:'diffsq1',
narr:'This is difference of squares! a squared minus b squared equals a plus b times a minus b. Here a is x and b is 3. Answer: x plus 3 times x minus 3.'},

{q:'Factorise: x² + 6x + 9',opts:['(x + 3)²','(x + 9)(x + 1)','(x + 3)(x + 3)','Both A and C'],ans:3,anim:'persq1',
narr:'Check the perfect square identity. 3 squared is 9, and 2 times x times 3 is 6x. So this is x plus 3 whole squared. Options A and C are both correct.'},

{q:'Factorise: x² + 5x + 6',opts:['(x + 2)(x + 3)','(x + 1)(x + 6)','(x + 6)(x – 1)','(x + 2)(x + 4)'],ans:0,anim:'split1',
narr:'Splitting the middle term. Find two numbers that multiply to 6 and add to 5. Those are 2 and 3. So x squared plus 5x plus 6 equals x plus 2 times x plus 3.'},

{q:'Factorise: x² – 7x + 12',opts:['(x – 3)(x – 4)','(x + 3)(x – 4)','(x – 6)(x – 2)','(x – 12)(x – 1)'],ans:0,anim:'split2',
narr:'Find two numbers multiplying to 12 and adding to minus 7. Those are minus 3 and minus 4. Answer: x minus 3 times x minus 4.'},

{q:'Factorise: ax + ay + bx + by',opts:['(a + b)(x + y)','(ax + b)(y + 1)','a(x+y) + b(x+y)','Both A and C'],ans:3,anim:'group1',
narr:'Group the first two and last two terms. Take a common from first group and b from second. Both have x plus y as factor. Answer is a plus b times x plus y. Options A and C are both correct.'},

{q:'Factorise: 4x² – 25',opts:['(2x + 5)(2x – 5)','(4x + 5)(x – 5)','(2x – 5)²','(4x – 25)(1)'],ans:0,anim:'diffsq2',
narr:'4x squared equals 2x whole squared, and 25 equals 5 squared. Using difference of squares identity, the answer is 2x plus 5 times 2x minus 5.'},

{q:'Factorise: x² – x – 12',opts:['(x – 4)(x + 3)','(x + 4)(x – 3)','(x – 6)(x + 2)','(x – 12)(x + 1)'],ans:0,anim:'split3',
narr:'Find two numbers multiplying to minus 12 and adding to minus 1. Those are minus 4 and 3. So x squared minus x minus 12 equals x minus 4 times x plus 3.'},

{q:'Factorise: 2x² + 7x + 3',opts:['(2x + 1)(x + 3)','(2x + 3)(x + 1)','(x + 7)(2x + 1)','Both A and C'],ans:3,anim:'split4',
narr:'Multiply 2 by 3 to get 6. Factors of 6 adding to 7 are 1 and 6. Split: 2x squared plus x plus 6x plus 3. Factor: x times 2x plus 1, plus 3 times 2x plus 1. Answer: 2x plus 1 times x plus 3. Both A and C are correct.'},

{q:'Factorise: 3x² – 10x + 8',opts:['(3x – 4)(x – 2)','(3x – 8)(x – 1)','(3x – 2)(x – 4)','(x – 4)(3x – 2)'],ans:0,anim:'split5',
narr:'Multiply 3 by 8 to get 24. Factors of 24 adding to minus 10 are minus 6 and minus 4. Split, then factor: 3x times x minus 2, minus 4 times x minus 2. Answer: 3x minus 4 times x minus 2.'},

{q:'Factorise completely: x³ – x',opts:['x(x + 1)(x – 1)','x(x² – 1)','x²(x – 1)','(x² + 1)(x – 1)'],ans:0,anim:'cubic1',
narr:'First take x common to get x times x squared minus 1. Now x squared minus 1 is difference of squares. Final answer: x times x plus 1 times x minus 1.'},

{q:'Factorise: 2a(x + y) – 3b(x + y)',opts:['(x + y)(2a – 3b)','(2a – 3b)(x – y)','2a(x+y) – 3b','Cannot be factorised'],ans:0,anim:'group2',
narr:'x plus y is a common factor in both terms. Take it out. The answer is x plus y times 2a minus 3b.'},

{q:'(x + 1) is a factor of 2x² + kx + 3. Find k.',opts:['k = 5','k = –5','k = 1','k = 3'],ans:0,anim:'hots1',
narr:'By factor theorem, if x plus 1 is a factor, substituting x equals minus 1 gives zero. So 2 times 1 plus k times minus 1 plus 3 equals 0. That gives 5 minus k equals 0. Therefore k equals 5.'}
];

function getAnimSVG(type){
var svgs={
'common1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">HCF Method — Common Factor</text><g id="c1expr" opacity="0"><text x="80" y="68" fill="#fff" font-size="24" font-weight="bold">4x</text><text x="118" y="68" fill="#aaa" font-size="24">+</text><text x="144" y="68" fill="#fff" font-size="24" font-weight="bold">8</text></g><g id="c1hcf" opacity="0"><text x="80" y="98" fill="#ffd700" font-size="12">HCF(4, 8) = 4</text><path d="M92 72 L92 88" stroke="#ffd700" stroke-width="1.5" marker-end="url(#arr)"/></g><g id="c1fact" opacity="0"><text x="60" y="138" fill="#2ecc71" font-size="22" font-weight="bold">4</text><text x="78" y="138" fill="#fff" font-size="22">(</text><text x="88" y="138" fill="#e74c3c" font-size="22" font-weight="bold">x</text><text x="104" y="138" fill="#aaa" font-size="22">+</text><text x="122" y="138" fill="#e74c3c" font-size="22" font-weight="bold">2</text><text x="138" y="138" fill="#fff" font-size="22">)</text></g><g id="c1verify" opacity="0"><text x="220" y="95" fill="#aaa" font-size="11">4 × x = 4x ✓</text><text x="220" y="112" fill="#aaa" font-size="11">4 × 2 = 8 ✓</text><rect x="215" y="82" width="140" height="40" rx="6" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.5"/></g></svg>',

'common2':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">HCF Method — Variable Terms</text><g id="c2expr" opacity="0"><text x="60" y="66" fill="#fff" font-size="22" font-weight="bold">6a²</text><text x="106" y="66" fill="#aaa" font-size="22">+</text><text x="126" y="66" fill="#fff" font-size="22" font-weight="bold">3a</text></g><g id="c2step" opacity="0"><text x="60" y="96" fill="#ffd700" font-size="12">HCF of coefficients: HCF(6, 3) = 3</text><text x="60" y="114" fill="#ffd700" font-size="12">HCF of variables: a² and a → lowest power = a</text><text x="60" y="132" fill="#2ecc71" font-size="13" font-weight="bold">∴ HCF = 3a</text></g><g id="c2fact" opacity="0"><text x="60" y="162" fill="#2ecc71" font-size="22" font-weight="bold">3a(2a + 1)</text></g></svg>',

'common3':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">HCF with Two Variables</text><g id="c3expr" opacity="0"><text x="30" y="60" fill="#fff" font-size="18" font-weight="bold">12m²n + 8mn²</text></g><g id="c3hcf" opacity="0"><text x="30" y="88" fill="#ffd700" font-size="12">HCF(12, 8) = 4</text><text x="30" y="106" fill="#ffd700" font-size="12">m: min power of m² and m¹ → m¹</text><text x="30" y="124" fill="#ffd700" font-size="12">n: min power of n¹ and n² → n¹</text><text x="30" y="142" fill="#2ecc71" font-size="13" font-weight="bold">∴ HCF = 4mn</text></g><g id="c3fact" opacity="0"><text x="30" y="168" fill="#2ecc71" font-size="20" font-weight="bold">4mn(3m + 2n)</text></g></svg>',

'diffsq1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Difference of Squares Identity</text><g id="ds1id" opacity="0"><rect x="20" y="28" width="380" height="28" rx="7" fill="rgba(255,215,0,0.1)" stroke="#ffd700" stroke-width="1"/><text x="210" y="47" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">a² – b² = (a + b)(a – b)</text></g><g id="ds1expr" opacity="0"><text x="80" y="90" fill="#fff" font-size="22" font-weight="bold">x² – 9</text></g><g id="ds1map" opacity="0"><text x="40" y="118" fill="#e74c3c" font-size="12">a = x  (since x² = x·x)</text><text x="40" y="136" fill="#3498db" font-size="12">b = 3  (since √9 = 3)</text></g><g id="ds1ans" opacity="0"><text x="40" y="164" fill="#2ecc71" font-size="20" font-weight="bold">(x + 3)(x – 3)</text><text x="210" y="164" fill="#aaa" font-size="13">✓ Answer</text></g></svg>',

'persq1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Perfect Square Identity</text><g id="ps1id" opacity="0"><rect x="15" y="28" width="390" height="24" rx="6" fill="rgba(255,215,0,0.1)" stroke="#ffd700" stroke-width="1"/><text x="210" y="44" text-anchor="middle" fill="#ffd700" font-size="11" font-weight="bold">a² + 2ab + b² = (a + b)²</text></g><g id="ps1expr" opacity="0"><text x="50" y="82" fill="#fff" font-size="20" font-weight="bold">x² + 6x + 9</text></g><g id="ps1check" opacity="0"><text x="50" y="108" fill="#ffd700" font-size="12">✓ First term: x² → a = x</text><text x="50" y="124" fill="#ffd700" font-size="12">✓ Last term: √9 = 3 → b = 3</text><text x="50" y="140" fill="#ffd700" font-size="12">✓ Middle: 2 × x × 3 = 6x ✓</text></g><g id="ps1ans" opacity="0"><text x="50" y="168" fill="#2ecc71" font-size="22" font-weight="bold">(x + 3)²</text><text x="160" y="168" fill="#aaa" font-size="13">← Perfect Square!</text></g></svg>',

'split1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Splitting the Middle Term</text><g id="sp1expr" opacity="0"><text x="40" y="52" fill="#fff" font-size="20" font-weight="bold">x² + 5x + 6</text></g><g id="sp1find" opacity="0"><text x="40" y="78" fill="#ffd700" font-size="12">Find m, n : m × n = 6  and  m + n = 5</text><text x="40" y="96" fill="#2ecc71" font-size="12" font-weight="bold">→ m = 2, n = 3  (2×3=6 ✓, 2+3=5 ✓)</text></g><g id="sp1split" opacity="0"><text x="40" y="118" fill="#fff" font-size="14">x² + <tspan fill="#e74c3c">2x</tspan> + <tspan fill="#3498db">3x</tspan> + 6</text></g><g id="sp1group" opacity="0"><text x="40" y="140" fill="#fff" font-size="14">x(x + 2) + 3(x + 2)</text></g><g id="sp1ans" opacity="0"><text x="40" y="166" fill="#2ecc71" font-size="19" font-weight="bold">(x + 2)(x + 3)</text></g></svg>',

'split2':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Middle Term Split — Negative Sum</text><g id="sp2expr" opacity="0"><text x="40" y="52" fill="#fff" font-size="20" font-weight="bold">x² – 7x + 12</text></g><g id="sp2find" opacity="0"><text x="40" y="78" fill="#ffd700" font-size="12">Find m, n : m × n = 12  and  m + n = –7</text><text x="40" y="96" fill="#2ecc71" font-size="12" font-weight="bold">→ m = –3, n = –4  (–3×–4=12 ✓, –3+(–4)=–7 ✓)</text></g><g id="sp2split" opacity="0"><text x="40" y="118" fill="#fff" font-size="14">x² – <tspan fill="#e74c3c">3x</tspan> – <tspan fill="#3498db">4x</tspan> + 12</text></g><g id="sp2group" opacity="0"><text x="40" y="140" fill="#fff" font-size="14">x(x – 3) – 4(x – 3)</text></g><g id="sp2ans" opacity="0"><text x="40" y="166" fill="#2ecc71" font-size="19" font-weight="bold">(x – 3)(x – 4)</text></g></svg>',

'group1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Factorisation by Grouping</text><g id="g1expr" opacity="0"><text x="25" y="55" fill="#fff" font-size="17" font-weight="bold">ax + ay + bx + by</text></g><g id="g1grp1" opacity="0"><rect x="22" y="62" width="80" height="26" rx="5" fill="rgba(231,76,60,0.2)" stroke="#e74c3c" stroke-width="1.5"/><text x="62" y="79" text-anchor="middle" fill="#e74c3c" font-size="12">ax + ay</text></g><g id="g1grp2" opacity="0"><rect x="148" y="62" width="80" height="26" rx="5" fill="rgba(52,152,219,0.2)" stroke="#3498db" stroke-width="1.5"/><text x="188" y="79" text-anchor="middle" fill="#3498db" font-size="12">bx + by</text></g><g id="g1fact1" opacity="0"><text x="25" y="116" fill="#fff" font-size="15">a(x + y)  +  b(x + y)</text></g><g id="g1common" opacity="0"><text x="25" y="138" fill="#ffd700" font-size="12">Common binomial factor → (x + y)</text></g><g id="g1ans" opacity="0"><text x="25" y="166" fill="#2ecc71" font-size="19" font-weight="bold">(x + y)(a + b)</text></g></svg>',

'diffsq2':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Difference of Squares — Level 2</text><g id="ds2expr" opacity="0"><text x="60" y="62" fill="#fff" font-size="22" font-weight="bold">4x² – 25</text></g><g id="ds2map" opacity="0"><text x="40" y="92" fill="#e74c3c" font-size="13">4x² = (2x)²  →  a = 2x</text><text x="40" y="112" fill="#3498db" font-size="13">25 = 5²       →  b = 5</text></g><g id="ds2id" opacity="0"><rect x="30" y="120" width="340" height="24" rx="6" fill="rgba(255,215,0,0.08)" stroke="#ffd700" stroke-width="1"/><text x="200" y="136" text-anchor="middle" fill="#ffd700" font-size="12">Apply: a² – b² = (a+b)(a–b)</text></g><g id="ds2ans" opacity="0"><text x="60" y="168" fill="#2ecc71" font-size="20" font-weight="bold">(2x + 5)(2x – 5)</text></g></svg>',

'split3':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Middle Term Split — Negative Constant</text><g id="sp3expr" opacity="0"><text x="40" y="52" fill="#fff" font-size="20" font-weight="bold">x² – x – 12</text></g><g id="sp3find" opacity="0"><text x="40" y="78" fill="#ffd700" font-size="12">Find m, n : m × n = –12  and  m + n = –1</text><text x="40" y="96" fill="#2ecc71" font-size="12" font-weight="bold">→ m = –4, n = 3  (–4×3=–12 ✓, –4+3=–1 ✓)</text></g><g id="sp3split" opacity="0"><text x="40" y="118" fill="#fff" font-size="14">x² – <tspan fill="#e74c3c">4x</tspan> + <tspan fill="#3498db">3x</tspan> – 12</text></g><g id="sp3group" opacity="0"><text x="40" y="140" fill="#fff" font-size="14">x(x – 4) + 3(x – 4)</text></g><g id="sp3ans" opacity="0"><text x="40" y="166" fill="#2ecc71" font-size="19" font-weight="bold">(x – 4)(x + 3)</text></g></svg>',

'split4':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Split Middle Term — Leading Coeff ≠ 1</text><g id="sp4expr" opacity="0"><text x="40" y="52" fill="#fff" font-size="19" font-weight="bold">2x² + 7x + 3</text></g><g id="sp4ac" opacity="0"><text x="40" y="78" fill="#ffd700" font-size="12">a × c = 2 × 3 = 6</text><text x="40" y="96" fill="#2ecc71" font-size="12" font-weight="bold">Factors of 6 adding to 7: 1 and 6</text></g><g id="sp4split" opacity="0"><text x="40" y="118" fill="#fff" font-size="14">2x² + <tspan fill="#e74c3c">x</tspan> + <tspan fill="#3498db">6x</tspan> + 3</text></g><g id="sp4group" opacity="0"><text x="40" y="140" fill="#fff" font-size="14">x(2x + 1) + 3(2x + 1)</text></g><g id="sp4ans" opacity="0"><text x="40" y="166" fill="#2ecc71" font-size="19" font-weight="bold">(2x + 1)(x + 3)</text></g></svg>',

'split5':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Split Middle Term — Both Factors Negative</text><g id="sp5expr" opacity="0"><text x="40" y="52" fill="#fff" font-size="19" font-weight="bold">3x² – 10x + 8</text></g><g id="sp5ac" opacity="0"><text x="40" y="78" fill="#ffd700" font-size="12">a × c = 3 × 8 = 24</text><text x="40" y="96" fill="#2ecc71" font-size="12" font-weight="bold">Factors of 24 adding to –10: –6 and –4</text></g><g id="sp5split" opacity="0"><text x="40" y="118" fill="#fff" font-size="14">3x² – <tspan fill="#e74c3c">6x</tspan> – <tspan fill="#3498db">4x</tspan> + 8</text></g><g id="sp5group" opacity="0"><text x="40" y="140" fill="#fff" font-size="14">3x(x – 2) – 4(x – 2)</text></g><g id="sp5ans" opacity="0"><text x="40" y="166" fill="#2ecc71" font-size="19" font-weight="bold">(3x – 4)(x – 2)</text></g></svg>',

'cubic1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Complete Factorisation — Cubic</text><g id="cu1expr" opacity="0"><text x="50" y="56" fill="#fff" font-size="22" font-weight="bold">x³ – x</text></g><g id="cu1step1" opacity="0"><text x="50" y="86" fill="#ffd700" font-size="13">Step 1: Take x common</text><text x="50" y="108" fill="#fff" font-size="17">→  x(x² – 1)</text></g><g id="cu1step2" opacity="0"><text x="50" y="132" fill="#ffd700" font-size="13">Step 2: x² – 1 is difference of squares</text><text x="50" y="154" fill="#fff" font-size="17">→  x(x + 1)(x – 1)</text></g><g id="cu1done" opacity="0"><rect x="40" y="160" width="200" height="18" rx="5" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1"/><text x="140" y="173" text-anchor="middle" fill="#2ecc71" font-size="11" font-weight="bold">Completely factorised ✓</text></g></svg>',

'group2':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Common Binomial Factor</text><g id="g2expr" opacity="0"><text x="25" y="58" fill="#fff" font-size="17" font-weight="bold">2a(x + y) – 3b(x + y)</text></g><g id="g2box" opacity="0"><rect x="52" y="42" width="64" height="22" rx="5" fill="none" stroke="#ffd700" stroke-width="2"/><rect x="192" y="42" width="64" height="22" rx="5" fill="none" stroke="#ffd700" stroke-width="2"/><text x="210" y="36" text-anchor="middle" fill="#ffd700" font-size="10">(x+y) appears in both terms</text></g><g id="g2step" opacity="0"><text x="25" y="102" fill="#ffd700" font-size="13">Take (x + y) as common factor:</text><text x="25" y="126" fill="#fff" font-size="17">(x + y)(2a – 3b)</text></g><g id="g2ans" opacity="0"><rect x="22" y="148" width="198" height="24" rx="6" fill="rgba(46,204,113,0.15)" stroke="#2ecc71" stroke-width="1.2"/><text x="120" y="164" text-anchor="middle" fill="#2ecc71" font-size="14" font-weight="bold">(x + y)(2a – 3b) ✓</text></g></svg>',

'hots1':'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg" style="font-family:Poppins,sans-serif"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="20" text-anchor="middle" fill="#ffd700" font-size="13" font-weight="bold">Factor Theorem — Find the Unknown k</text><g id="h1thm" opacity="0"><rect x="15" y="28" width="390" height="24" rx="6" fill="rgba(255,215,0,0.08)" stroke="#ffd700" stroke-width="1"/><text x="210" y="44" text-anchor="middle" fill="#ffd700" font-size="11">(x + 1) is a factor  →  put x = –1  →  expression = 0</text></g><g id="h1sub" opacity="0"><text x="30" y="80" fill="#fff" font-size="15">2(–1)² + k(–1) + 3 = 0</text></g><g id="h1calc" opacity="0"><text x="30" y="106" fill="#fff" font-size="15">2(1) – k + 3 = 0</text><text x="30" y="128" fill="#fff" font-size="15">5 – k = 0</text></g><g id="h1ans" opacity="0"><rect x="26" y="142" width="116" height="30" rx="8" fill="rgba(46,204,113,0.2)" stroke="#2ecc71" stroke-width="1.5"/><text x="84" y="161" text-anchor="middle" fill="#2ecc71" font-size="19" font-weight="bold">k = 5</text></g></svg>'
};
return svgs[type]||'<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="178" fill="#0f0c29"/><text x="210" y="89" text-anchor="middle" fill="#555" font-size="14">Loading...</text></svg>';
}

function runAnim(type){
var s={
'common1':function(){fade('c1expr','1');at(700,function(){fade('c1hcf','1');});at(1800,function(){fade('c1fact','1');});at(2800,function(){fade('c1verify','1');});},
'common2':function(){fade('c2expr','1');at(800,function(){fade('c2step','1');});at(2600,function(){fade('c2fact','1');});},
'common3':function(){fade('c3expr','1');at(800,function(){fade('c3hcf','1');});at(2800,function(){fade('c3fact','1');});},
'diffsq1':function(){fade('ds1id','1');at(1200,function(){fade('ds1expr','1');});at(2000,function(){fade('ds1map','1');});at(3400,function(){fade('ds1ans','1');});},
'persq1':function(){fade('ps1id','1');at(800,function(){fade('ps1expr','1');});at(1600,function(){fade('ps1check','1');});at(3200,function(){fade('ps1ans','1');});},
'split1':function(){fade('sp1expr','1');at(700,function(){fade('sp1find','1');});at(2000,function(){fade('sp1split','1');});at(2900,function(){fade('sp1group','1');});at(3800,function(){fade('sp1ans','1');});},
'split2':function(){fade('sp2expr','1');at(700,function(){fade('sp2find','1');});at(2000,function(){fade('sp2split','1');});at(2900,function(){fade('sp2group','1');});at(3800,function(){fade('sp2ans','1');});},
'group1':function(){fade('g1expr','1');at(600,function(){fade('g1grp1','1');});at(1400,function(){fade('g1grp2','1');});at(2400,function(){fade('g1fact1','1');});at(3200,function(){fade('g1common','1');});at(4000,function(){fade('g1ans','1');});},
'diffsq2':function(){fade('ds2expr','1');at(700,function(){fade('ds2map','1');});at(2200,function(){fade('ds2id','1');});at(3200,function(){fade('ds2ans','1');});},
'split3':function(){fade('sp3expr','1');at(700,function(){fade('sp3find','1');});at(2000,function(){fade('sp3split','1');});at(2900,function(){fade('sp3group','1');});at(3800,function(){fade('sp3ans','1');});},
'split4':function(){fade('sp4expr','1');at(700,function(){fade('sp4ac','1');});at(2000,function(){fade('sp4split','1');});at(2900,function(){fade('sp4group','1');});at(3800,function(){fade('sp4ans','1');});},
'split5':function(){fade('sp5expr','1');at(700,function(){fade('sp5ac','1');});at(2000,function(){fade('sp5split','1');});at(2900,function(){fade('sp5group','1');});at(3800,function(){fade('sp5ans','1');});},
'cubic1':function(){fade('cu1expr','1');at(800,function(){fade('cu1step1','1');});at(2400,function(){fade('cu1step2','1');});at(3800,function(){fade('cu1done','1');});},
'group2':function(){fade('g2expr','1');at(700,function(){fade('g2box','1');});at(1800,function(){fade('g2step','1');});at(3000,function(){fade('g2ans','1');});},
'hots1':function(){fade('h1thm','1');at(1000,function(){fade('h1sub','1');});at(2200,function(){fade('h1calc','1');});at(3400,function(){fade('h1ans','1');});}
};
if(s[type])s[type]();
}

var cur=0,score=0,answered=false;
function loadQ(i){
  answered=false;
  var q=questions[i];
  G('qNumber').textContent='Question '+(i+1)+' of 15';
  G('qText').textContent=q.q;
  G('feedback').textContent='';G('feedback').className='feedback';
  G('nextBtn').style.display='none';
  G('progressBar').style.width=(i/15*100)+'%';
  G('scorePill').textContent='Score: '+score+' / 15';
  var og=G('optionsGrid');og.innerHTML='';
  q.opts.forEach(function(o,idx){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){checkAns(idx);};og.appendChild(b);
  });
  clearAt();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(400,function(){runAnim(q.anim);});
  G('bubble').textContent=q.narr.substring(0,78)+'…';
  at(300,function(){say(q.narr);});
}
function checkAns(idx){
  if(answered)return;answered=true;
  var q=questions[cur];
  var opts=G('optionsGrid').querySelectorAll('.opt');
  opts.forEach(function(b){b.disabled=true;});
  if(idx===q.ans){
    opts[idx].classList.add('correct');score++;
    G('feedback').textContent='✅ Correct! Well done!';G('feedback').className='feedback correct';
    G('scorePill').textContent='Score: '+score+' / 15';
    say('Excellent! That is correct!');
  }else{
    opts[idx].classList.add('wrong');opts[q.ans].classList.add('correct');
    G('feedback').textContent='❌ Incorrect. Right answer: '+q.opts[q.ans];G('feedback').className='feedback wrong';
    say('Not quite. The correct answer is '+q.opts[q.ans]);
  }
  G('nextBtn').style.display='block';
}
function nextQ(){cur++;if(cur>=questions.length){showDone();return;}loadQ(cur);}
function replayAnim(){
  var q=questions[cur];clearAt();speechSynthesis.cancel();rStopTalk();
  G('animCanvas').innerHTML=getAnimSVG(q.anim);
  at(200,function(){runAnim(q.anim);});at(400,function(){say(q.narr);});
}
function showDone(){
  G('mainArea').style.display='none';G('doneScreen').style.display='flex';
  G('progressBar').style.width='100%';
  G('doneScore').textContent='You scored '+score+' out of 15!';
  localStorage.setItem('explain_factorisation_done','1');
  say('Congratulations! You completed the Factorisation chapter! You scored '+score+' out of 15!');
}
window.onload=function init(){initVoices(function(){startBlink();loadQ(0);});};
window.addEventListener('beforeunload',function(){speechSynthesis.cancel();});
window.addEventListener('pagehide',function(){speechSynthesis.cancel();});
</script>
