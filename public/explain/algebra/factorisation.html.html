<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorisation - Rishika Explains</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .header { 
            text-align: center; 
            color: white; 
            margin-bottom: 30px;
            padding: 20px;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            align-items: start;
        }
        
        .content-area {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .anim-canvas {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            max-height: 195px;
            overflow: hidden;
            position: relative;
        }
        .anim-canvas svg { max-height: 195px; width: 100%; }
        
        .question-box {
            background: #e3f2fd;
            border-left: 5px solid #2196f3;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }
        .question-box.active { display: block; animation: slideIn 0.5s ease-out; }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-secondary:hover { background: #e0e0e0; }
        
        .rishika-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        .speech-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 20px;
            max-width: 300px;
            font-size: 15px;
            line-height: 1.5;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
            margin-bottom: 10px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.3s ease-out;
        }
        .speech-bubble.active { opacity: 1; transform: scale(1); }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 40px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid #764ba2;
        }
        
        .rishika-image {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid transparent;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            transition: all 0.3s;
            cursor: pointer;
        }
        .rishika-image.speaking {
            border-color: #ffd700;
            animation: bounce 0.5s ease-in-out infinite;
        }
        
        .status-indicator {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 25px;
            height: 25px;
            background: #ff4757;
            border-radius: 50%;
            display: none;
        }
        .status-indicator.active { display: block; animation: pulse 1s ease-in-out infinite; }
        
        .click-hint {
            font-size: 12px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 5px 10px;
            border-radius: 15px;
            margin-top: 5px;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @media (max-width: 968px) {
            .main-layout { grid-template-columns: 1fr; }
            .rishika-container { position: relative; bottom: auto; right: auto; margin-top: 30px; }
        }
        
        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.5s;
        }
        
        .answer-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .answer-btn {
            padding: 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .answer-btn:hover { border-color: #667eea; background: #f0f4ff; }
        .answer-btn.correct { border-color: #4caf50; background: #e8f5e9; }
        .answer-btn.wrong { border-color: #f44336; background: #ffebee; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📐 Factorisation</h1>
            <p>Learn to break down expressions with Rishika</p>
        </div>
        
        <div class="main-layout">
            <div class="content-area">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div id="lessonContent">
                    <h2 id="topicTitle">Welcome to Factorisation!</h2>
                    <p id="topicText">Rishika will guide you through factorisation step by step.</p>
                    
                    <div class="anim-canvas" id="animCanvas"></div>
                    
                    <div class="controls">
                        <button class="btn btn-primary" id="startBtn" onclick="startLesson()">Start Learning</button>
                        <button class="btn btn-secondary" id="replayBtn" onclick="replayAnim()" style="display:none;">🔁 Replay</button>
                        <button class="btn btn-secondary" id="nextBtn" onclick="nextQuestion()" style="display:none;">Next →</button>
                    </div>
                </div>
                
                <div class="question-box" id="questionBox">
                    <h3>🤔 Quick Check!</h3>
                    <p id="questionText"></p>
                    <div class="answer-options" id="answerOptions"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="rishika-container">
        <div class="speech-bubble" id="speechBubble"></div>
        <div style="position: relative;">
            <img src="rishika-normal.png" alt="Rishika" class="rishika-image" id="rishikaImg" onclick="replayCurrentAudio()">
            <div class="status-indicator" id="statusIndicator"></div>
        </div>
        <div class="click-hint">👆 Click to hear again</div>
    </div>

    <script>
        let synth = window.speechSynthesis;
        let voices = [];
        let currentUtterance = null;
        let isSpeaking = false;
        let atTimers = [];
        let currentStep = 0;
        let lessonStarted = false;
        
        const femaleVoiceNames = ['heera', 'veena', 'priya', 'raveena', 'female', 'woman', 'zira', 'samantha', 'victoria', 'karen', 'moira', 'tessa', 'fiona'];
        let selectedVoice = null;
        
        const rishikaImages = {
            normal: 'rishika-normal.png',
            excited: 'rishika-excited.png',
            soft: 'rishika-soft.png',
            impressed: 'rishika-impressed.png',
            surprised: 'rishika-surprised.png',
            angry: 'rishika-angry.png'
        };
        
        const lessonSteps = [
            {
                title: "What is Factorisation?",
                text: "Breaking down into simpler parts",
                emotion: "excited",
                narration: "Namaste! I'm Rishika. Today I'll teach you factorisation - it's like breaking a big chocolate bar into smaller pieces!",
                svg: "intro"
            },
            {
                title: "Method 1: Common Factor",
                text: "Finding what is common",
                emotion: "soft",
                narration: "Look at this expression: 6x plus 9. Both numbers have something in common - can you see it?",
                svg: "common_factor"
            },
            {
                title: "The Answer",
                text: "3 is common!",
                emotion: "impressed",
                narration: "Exactly! 3 is common to both. So we write it as 3 times bracket 2x plus 3 bracket close. Beautiful, isn't it?",
                svg: "common_answer"
            },
            {
                title: "Method 2: Identities",
                text: "Using special formulas",
                emotion: "excited",
                narration: "Now let's learn identity-based factorisation. Remember a squared minus b squared equals a plus b times a minus b!",
                svg: "identity"
            },
            {
                title: "Example",
                text: "x² - 25",
                emotion: "soft",
                narration: "Look at x squared minus 25. This is x squared minus 5 squared. So it becomes x plus 5 times x minus 5!",
                svg: "identity_example"
            }
        ];
        
        function initVoices(callback) {
            voices = synth.getVoices();
            
            if (voices.length === 0) {
                synth.onvoiceschanged = () => {
                    voices = synth.getVoices();
                    selectBestVoice();
                    if (callback) callback();
                };
            } else {
                selectBestVoice();
                if (callback) callback();
            }
        }
        
        function selectBestVoice() {
            for (let name of femaleVoiceNames) {
                let voice = voices.find(v => v.lang.includes('en-IN') && v.name.toLowerCase().includes(name));
                if (voice) { selectedVoice = voice; return; }
            }
            
            for (let name of femaleVoiceNames) {
                let voice = voices.find(v => v.lang.includes('en-') && v.name.toLowerCase().includes(name));
                if (voice) { selectedVoice = voice; return; }
            }
            
            let enInVoice = voices.find(v => v.lang.includes('en-IN'));
            if (enInVoice) { selectedVoice = enInVoice; return; }
            
            let enGbVoice = voices.find(v => v.lang.includes('en-GB'));
            if (enGbVoice) { selectedVoice = enGbVoice; return; }
            
            selectedVoice = voices[0];
        }
        
        function say(text, emotion = 'normal') {
            if (!text) return;
            
            synth.cancel();
            clearTimeoutTimers();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.voice = selectedVoice;
            utterance.rate = 0.88;
            utterance.pitch = 1.15;
            utterance.lang = "en-IN";
            
            updateRishika(emotion, true);
            showBubble(text);
            
            utterance.onend = () => {
                updateRishika(emotion, false);
                isSpeaking = false;
            };
            
            utterance.onerror = () => {
                updateRishika('normal', false);
                isSpeaking = false;
            };
            
            isSpeaking = true;
            synth.speak(utterance);
            currentUtterance = utterance;
        }
        
        function updateRishika(emotion, speaking) {
            const img = document.getElementById('rishikaImg');
            const indicator = document.getElementById('statusIndicator');
            
            const emotionMap = {
                'happy': 'excited',
                'excited': 'excited',
                'thinking': 'soft',
                'soft': 'soft',
                'impressed': 'impressed',
                'surprised': 'surprised',
                'confused': 'surprised',
                'sad': 'soft',
                'angry': 'angry'
            };
            
            let imgName = emotionMap[emotion] || 'normal';
            img.src = rishikaImages[imgName];
            
            if (speaking) {
                img.classList.add('speaking');
                indicator.classList.add('active');
            } else {
                img.classList.remove('speaking');
                indicator.classList.remove('active');
            }
        }
        
        function showBubble(text) {
            const bubble = document.getElementById('speechBubble');
            bubble.textContent = text;
            bubble.classList.add('active');
            
            let duration = Math.max(2000, text.length * 60);
            at(duration + 500, () => {
                bubble.classList.remove('active');
            });
        }
        
        function replayCurrentAudio() {
            if (currentStep < lessonSteps.length) {
                let step = lessonSteps[currentStep];
                say(step.narration, step.emotion);
            }
        }
        
        function at(ms, fn) {
            let timer = setTimeout(fn, ms);
            atTimers.push(timer);
            return timer;
        }
        
        function clearTimeoutTimers() {
            atTimers.forEach(t => clearTimeout(t));
            atTimers = [];
        }
        
        function getAnimSVG(type) {
            const svgs = {
                intro: `<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <clipPath id="chocClip">
                            <rect x="50" y="40" width="320" height="100" rx="10"/>
                        </clipPath>
                    </defs>
                    <rect x="50" y="40" width="320" height="100" fill="#8B4513" stroke="#5D3A1A" stroke-width="3" rx="10"/>
                    <g id="pieces" opacity="0">
                        <rect x="60" y="50" width="70" height="80" fill="#A0522D" stroke="#5D3A1A" stroke-width="2" rx="5"/>
                        <rect x="140" y="50" width="70" height="80" fill="#A0522D" stroke="#5D3A1A" stroke-width="2" rx="5"/>
                        <rect x="220" y="50" width="70" height="80" fill="#A0522D" stroke="#5D3A1A" stroke-width="2" rx="5"/>
                        <rect x="300" y="50" width="60" height="80" fill="#A0522D" stroke="#5D3A1A" stroke-width="2" rx="5"/>
                    </g>
                    <g id="arrows" opacity="0">
                        <line x1="95" y1="90" x2="95" y2="140" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
                        <line x1="175" y1="90" x2="175" y2="140" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
                        <line x1="255" y1="90" x2="255" y2="140" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
                        <line x1="330" y1="90" x2="330" y2="140" stroke="#667eea" stroke-width="3" marker-end="url(#arrowhead)"/>
                    </g>
                    <defs>
                        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                            <polygon points="0 0, 10 3, 0 6" fill="#667eea"/>
                        </marker>
                    </defs>
                    <text x="210" y="160" text-anchor="middle" fill="#667eea" font-size="14" font-weight="bold" id="chocText" opacity="0">Breaking into factors!</text>
                </svg>`,
                
                common_factor: `<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#333">6x + 9</text>
                    <g id="sixx" opacity="0">
                        <circle cx="120" cy="80" r="25" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
                        <text x="120" y="85" text-anchor="middle" font-size="16" fill="#1976d2">6x</text>
                        <line x1="120" y1="105" x2="120" y2="130" stroke="#667eea" stroke-width="2"/>
                        <text x="120" y="150" text-anchor="middle" font-size="14" fill="#667eea">3 × 2x</text>
                    </g>
                    <text x="210" y="90" text-anchor="middle" font-size="24" fill="#666">+</text>
                    <g id="nine" opacity="0">
                        <circle cx="300" cy="80" r="25" fill="#fff3e0" stroke="#ff9800" stroke-width="2"/>
                        <text x="300" y="85" text-anchor="middle" font-size="16" fill="#f57c00">9</text>
                        <line x1="300" y1="105" x2="300" y2="130" stroke="#667eea" stroke-width="2"/>
                        <text x="300" y="150" text-anchor="middle" font-size="14" fill="#667eea">3 × 3</text>
                    </g>
                    <g id="common" opacity="0">
                        <rect x="100" y="135" width="220" height="30" fill="#ffd700" fill-opacity="0.3" stroke="#ffd700" stroke-width="2" rx="5"/>
                        <text x="210" y="155" text-anchor="middle" font-size="16" fill="#f57f17" font-weight="bold">3 is COMMON!</text>
                    </g>
                </svg>`,
                
                common_answer: `<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg">
                    <text x="210" y="50" text-anchor="middle" font-size="20" fill="#666">6x + 9 =</text>
                    <g id="answer" opacity="0">
                        <text x="210" y="100" text-anchor="middle" font-size="32" font-weight="bold" fill="#667eea">3(2x + 3)</text>
                        <g id="explain" opacity="0">
                            <line x1="150" y1="120" x2="120" y2="150" stroke="#4caf50" stroke-width="2"/>
                            <text x="80" y="165" font-size="14" fill="#4caf50">Common factor</text>
                            <line x1="270" y1="120" x2="300" y2="150" stroke="#2196f3" stroke-width="2"/>
                            <text x="300" y="165" font-size="14" fill="#2196f3">Remaining terms</text>
                        </g>
                    </g>
                    <g id="check" opacity="0">
                        <circle cx="370" cy="90" r="30" fill="#4caf50" fill-opacity="0.1" stroke="#4caf50" stroke-width="3"/>
                        <path d="M 355 90 L 365 100 L 385 75" stroke="#4caf50" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </g>
                </svg>`,
                
                identity: `<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg">
                    <g id="formula" opacity="0">
                        <text x="210" y="50" text-anchor="middle" font-size="24" font-weight="bold" fill="#667eea">a² - b² = (a + b)(a - b)</text>
                    </g>
                    <g id="squares" opacity="0">
                        <rect x="50" y="80" width="80" height="80" fill="#e3f2fd" stroke="#2196f3" stroke-width="2"/>
                        <text x="90" y="125" text-anchor="middle" font-size="16" fill="#1976d2">a²</text>
                        <text x="150" y="125" font-size="24" fill="#666">-</text>
                        <rect x="170" y="100" width="40" height="40" fill="#ffebee" stroke="#f44336" stroke-width="2"/>
                        <text x="190" y="125" text-anchor="middle" font-size="14" fill="#d32f2f">b²</text>
                        <text x="230" y="125" font-size="24" fill="#666">=</text>
                        <rect x="260" y="80" width="120" height="60" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" stroke-dasharray="5,5"/>
                        <text x="320" y="115" text-anchor="middle" font-size="14" fill="#7b1fa2">(a+b)(a-b)</text>
                    </g>
                </svg>`,
                
                identity_example: `<svg viewBox="0 0 420 178" xmlns="http://www.w3.org/2000/svg">
                    <g id="problem" opacity="0">
                        <text x="210" y="40" text-anchor="middle" font-size="24" fill="#333">x² - 25</text>
                    </g>
                    <g id="breakdown" opacity="0">
                        <text x="210" y="80" text-anchor="middle" font-size="20" fill="#666">= x² - 5²</text>
                        <g id="identify" opacity="0">
                            <text x="100" y="110" font-size="14" fill="#2196f3">a = x</text>
                            <text x="320" y="110" font-size="14" fill="#f44336">b = 5</text>
                            <line x1="130" y1="100" x2="180" y2="85" stroke="#2196f3" stroke-width="2"/>
                            <line x1="310" y1="100" x2="250" y2="85" stroke="#f44336" stroke-width="2"/>
                        </g>
                    </g>
                    <g id="final" opacity="0">
                        <text x="210" y="150" text-anchor="middle" font-size="28" font-weight="bold" fill="#667eea">(x + 5)(x - 5)</text>
                    </g>
                </svg>`
            };
            
            return svgs[type] || svgs.intro;
        }
        
        function fade(id, opacity, parent = document) {
            let el = parent.getElementById ? parent.getElementById(id) : parent.querySelector('#' + id);
            if (el) {
                el.style.transition = 'opacity 0.5s';
                el.style.opacity = opacity;
            }
        }
        
        function startLesson() {
            if (lessonStarted) return;
            lessonStarted = true;
            currentStep = 0;
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('replayBtn').style.display = 'inline-block';
            
            initVoices(() => {
                playStep(0);
            });
        }
        
        function playStep(stepIndex) {
            if (stepIndex >= lessonSteps.length) {
                showQuestion();
                return;
            }
            
            currentStep = stepIndex;
            let step = lessonSteps[stepIndex];
            
            let progress = ((stepIndex + 1) / lessonSteps.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            document.getElementById('topicTitle').textContent = step.title;
            document.getElementById('topicText').textContent = step.text;
            
            let canvas = document.getElementById('animCanvas');
            canvas.innerHTML = getAnimSVG(step.svg);
            
            say(step.narration, step.emotion);
            
            at(1000, () => {
                animateSVG(step.svg);
            });
            
            let duration = Math.max(5000, step.narration.length * 70);
            at(duration, () => {
                if (stepIndex < lessonSteps.length - 1) {
                    playStep(stepIndex + 1);
                } else {
                    at(2000, showQuestion);
                }
            });
        }
        
        function animateSVG(type) {
            let svg = document.getElementById('animCanvas').querySelector('svg');
            if (!svg) return;
            
            switch(type) {
                case 'intro':
                    at(0, () => fade('pieces', 1, svg));
                    at(800, () => fade('arrows', 1, svg));
                    at(1600, () => fade('chocText', 1, svg));
                    break;
                case 'common_factor':
                    at(0, () => fade('sixx', 1, svg));
                    at(1000, () => fade('nine', 1, svg));
                    at(2000, () => fade('common', 1, svg));
                    break;
                case 'common_answer':
                    at(0, () => fade('answer', 1, svg));
                    at(1000, () => fade('explain', 1, svg));
                    at(2000, () => fade('check', 1, svg));
                    break;
                case 'identity':
                    at(0, () => fade('formula', 1, svg));
                    at(1000, () => fade('squares', 1, svg));
                    break;
                case 'identity_example':
                    at(0, () => fade('problem', 1, svg));
                    at(800, () => fade('breakdown', 1, svg));
                    at(1600, () => fade('identify', 1, svg));
                    at(2400, () => fade('final', 1, svg));
                    break;
            }
        }
        
        function replayAnim() {
            clearTimeoutTimers();
            synth.cancel();
            isSpeaking = false;
            updateRishika('normal', false);
            document.getElementById('speechBubble').classList.remove('active');
            
            playStep(currentStep);
        }
        
        function showQuestion() {
            document.getElementById('questionBox').classList.add('active');
            document.getElementById('nextBtn').style.display = 'inline-block';
            
            document.getElementById('questionText').textContent = "What is the factorised form of 8x + 12?";
            
            let options = [
                { text: "4(2x + 3)", correct: true },
                { text: "2(4x + 6)", correct: false },
                { text: "8(x + 1.5)", correct: false },
                { text: "3(2x + 4)", correct: false }
            ];
            
            let container = document.getElementById('answerOptions');
            container.innerHTML = '';
            
            options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = opt.text;
                btn.onclick = function() {
                    if (opt.correct) {
                        this.classList.add('correct');
                        say("Excellent! That's correct! 4 times 2x plus 3 is the right answer!", "excited");
                    } else {
                        this.classList.add('wrong');
                        say("Not quite. Look for the highest common factor of 8 and 12.", "soft");
                    }
                };
                container.appendChild(btn);
            });
            
            say("Now it's your turn! What is the factorised form of 8x plus 12?", "soft");
        }
        
        function nextQuestion() {
            currentStep = 0;
            lessonStarted = false;
            document.getElementById('questionBox').classList.remove('active');
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('replayBtn').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('topicTitle').textContent = "Welcome to Factorisation!";
            document.getElementById('topicText').textContent = "Rishika will guide you through factorisation step by step.";
            document.getElementById('animCanvas').innerHTML = '';
            clearTimeoutTimers();
            synth.cancel();
            updateRishika('normal', false);
        }
        
        window.addEventListener('beforeunload', () => {
            synth.cancel();
            clearTimeoutTimers();
        });
        
        window.addEventListener('pagehide', () => {
            synth.cancel();
            clearTimeoutTimers();
        });
        
        window.onload = () => {
            initVoices();
        };
    </script>
</body>
</html>
