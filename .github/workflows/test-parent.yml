name: Test Parent Pages
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check all parent pages
        run: |
          for url in \
            "https://rishi-ewh.pages.dev/parent.html" \
            "https://rishi-ewh.pages.dev/parent-dashboard.html" \
            "https://rishi-ewh.pages.dev/syllabus.html"
          do
            status=$(curl -L -o /dev/null -s -w "%{http_code}" "$url")
            echo "$status $url"
            [ "$status" != "200" ] && exit 1
          done
          exit 0
