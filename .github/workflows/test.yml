 name: RISHI Page Tester

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check key pages load
        run: |
          urls=(
            "https://rishi-ewh.pages.dev"
            "https://rishi-ewh.pages.dev/syllabus.html"
            "https://rishi-ewh.pages.dev/parent.html"
            "https://rishi-ewh.pages.dev/explain/class8/algebra/rational-numbers.html"
            "https://rishi-ewh.pages.dev/practice/class8/ch1-practice.html"
          )
          for url in "${urls[@]}"; do
            status=$(curl -o /dev/null -s -w "%{http_code}" "$url")
            if [ "$status" != "200" ]; then
              echo "FAIL: $url returned $status"
              exit 1
            else
              echo "OK: $url"
            fi
          done
